овений или душераздирающих рычаний в ухо – она заставит вас улыбаться, потому что там замечательный мягкий юмор, и она очень бережная, хотя эмоциональные качели там в достаточном количестве.\n\nКороче, перед нами 100% будущий летний бестселлер, и на нем будет мой отзыв. А прочитать его вы можете на обложке [см. выше].\n\n❓ Друзья, если уже читали первую книгу или прочитаете по наводке, напишите, как вам, хочу сравнить впечатления."}, {"source": "kotova", "title": "Подборка: рекомендации к Библионочи Rugram", "book_author": "", "summary": "Список книг к распродаже издательства Rugram: «Осенняя жатва» Марии Гуцол («книга, о которой будут говорить все»), «Зеркала» Марии Покусаевой, «Проклятый лес» Ирины Зволинской, «Тимьян и клевер» Софьи Ролдугиной, «Ментор чёрного паука» Нины Малкиной, «Невеста» Карины Дёминой, «Рыжая племянница лекаря» Марии Заболотской, а также «Грозовой сумрак» и «В тени охотника» Елены Самойловой.", "tags": ["подборка", "фэнтези", "распродажа"], "links": ["https://rugram-shop.ru/", "https://t.me/amarie_gutsol", "https://t.me/turnezolle_pub", "https://t.me/iyzvolinskaya", "https://t.me/kvertind", "https://t.me/marizyaba_pub"], "date": "2023-05-20", "review": "Дорогие друзья, на сайте Rugram библионочь до 31 мая!))\n\nПредставляю вам подборку книг, которые прям очень рекомендую купить. В скринах вы увидите цены после авторизации (сейчас там скидка -35% и еще -15% при авторизации):\n\n• «Осенняя жатва» Марии Гуцол. Это книга, о которой будут говорить все, вот увидите!\n• «Зеркала» Марии Покусаевой\n• «Проклятый лес» Ирины Зволинской\n• «Тимьян и клевер» Софьи Ролдугиной\n• «Ментор черного паука» Нины Малкиной\n• «Невеста» Карины Деминой\n• «Рыжая племянница лекаря» Марии Заболотской\n• «Грозовой сумрак» и «В тени охотника» Елены Самойловой\n\nИ скромно напоминаю про сборник «Любовь и прочие проклятья», куда вошла наша с Лерой Паниной соавторская повесть «Отец на стажировке».\n\nRUGRAM — издательство нового типа\n\n#авторчитаетирекомендует"}, {"source": "kotova", "title": "«Осенняя жатва»", "book_author": "Мария Гуцол", "summary": "Феноменально атмосферная история с полным эффектом присутствия — охотница на фейри по имени Рэй ищет пропавших детей, расследует преступления, связанные с Другой стороной, и соблюдает свой гейс. Автор описывает книгу как «чуть жуткую, чуть тоскливую, очень ароматную, пахнущую мёдом, хлебом, вереском и холодным железом», и её рекомендация напечатана на обложке издания.", "tags": ["тёмное фэнтези", "фейри", "детектив", "атмосферное"], "links": ["https://t.me/amarie_gutsol", "https://www.labirint.ru/books/947492/", "https://litmarket.ru/books/osennyaya-zhatva"], "date": "2023-05-12", "review": "#авторчитаетирекомендует\n\nДрузья, в предзаказ вышла «Осенняя жатва» Марии Гуцол, книга, которую я неоднократно рекомендовала и буду рекомендовать впредь. Оформление такое же атмосферное, как сама книга, а на обложке-полусупере будет моя рекомендация! Я этим очень горжусь)\n\nКупить можно:\n\n• в Лабиринте\nВнимание, он добавляет скидку 40% только если кладешь в корзину, в корзине у меня 1119 рублей, а не 1585!\n\n• на сайте Rugram shop по промокоду rugram_harvest можно получить дополнительную скидку. \nВнимание, для того, чтобы получить цену в 771 руб без доставки, нужно сначала зарегистрироваться (или авторизоваться) на сайте, будет скидка 15%, а затем положить книгу в корзину и ввести промокод – тогда будет суммарная скидка в 42%! \n\nНу а если вы предпочитаете электронку, то она есть на ЛитМаркете.\n\nИ моя рекомендация:\n\nЭто феноменально атмосферная история с полным эффектом присутствия. Чуть жуткая, чуть тоскливая, очень ароматная, пахнущая медом, хлебом, вереском и холодным железом. Здесь охотница на фейри по имени Рэй ищет пропавших детей, расследует преступления, связанные с Другой стороной и соблюдает свой гейс. А ещё коротко стрижет волосы, потому что никто не заплетёт в них больше цветов.\n \nИрина Котова, автор серии «Королевская кровь»\n\nВосхитительно атмосферное оформление печатной «Осенней жатвы» Марии Гуцол"}, {"source": "kotova", "title": "«Мирт»", "book_author": "Мария Руднева", "summary": "Приключенческий роман в духе Жюля Верна про молодого изобретателя, готового представить публике паровоз, чья судьба невидимыми узами связана с последним наследником короны, вернувшимся мстить. Автор хвалит язык книги на «пятёрку с плюсом», но отмечает нехватку драматизма и слишком простую подачу идей — тем не менее рекомендует и планирует читать продолжение.", "tags": ["приключенческий роман", "стимпанк", "лёгкий ромфант", "взвешенный отзыв"], "links": ["https://www.labirint.ru/books/935859/", "https://www.litres.ru/book/mariya-rudneva/mirt-istina-korolya-69192259/"], "date": "2023-05-08", "review": "#авторчитаетирекомендует\nВряд ли я бы скоро взялась за \"Мирта\" Марии Рудневой @ulyss_books , ибо у меня огромная очередь на чтение. (Хотя не знаю - уж очень хороша у него обложка).\nНо случилось так, что Маша - мой редактор в ЭКСМО, благодаря которой появились двухтомники и многие-многие читатели смогли поставить на полку КК в красивом оформлении, но по бюджетной цене. И, конечно, я не могла не заинтересоваться этой книгой.\nМаша предложила дать почитать, я согласилась и предупредила, что не рекомендую, если мне действительно не понравилось.\nНо, как вы можете заключить, мне понравилось, и вот я здесь)))\n\"Мирта\" можно купить в бумаге https://www.labirint.ru/books/935859/ и в электронке и аудио на Литресе https://www.litres.ru/book/mariya-rudneva/mirt-istina-korolya-69192259/\n\nЯ однозначно рекомендую \"Мирта\" тем, в ком жива любовь к приключенческим романам в духе Жюля Верна, эпохе изобретений и открытий, прогресса и развития общества. Это очень хорошо сделанная история с очень хорошим языком, за язык - однозначная пятерка с плюсом. \n\nИтак, мистер Мирт, молодой и увлеченный изобретатель, готов представить публике паровоз - изобретение, которое перевернет жизнь на Бриттских островах, с которых ушли фаэ. По объявлению в газете о найме и обучении машиниста паровоза к нему приходит мисс Амелия - а для консервативного общества женщина в мужском деле - это скандал. И казалось бы, у нас такой производственно-прогрессивный роман, если бы не оказалось, что мистер Мирт не совсем тот, за кого его принимают - и он невидимыми узами связан с Джеймсом Блювеллом, единственным оставшимся в живых наследником короны, который вернулся в Британию мстить.\n\nТеперь к тому, что меня царапнуло:\nДля начала еще раз скажу, что история реально хорошая, вы, читая, получите удовольствие. Это не ромфант, но любовная линия очень приятная, и в целом от книги остается ощущение добра. Мои минусы - это, скорее, профессиональная деформация и субъективщина, когда видишь хороший текст, и понимаешь, что могло бы сделать его еще лучше (для тебя ,как конкретного читателя, конечно, у автора может быть другое мнение).\n\n- История сделана по очень простым лекалам, и кое-где мне не хватило драматизма и вотэтоповоротов (которые я очень люблю), не хватило изменений героев.\n- В логике поведения персонажей есть единичные спорные моменты, которые легко можно было бы поправить двумя словами без вреда для сюжета.\n- Мстителю и злодею я сочувствую больше, чем главным героям, потому что они и так хороши, в их душах все просто, а я люблю, когда сложно. Вообще книга полетела у меня именно с главы Джеймса. Моя ромфантовская душа требует дать ему хорошую девушку и семеро детишек, чтобы сердце успокоилось)) \n- Идеи подаются прямо в лоб, а я люблю, когда меня заставляют подумать и сделать выводы на основании сюжета.\n\nОчень рекомендую попробовать - а я точно буду читать вторую книгу, потому что интересно, куда выведет автор героев и как их судьба сложится дальше. \nЕсли вы читали - напишите в коммах свои впечатления, чтобы другие читатели могли решить, читать или нет."}, {"source": "kotova", "title": "«Академия хаоса» (трилогия)", "book_author": "Ольга Ярошинская", "summary": "Смелое сочетание лёгкого юмора и жёсткого дарка — героиня Арнелла, в чьей крови просыпается магия Хаоса, должна выбирать между обучением в Академии и балом дебютанток ради удачного замужества, но ректор Академии тоже ищет свой шанс. Автор называет книгу возможно лучшей за год, отмечая, что редкое смешение жанров сыграло здесь новыми красками, а не разочаровало.", "tags": ["ромфант", "магическая академия", "юмор", "дарк", "трилогия"], "links": ["https://litnet.com/ru/book/akademiya-haosa-labirint-stihii-b349823"], "date": "2023-03-13", "review": "Подозреваю, что лучшей историей года станет трилогия «Академия хаоса» Ольги Ярошинской – давненько я не получала столько, не побоюсь этого слова, наслаждения, и столько эмоций от книги.\n\nСразу скажу – прежде всего это свежо, потому что Ольге удалось совместить несовместимое – юмор на грани разумного и драму со стеклищем, светлый ромфант-академку и довольно жутенькие дарковые моменты. И удалось это ей превосходно, так, что эта разжанровость не мешала, а заиграла новыми красками.\n\nТакое совмещение в целом очень опасно, потому что если читатель начинает читать книгу как легкий юмор-ромфант, а она перетекает в дарк, мрачноту и тлен, то это очень раздражает читателя, обманывает его ожидания и вредит книге.\n\nТак вот, это все не про «Академию Хаоса», потому что юмор, ромфант, приключения, взаимоотношения многих персонажей и дарк переплетены там равномерно и в той самой пропорции, которая нужна. Очень рискованно, но получилось отлично. Я бы не взялась за такую задачу)\n\nСпустя почти неделю после прочтения эмоции всё ещё такие же восторженные. Местами я смеялась в голос, местами смаргивала слезы. А еще, конечно, моя большая любовь – много разных героев. И они получились прекрасно.\nСпасибо большое Ольге!\n\n📖 Итак, в крови Арнеллы, дочери очень своеобразной и властной матери, внезапно просыпается Хаос – то есть способности к магии. И теперь ей нужно пройти обучение в Академии хаоса, чтобы потом пройти Лабиринт, в котором и определится направленность её способностей – огонь, вода, воздух и т.п. Или – как поступают многие девушки с Хаосом и как настаивает её мама – сходить на бал дебютанток и отхватить себе мужа, заинтересованного в жене со способностями, которые она может передать детям.\nТолько вот девушек перед этим запечатывают – потому что зачем им магия, если их задача теперь рожать и обхаживать мужа.\nАрнелла проваливает зачет по бытовой магии и идёт к ректору просить дать ей ещё один шанс.\nИ не знает, что ректору тоже нужен шанс – но не с ней, как это принято в романах.\n\nОчень, очень рекомендую, потому что по завязке, честное слово, вообще не определить, что там ждёт впереди. Читайте, не пожалеете! Эта трилогия потеснила в моем рейтинге даже «Злую зиму» – до сих самую любимую работу автора.\n\n#авторчитаетирекомендует #АкадемияХаоса #ОльгаЯрошинская"}, {"source": "kotova", "title": "«Будни королевского гарнизона» (упомянута кратко)", "book_author": "", "summary": "Книга упомянута автором канала как рекомендация без развёрнутого отзыва в этом посте.", "tags": ["фэнтези", "краткое упоминание"], "links": ["https://litnet.com/ru/book/ya-vse-umeyu-luchshe-bytovye-budni-korolevskogo-garnizona-b372681"], "date": "2023-03-05", "review": "Про книгу \"Будни королевского гарнизона\", про которую я говорила выше) https://litnet.com/ru/book/ya-vse-umeyu-luchshe-bytovye-budni-korolevskogo-garnizona-b372681\n\n#авторчитаетирекомендует"}, {"source": "kotova", "title": "«Время шипов» (дилогия)", "book_author": "Ли Ода", "summary": "Тёмное фэнтези-детектив про бывшего военного снайпера, ныне частного детектива, которая, выполняя просьбу друга, натыкается на приносимого в жертву старого врага — высокородного и опасного Тёмного, которого когда-то не смогла убить по заданию. Автор хвалит хороший язык и крутые интриги, предупреждая, что романтическая обложка обманчива для довольно сложной истории.", "tags": ["тёмное фэнтези", "детектив", "вражда-к-любви", "дилогия"], "links": ["https://litgorod.ru/books/view/4312"], "date": "2023-02-18", "review": "Открыла для себя на Литгороде нового автора, который пишет очень крепко, добротно и эмоционально.\n\nРекомендую дилогию «Время шипов» Ли Оды.\n\nЯ очень люблю истории, в которых работать вместе приходится бывшим врагам. А уж если в процессе происходит зарождение чувств, с преодолением прошлого, так вообще отлично.\n\nТак и во Времени шипов – Сель Ленро, бывший военный снайпер, сейчас работает частным детективом. И как-то исполняя просьбу друга, натыкается на приносимого в жертву старого врага, которого в войну получила задание убить, но не вышло. Он высокороден, ядовит и он – Тёмный, а, значит, вне закона.\n\nОтличная история с хорошим языком, крутыми интригами и детективной линией. Безусловно рекомендую, у автора буду читать другие книги. Обложка может оставить ложное впечатление, она очень романтичная для такой довольно сложной истории.\n\n#авторчитаетирекомендует #ЛиОда #ВремяШипов"}, {"source": "kotova", "title": "«Двум смертям не бывать» by Наталья Шнейдер и «Яшмовая академия»", "book_author": "Наталья Колесова (упомянуты кратко)", "summary": "Две книги, прочитанные автором канала в поездке и рекомендованные без подробностей — более развёрнутый отзыв автор обещала написать позже отдельным постом.", "tags": ["фэнтези", "краткое упоминание"], "links": [], "date": "2023-02-13", "review": "Рекомендую две книги, которые прочитала вчера в поезде: \"Двум смертям не бывать\" Натальи Шнейдер и \"Яшмовую академию\" Натальи Колесовой. Текстовую и более подробную рекомендацию напишу потом отдельно.\n\n#авторчитаетирекомендует"}, {"source": "kotova", "title": "«Горчаковъ» (четвёртая часть серии)", "book_author": "Валерий Пылаев", "summary": "Мужское фэнтези, о котором автор канала писала полноценный отзыв ранее — упоминает, что после этой рекомендации многие читатели «Королевской крови» тоже прониклись серией.", "tags": ["мужское фэнтези", "длинная серия", "краткое упоминание"], "links": ["https://www.labirint.ru/series/58303/", "https://book24.ru/serie/pylaev-neveroyatnye-miry-6148715/"], "date": "2023-01-23", "review": "На Лабиринте и в Book24 уже можно купить четвёртую часть «Горчаковъ» Валерия Пылаева в бумаге.\n\nДрузья, вот ➡️тут⬅️ я писала отзыв на эту серию. Знаю, что многие оценили – после этой рекомендации было очень много откликов от читателей и читательниц КК, что серия тоже зашла.\n\nА ещё, так как Валерий читал КК ещё тогда, когда это не было мейнстримом, его рекомендация будет на втором двухтомнике КК от ЭКСМО, чему я, безусловно, рада.\n\n#авторчитаетирекомендует"}, {"source": "kotova", "title": "«Приказано жениться»", "book_author": "Каблукова Екатерина", "summary": "Исторический фэнтези-детектив в антураже двора императрицы Елизаветы Петровны — аристократку Анастасию, чей отец арестован по подозрению в заговоре, императрица велит выдать замуж за гвардейца-оборотня, и вскоре в Петергофском парке начинают находить растерзанные волколаком трупы. Автор честно предупреждает о достоверно и жёстко переданных исторических нравах эпохи, но хвалит органичное вплетение магии в реальный исторический контекст.", "tags": ["исторический роман", "детектив", "оборотни", "ромфант"], "links": ["https://www.litres.ru/ekaterina-kablukova/prikazano-zhenitsya/", "https://t.me/kablukovabooks"], "date": "2023-01-22", "review": "«Приказано жениться» Каблуковой Екатерины – рекомендую тем, кто любит историю Российской империи, детективы и атмосферу. Но есть некоторые оговорки для тех, кто такие же нежные фиалки, как я.\n\nЯ всегда с опаской берусь за книги авторов, с которыми сложилось хорошее личное общение, потому что очень боюсь, что мне не понравится, и нужно будет об этом сказать. И пусть я сама придерживаюсь правила «Для того, чтобы со мной дружить, не обязательно читать или любить КК», всё равно это определенная доза дискомфорта. Тем приятнее, что с «Приказано жениться» всё пошло не так.\n\nСначала я познакомилась с Екатериной Каблуковой, которая является большим знатоком лошадей, истории России и, что очень приятно, истории Питера, затем увидела, как она с горящими глазами рассказывает о своих книгах, заинтересовалась – и пошла читать. Ибо соавторскую с Ольгой Куно уже читала, а вот отдельные – нет.\n\nИтак, у молодой барышни Анастасии по подозрению в заговоре против царицы Елизаветы арестовали отца. Она едет в Петергоф броситься в ноги императрице и просить о милости и волею случая ей в этом помогает гвардеец Преображенского полка Григорий Белов. Он же волк-оборотень, как и все преображенцы (мне очень понравилась эта игра слов). Елизавета же в царственной манере решает то ли наказать, то ли поощрить девушку за дерзость, а гвардейца – за невнимательность, и делает её своей фрейлиной, а ему – велит взять её в жёны.\nИ тут-то начинается самое интересное, потому что мы погружаемся в атмосферу царского Петергофа, отношений между фрейлинами и гвардейцами, сплетен, интриг, посольских встреч… а ещё настоящего расследования, ибо прямо в Петергофском парке находят погрызанные оборотнем-волколаком трупы, и, конечно же, срочно нужно найти убийцу, чтобы обезопасить царицу.\n\nНачало очень задорное, затем идёт спокойная и ровная треть, напоминающая мне галантный роман, а дальше всё закручивается и несется так, что я не могла оторваться и лечь спать, пока не дочитала.\n\nОгромный плюс, что все исторические события и личности, окружающие Елисавету, так вплетены в фентезийно-исторический роман, что только диву даёшься, насколько органично оно легло на эту основу.\nОтсюда же мои ворнинги относительно нежных фиалок. Исторический момент подан очень аутентично, поэтому отношение к крепостным там – тоже вполне историческое, выпороть или отхлестать по щекам – абсолютная норма, плюс некоторые упоминания о заговорах и том, что случилось с заговорщиками, для меня слишком болезненны, как для человека эмпатичного. Ну и нрав Елизаветы, которая вполне себе могла остричь наголо фрейлину, которая посмела заявиться с более красивой прической, чем у неё, или с такой же розой в причёске, там показан вполне достоверно.\nЕсли вас это не смущает, то обязательно читайте, погружение в историческую действительность гарантировано. И видна такая проработка материала, что убери оттуда магическую составляющую, и получится хороший исторический роман.\n\n📖 Аннотация:\nУехав из родного имения в столицу, Настя думала, что сумеет освободить отца, заточенного в крепость по обвинению в заговоре против государыни императрицы. И ей это почти удалось, если бы не одно «но»: по приказу императрицы ей надлежит выйти замуж, да не за кого-нибудь, а за оборотня… а ведь перед смертью мать Настина наказывала девушке хранить свою ведьмовскую силу, особенно от оборотней, ведь они… а вот какие они на самом деле те оборотни, что охраняют Елисавету Петровну, девушке лишь предстоит узнать…\n\n#авторчитаетирекомендует #ЕкатеринаКаблукова #ПриказаноЖениться"}, {"source": "kotova", "title": "«Монашка и дракон»", "book_author": "Ната Лакомка", "summary": "Ромфант про бывшую аристократку, ставшую монастырской послушницей, которую от скуки забирает себе дракон, один из всесильных ящеров. Автор особо отмечает достоинство и разумность героини, удачно вплетённые библейские цитаты и неожиданно сильную детективную линию в дополнение к романтике.", "tags": ["ромфант", "драконы", "детектив", "независимая книга"], "links": ["https://litnet.com/ru/book/monashka-i-drakon-b82571"], "date": "2023-01-09", "review": "#авторчитаетирекомендует\n\nПрочитала замечательную историю от Наты Лакомки, и, знаете, прямо вот очень довольна. Хотя если бы не аннотация и отрывок, на название вряд ли бы обратила внимание. «Монашка и дракон» – и это очень, очень хорошо!\n\nЕсть на Литнет, я читала на Литресе.\n\nУ Наты Лакомки я читала уже Василису Опасную (ищите по тематическому тегу отзыв), и «Монашка» – уже вторая история, которая прямо срывает бинго в моем сердце. Пожалуй, возьму третью, и если она окажется так же хороша, то Ната Лакомка перейдёт в разряд автопокупаемых авторов.\n\nИтак, она – послушница в монастыре, бывшая аристократка, бежавшая от войны. Он – дракон, один из ящеров, которым дозволено всё. Он забирает её себе ради развлечения.\n\nВо-первых, меня бесконечно порадовало то, с каким достоинством себя ведёт главная героиня. Её ум и мягкое чувство юмора, разумность и осторожность, которые, однако, не всегда работают.\nВо-вторых, спасибо Нате Лакомке за цитаты из Библии, которые в этом контексте звучат очень ярко. Читать – одно удовольствие. Пусть вас это не пугает, поверьте, это одна из фишек этой книги. Очень удачная находка.\nИ в-третьих, я никак не ожидала, что получу вместе с ромфантом и историей о том, что есть настоящая любовь и что может ею называться ещё и отличный детектив.\n\nИногда бывает так, что по ходу чтения что-то царапает, но ты это игнорируешь, потому что сюжет отличный и рассказано хорошо. Так вот, тут меня ничего не царапало, очень цельное впечатление. Характеры не идеальны, но выписаны в точном соответствии с заявленными, изменения происходят медленно и обосновано, злодеи со своей правдой и обоснуем.\n\nСпасибо автору за отлично проведенное время.\nА читателям – безусловно рекомендую.\n\nЕсли у вас есть любимая книга у Наты – порекомендуйте, какую мне взять читать следующей."}, {"source": "kotova", "title": "«Злая любовь»", "book_author": "Анна Завгородняя", "summary": "История силы и слабости в царском антураже — изнеженная аристократка отправляется за женихом в приграничную северную крепость и находит там новые смыслы, друзей и себя, а её соперница оказывается не картонной стервой, а достойным человеком. Автор особо хвалит равновесие между сильной любовной линией и весомой приключенческо-детективной составляющей.", "tags": ["ромфант", "приключения", "детектив", "независимая книга"], "links": ["https://litnet.com/ru/book/zlaya-lyubov-b415958"], "date": "2023-01-08", "review": "#авторчитаетирекомендует\n\nНедавно с удовольствием прочитала «Злую любовь» от Анны Завгородней. Очень рекомендую.\n\nЭто история в этаком царском антураже. И мне очень понравилось, что это история силы и слабости. Молодая изнеженная аристократка отправляется за своим женихом в приграничную северную крепость и находит там и новые смыслы, и друзей, и себя.\n\nИстория немаленькая, но мне она так зашла, что я бы её ещё на столько же развернула, благо, там есть на что опираться. И мне очень понравилось, что соперница здесь – не кукольно-картонная стерва, а человек, безусловно достойный. Ну и в целом любовная линия в истории сильна, но и приключенчески-детективная прописана очень весомо и увлекательно, с тайнами севера, жуткими сущностями и неожиданными поворотами.\n\n📖 Аннотация: Закончив учебу в академии магии, к свадьбе с любимым человеком и к практике в столице, когда судьба решила сыграть с ней злую шутку. И вот она вынуждена оставить отчий дом, любящих родителей и последовать за своим избранником на границу с опасной северной страной, где в небесах парят драконы, где живут люди, простые и далекие от того мира, к которому она привыкла, и где ее чувствам предстоит пройти испытание, а сердцу сделать нелегкий выбор."}, {"source": "kotova", "title": "Подборка: Топ-5 книг 2022 года по версии Ирины Котовой", "book_author": "", "summary": "Годовой топ автора канала по номинациям с комментариями: «Стекло года» — «Бог смерти не любит яблоки» Алисы Чернышовой («стекло стеклянное», обалденные сильные герои); «Захватывающее чтение года» — «Однажды в Лопушках», «Леди, которая любила готовить», «Коммуналка» Карины Дёминой (автор года по числу прочитанных книг); «Атмосфера года» (и «лучшая эротическая сцена ever») — «Осенняя жатва» Марии Гуцол; «Свежий ветер года» — «Ментор чёрного паука» Нины Малкиной, за проработанность каждой детали мира; «Юмор года» — сразу два автора: «Не злите добрую колдунью» Марины Ефиминюк и «гремучая, но цепляющая» смесь юмора и эротики «Зачёт по тварезнанию» Светланы Нарватовой.", "tags": ["подборка", "итоги года", "топ книг"], "links": ["https://litnet.com/ru/book/bog-smerti-ne-lyubit-yabloki-b395641", "https://litnet.com/ru/karina-demina-u9740", "https://litmarket.ru/books/osennyaya-zhatva", "https://t.me/amarie_gutsol", "https://litnet.com/ru/book/mentor-chernogo-pauka-b219676", "https://t.me/efiminyuk_marina", "https://litnet.com/ru/book/zachet-po-tvareznaniyu-b296284"], "date": "2023-01-06", "review": "Друзья, а ведь мы с вами не подводили итоги прочитанного за год – а как иначе мы все ещё найдем множество книг, которые хочется прочитать?))\n\nПредлагаю всем написать Топ-5 книг за 2022 год. В любом жанре, главное, чтобы это был ваш личный топ, книги, которые стали лучшими для вас, произвели наибольшее впечатление. Очень жду, буду составлять себе список чтения на 23 год.\n\nМожно без КК, я и так знаю, что вы её любите))\n\nИтак, мой Топ-5.\n1. Стекло года – «Бог смерти не любит яблоки» Алисы Чернышовой (ну и собственно вся серия по галактике Альдазар). Во-первых, эта книга – стекло стеклянное и очень отзывается моменту, во-вторых, совершенно обалденные, сильные и достойные герои. Ну и вообще Алиса – это открытие 2021 года для меня, а «Бог» перешёл в 22.\n\n2. Захватывающее чтение года – «Однажды в Лопушках», «Леди, которая любила готовить», «Коммуналка» Карины Дёминой. Карина для меня – автор этого года, больше всего книг прочитала у неё. Моё непрекращающееся восхищение и фантазией, и скоростью написания.\n\n3. Атмосфера года (и лучшая эротическая сцена ever, потому что совершенно ошарашивающий накал там передан двумя простыми фразами) «Осенняя жатва» Марии Гуцол. Спасибо Маше Покусаевой за рекомендацию. Очень надеюсь, что все книги Марии выйдут в этом году в Руграме в бумаге и мы сможем поставить их на полку.\n\n4. Свежий ветер года – «Ментор чёрного паука» Нины Малкиной. Люблю проработанные, полновесные произведения, в которых автор дрожит над каждой деталью мира.\n\n5. Юмор года – тут я не удержалась и отдала номинацию сразу двум авторам.\n«Не злите добрую колдунью»  Марины Ефиминюк – ну, Марина это Марина и это прекрасно.\nИ гремучая, но очень цепляющая смесь юмора и хорошей эротики «Зачёт по тварезнанию» Светланы Нарватовой.\n\nC нетерпением жду вашего топа 2022 года!\n\n#ЧитателиРекомендуют #авторчитаетирекомендует\n\nИрин Топ-5 2022 года в обложках\n\n#авторчитаетирекомендует"}, {"source": "kotova", "title": "«Герцогиня поневоле»", "book_author": "Евгения Александрова (упомянута кратко)", "summary": "Книга упомянута заголовком без развёрнутого отзыва в этом посте.", "tags": ["ромфант", "краткое упоминание"], "links": [], "date": "2022-11-20", "review": "О \"Герцогине поневоле\" Евгении Александровой\n\n#авторчитаетирекомендует"}, {"source": "kotova", "title": "«Стажёрка в академии теней»", "book_author": "Анна Платунова", "summary": "Книгу, замеченную в обзоре у другого блогера, автор канала прочитала за одну поездку на «Сапсане» и оставила короткий, но однозначно положительный отзыв: «отлично!».", "tags": ["магическая академия", "ромфант", "краткое упоминание"], "links": [], "date": "2022-11-19", "review": "Увидела вчера в обзоре у Юли books around me \"Стажерку в академии теней\" Анны Платуновой и сегодня в сапсане прочитала. Впечатления - отлично!\n\n#авторчитаетирекомендует"}, {"source": "kotova", "title": "«Не злите добрую колдунью!»", "book_author": "Марина Ефиминюк", "summary": "Тёплый юмористический ромфант — добрая светлая колдунья обнаруживает нового соседа-ведьмака с непростым характером и колючую изгородь, внезапно выросшую посреди её огорода. Автор называет книги Марины Ефиминюк уже настоящим брендом и «тёплым солнцем в холодный день», отмечая неожиданно уместный чёрный юмор.", "tags": ["ромфант", "юмор", "лёгкое чтение"], "links": ["https://feisovet.ru/магазин/Не-злите-добрую-колдунью-Марина-Ефиминюк", "https://t.me/efiminyuk_marina"], "date": "2022-10-02", "review": "«Не злите добрую колдунью!» Марины Ефиминюк – читать всем, кому нужна чашечка хорошего настроения.\n\nКниги Марины – это уже настоящий бренд, это совершенное удовольствие от юмора, легкой любовной линии, пикировок и забавных ситуаций. В этой книге Марина щедрой рукой отсыпала юмора чёрного, и на что я не любитель, воспринималось очень спокойно. \nТакие книги – как тёплое солнце в холодный день. Просто на вес золота.\n\nСпасибо огромное, Марина Ефиминюк.\n\nЕсли вы уже читали эту книгу – напишите впечатления, чтобы другие читатели узнали ваше мнение) \n\n📖 Итак, в одну (не очень) прекрасную ночь добрая и очень светлая колдунья обнаруживает, что в доме по соседству кто-то поселился. А на следующее (не) доброе утро эта же колдунья обнаруживает, что\nа) соседом оказался ведьмак с непростым характером;\nб) посреди огорода с заботливо выпестованными растениями выросла колючая изгородь, разделившая владения на две части.\nЧто остается делать колдунье? Только идти и по-очень-доброму разбираться)))\nВсем рекомендую без исключения)))\n\n#авторчитаетирекомендует #МаринаЕфиминюк #НеЗлитеДобруюКолдунью"}, {"source": "kotova", "title": "«Василиса Опасная» (дилогия)", "book_author": "Ната Лакомка", "summary": "Сплав современной России, магической академии и славянского фольклора — резкая, эмоциональная и порой невыносимая героиня Василиса и прекрасный герой-Кощей, чьи отношения автор сравнивает с парой Алина-Тротт из другого популярного романа. Автор отмечает, как чудно старые сказки и легенды вплетаются и раскрываются в этой истории.", "tags": ["фэнтези", "славянские мотивы", "магическая академия", "ромфант", "дилогия"], "links": ["https://litnet.com/ru/book/vasilisa-opasnaya-zerkalnaya-maska-dzhanary-b165188", "https://litmarket.ru/books/vasilisa-opasnaya-zerkalnaya-maska-dzhanary"], "date": "2022-07-04", "review": "#авторчитаетирекомендует\n\nДрузья, я прочитала прекрасную дилогию Наты Лакомки «Василиса Опасная».\n\nКто там искал отношения, похожие на Алина-Тротт?))\n\nГероиня там, конечно, не Алина – она эмоциональна, резка, юна и часто невыносима. Зато герой-Кощей прямо прекрасен и очень троттов))\nИ развитие отношений похоже. \n\nНо не это главное. Мне очень понравился сложный сплав современной России, академки и славянского фольклора. А ещё – как чудно старые сказки и легенды вплетаются и раскрываются в этой книге.\nОчень рекомендую.\n\nПомимо Литнета книга сейчас висит на литмаркете и продамане.\n\n#НатаЛакомка #ВасилисаОпасная"}, {"source": "kotova", "title": "«Смерти подобна» и «Бессердечный принц» (две независимые книги одного цикла)", "book_author": "Яна Мелевич", "summary": "Альтернативно-фэнтезийная современная Российская империя, где рядом с обычными людьми живут мавки, лешие и домовые, а вызвать некроманта — как вызвать слесаря. Некромантка Кристина с непростым характером и договором со Смертью расследует пропажу святых мощей из храма — начинается книга как весёлый юмор, но постепенно переходит в драму, детектив и приключения.", "tags": ["ромфант", "альтернативная история", "некромантия", "детектив"], "links": ["https://t.me/a_melevich", "https://author.today/work/193463", "https://author.today/work/193646"], "date": "2022-06-16", "review": "#авторчитаетирекомендует\n\nОчень, очень рекомендую – новое имя и свежее дыхание в ромфанте – Яна Мелевич и две независимые книги одного цикла «Смерти подобна» и «Бессердечный принц».\n\nЭто прямо очень, очень хорошо. Прежде всего великолепным альтернативно-фентезийным миром Российской империи, но современной РИ, в которой рядом с обычными людьми живут на правах равных граждан мавки, лешии и домовые, в которых позвать некроманта – примерно как вызвать слесаря, по телевизору показывают речи Николая Третьего, а церковная магия – ощутима и понятна.\nСразу предупреждаю, что начинается история как этакий развеселый юмор, но он постепенно переходит в драму, в приключения и детектив. Мир углубляется, поэтому первое впечатление может оказаться совсем не тем, которое вы получите в конце.\nА ещё здесь на удивление хорошая любовная линия))) В начале никогда бы не подумала, что именно такой она будет.\nРазные системы магии, очень органично вписанные в историю РФ. Свои скелеты в шкафах, дворцовые тайны, заговорщики, мини-апокалипсис, разные судьбы – всё как я люблю.\n\nИтак, у некромантки Кристины есть нелёгкий характер, влюблённый бывший одноклассник, к которому она не относится серьезно, много работы и договор со Смертью. А ещё – привычка своей жизнью спасать жизни других. И когда из местного храма пропадают святые мощи, она даже представить не может, насколько глубоко в бездну ей придётся заглянуть. И кто встанет с ней рядом, чтобы уберечь.\n\nЧитайте, не пожалеете. Книга закончена, читается независимо. Вторая книга серии про других героев сейчас пишется, но она не менее хороша. Огромное спасибо Яне за удовольствие!\n\n#СмертиПодобна #БессердечныйПринц #ЯнаМелевич"}, {"source": "solodkova", "title": "«Некроманя»", "book_author": "Леока Хабарова", "summary": "Карьерист Андрей добровольно ложится на жертвенный алтарь по приказу шефа-чернокнижника и оказывается «оживленцем», накрепко привязанным к безбашенной некромантке Мане. Автор отзыва отмечает бешеный драйв повествования, отсылки к «Жуткой Жене» того же автора и то, как за трэш-угаром скрываются серьёзные темы эгоизма и цены собственных приоритетов.", "tags": ["юмор", "некромантия", "городское фэнтези", "динамичный сюжет"], "links": [], "date": "2026-06-14", "review": "#Солодкова_читает #Дневник_читателя\nЛЕОКА ХАБАРОВА «НЕКРОМАНЯ»\nАннотация:\nНа что вы готовы ради карьерного роста?\nАндрей был согласен на всё и в итоге оказался… на жертвенном алтаре. Теперь Андрей – оживленец, застрявший между жизнью и смертью. А ещё он накрепко привязан к таинственной некромантке. Лихой, совершенно безбашенной и с явной придурью. Как при таких раскладах вернуть украденную жизнь? Неизвестно. Но кто не рискует – тот не кайфует!\n\n⬇️\n\n⬆️\nКто не рискует - тот не кайфует!\n(с) Маня\n \nПрочитала свежую историю от Леоки Хабаровой.\nНу что сказать? Очень-очень в духе автора, когда автор уходит в отрыв.\nПо настроению напомнило \"Жуткую Женю\". И тематикой, и бесконечным драйвом, сдобренным саундтреками, и умением смеяться над жутким.\n \nИтак, о чем книга?\nЖил-был молодой человек Андрей. Выучился, приехал в Москву, рассчитывал построить карьеру и разбогатеть. А то, что ради карьеры можно и полебезить, и поунижаться перед начальством всяко-разно, так это не Андрей такой, жизнь такая. Ну а что, квартиру-то побольше хочется, да и девушки не обращают внимания, пока их не покормишь в дорогом месте и не пообещаешь свозить на Мальдивы (пообещать достаточно, ага, везти на самом деле денег все равно не хватит).\n \nСобственно, так мы и знакомимся с Андреем — в ресторане на свидании с красоткой, которую волнует его кошелёк, а не он сам. Но не думайте о девушке слишком плохо, потому что и Андрея волнует только, когда же она даст ему доступ к телу. Так что здесь два сапога пара. Правда, девчонке не повезло — ошиблась с оценкой материального состояния кандидата.\n \nИ вот Андрей подпрыгивает на месте, не зная, как не потратить будущий платеж за ипотеку на развлечение девицы, которая не факт, что даст... Как вдруг ему звонят с работы и сообщают, что начальство срочно требует его к себе. Какая удача! И как вовремя! И неважно, что встреча назначена в выходной, на кладбище, ночью. Ведь слово начальника — закон, а лишний раз лизнуть для карьеры никогда не лишнее.\n \nНу и, ожидаемо, Андрей очень быстро расплачивается за свой беспринципный карьеризм: шеф-чернокнижник приносит его в жертву. Добровольную, да. Потому что преданный сотрудник шефу никогда не откажет. Сказано тебе: раздевайся и ложись голой ж... на алтарь, — закрой рот и ложись.\n \nЕстественно, Андрей понимает свою ошибку слишком поздно — уже когда его труп поднимает красноглазая некромантка Маня, работающая на секретную организацию, которая охотится вот на таких чернокнижных шефов.\n \nЭто я не спойлерю, так начинается история. И в ней, несмотря на небольшой объем, будет очень много всего.\nИстория на самом деле очень активная, драйвовая, события сменяют друг друга со скоростью света. Прибывают новые персонажи, сюжет раскручивается и раскручивается, переходя к финалу уже на вторую космическую.\n \nРитуалы, демоны, оборотни в погонах (в прямом смысле оборотни то есть), крымские татары, вурдалаки, гули и упыри. Герой сам говорит, что не хватает только цыган с танцующим медведем. Но пронесло, не приехали))\n \nШутки шутками, но вся эта катавасия трэш, угар смотрятся весьма гармонично и идеально вписываются в заданные изначально темп и стиль повествования.\n \nЯзык у книги прекрасный, грамотный, лёгкий — текст летит перед глазами, только успевай листать главы.\nПерсонажей на такой небольшой объем немало, но все они прописаны великолепно, у каждого свой характер и свои фишки.\nЧитать очень увлекательно, заскучать некогда.\n \nА самое главное и ценное для меня, что за видимым балаганом автор незаметно, на первый взгляд, касается очень серьёзных тем. И важности семьи, и цены дружбы, и человечности. Походя, вроде бы не заостряя внимания, проходится по теме эгоизма и того, на что человек готов ради удовлетворения своих желаний. А также о том, стоит ли оно того?\nГерой выставил для себя неверные приоритеты и жестоко за это поплатился. К счастью, ему дали второй шанс сделать верные выводы.\n \nНемного жаль, что автор не раскрыла тайны прошлого героини и так не объяснила, почему ее авто регулярно меняет цвет. Но думаю, с любовью Андрея задавать вопросы, со временем он до всего докопается. А это время у него еще будет, и много приключений — обязательно.\n \nОт себя — книгу рекомендую.\nЧитала с интересом и удовольствием.\n #Солодкова_читает #Дневник_читателя"}, {"source": "solodkova", "title": "«Неисправная Анна» (2 части)", "book_author": "Тата Алатова", "summary": "Имперский стимпанк-детектив в альтернативном Петербурге, написанный от лица героини в необычном настоящем времени — механик Анна возвращается из ссылки к сыщику Архарову, из-за которого туда попала. Рецензентка «пищала от восторга», особо отмечая достоверность профессии героини, живых персонажей и любовную линию, работающую через мелкие детали и взгляды.", "tags": ["стимпанк", "детектив", "альтернативная история", "взрослое чтение"], "links": [], "date": "2026-04-20", "review": "#Солодкова_читает #Дневник_читателя\nТАТА АЛАТОВА «НЕИСПРАВНАЯ АННА» (2 ЧАСТИ)\n\nАннотация:\n— Я вернусь и уничтожу вас, — сказала она тогда.\n— Уничтожите, — легко согласился Архаров. — Но для этого вам надо вернуться.\n⬇️\n\n⬆️\nЯ редко пищу от восторга, когда что-то читаю. И чаще всего я все же отрываюсь от самой истории и вижу не только то, что было сделано, но и КАК это сделано. Профдеформация, что поделать((\n\nЭто тот случай, когда я таки пищала от восторга (и еще пищу, хотя дочитала вчера), потому что сделано это настолько нереально круто, что просто снимаю шляпу. Восторг, да. \n\nИстория написана от третьего лица, но с точки зрения героини и… в настоящем времени! Редкость, сочетание несочетаемого и, опять же, полный восторг. Потому что погружение вышло невероятное.\n\nНе знай я, кто автор этой истории, на полном серьезе решила бы, что книга написана инженером из Санкт-Петербурга. И мне даже страшно представить, сколько матчасти пришлось перекопать автору, чтобы передать все так натурально: и чужой город, и множество нюансов работы механика.\n\nДа, города в тексте много. И возможно, коренной житель Питера и найдет некое несоответствие в географии, но я-то не коренной и вообще не житель, и мне важно не расположение улиц, а атмосфера. И она-то тут передана превосходно. Верю!\n\nКак верю и в профессию героини (а ей уделено немало внимания, и механик она точно не для красного словца, как порой бывает в книгах, когда автору просто хочется дать персонажу красивую специальность), и в ее характер.\n\nАнна не образцовая героиня, она неидеальна. Анна совершила много ошибок в прошлом, продолжает совершать их в настоящем и, вероятно, не перестанет совершать в будущем. Но это-то и делает ее живой. Сомневающейся, чувствующей, взрослеющей.\n\nВ начале книги героиня и правда «неисправна» (великолепно подобранное название, ибо Анна обожает все сравнивать с любимыми механизмами), и для меня процесс ее «починки» в глазах общества и прежде всего в ее собственных, внутри нее самой показался очень реалистичным. Было невероятно интересно наблюдать за изменениями в мировоззрении и мироощущении Анны, ее путем к себе самой, за тем, как она учится открываться перед людьми и впускать их в свою жизнь. А главное, как она наконец принимает себя и раскрывается перед другими уже без прежней опаски. И что самое важное, при этом Анна не перерождается, не становится другим человеком, она остается самой собой, при этом лучше узнав себя, поняв наконец, чего хочет, и крепче встав на ноги.\n\nВсе персонажи выписаны выше всяких похвал. Их много (о, их действительно много!), но в них не путаешься. У каждого свой характер, своя манера говорить, они абсолютно разные и при этом совершенно живые. У них свои чувства, свои мотивы, своя боль и свои желания. Верю. Всем. Браво.\n\nЛюбовная линия в книге прекрасна. И здесь-то прием написания в настоящем времени работает на все сто процентов. Мимолетные взгляды, оттенки чувств, мельком проскользнувшие мысли и долгие рассуждения (и заблуждения!), все это звенит каплями мелкого дождя по стеклу, а потом превращается в целое море чувств — и в них тоже абсолютно веришь. Потому что сложилось. Из мелких деталей, да.\n\nШикарный главный герой получился. Меня он просто покорил своими терпением и прямотой. Как же я люблю, когда герои умеют разговаривать словами через рот.\n\nЕще хочется отметить, как написаны постельные сцены. А написаны они так, что их вроде как и нет толком, но они ЕСТЬ! Нет никакой «перемотки», когда герои рухнули на простыни и проснулись утром. При этом нет и анатомии, но много-много чувств. Мой любимый формат описания физической близости героев. Великолепно!\n\nДетективные линии в книге тоже прекрасны. Герои работают в полиции, и у них много разных дел. Действительно разных, оригинальных и интересных. И ни одно из этих дел не является просто бумагами в папке — это люди, судьбы, трагедии и ошибки. И выводы, много выводов, которые делает из чужих историй Анна на пути к себе и своему счастью. Прекрасно!\n\nОт меня истории — высший балл. Автору — нескончаемые аплодисменты. Поверьте, эта книга стоит того, чтобы быть прочитанной.\n\nОт всего сердца рекомендую.\n#Солодкова_читает #Дневник_читателя"}, {"source": "solodkova", "title": "«Мюзикл»", "book_author": "Галина Чернецкая", "summary": "Альтернативная Россия начала XX века с дирижаблями и одновременно мобильниками — бойкая сержант полиции и певец-аристократ оказываются втянуты в опасное дело против мафии, вынужденные доверять только друг другу. Рецензентка хвалит нестандартных героев, огненные диалоги и невероятно динамичный, драйвовый темп повествования.", "tags": ["альтернативная история", "юмор", "детектив", "ромфант"], "links": [], "date": "2026-04-17", "review": "#Солодкова_читает #Дневник_читателя\nГАЛИНА ЧЕРНЕЦКАЯ «МЮЗИКЛ»\n\nАннотация:\nЯ – сержант полиции. Он – известный актёр и певец. У нас совершенно ничего общего. Мы не должны были встретиться. Но глупое недоразумение поставило нас против всего мира. В спину дышит мафия, полиция умывает руки, и теперь нам предстоит самим разобраться с этим шумным делом. Доверять можно только друг другу. И то не до конца.\n\nПримечания автора:\nВнимание! Данное произведение является буквосодержащим продуктом и не претендует ни на что.\nВсе герои и автор ничего не употребляют и осуждают всё, что положено осуждать.\n⬇️\n\n⬆️\nТо, что Галина Чернецкая талантливый художник (на обложку только посмотрите!), я знала, а что она еще и пишет, как-то пропустила. Потому, когда увидела, не смогла пройти мимо, из любопытства сунула нос и – пропала.\n\nДавно я не читала ничего подобного. Даже не знаю, как лучше сформулировать… Самобытного? Видно, что автор сам получает удовольствие от своей истории и своих персонажей. И это невероятно здорово.\n\nМир в тексте выписан крупными мазками, и вы не найдете в нем подробных описаний. Но картинка складывается объемная. Перед нами альтернативная Россия примерно начала 20 века, с дирижаблями, стиральной машиной, у которой нужно крутить педали, но при этом с мобильниками и телевизорами. И знаете, все это вместе настолько гармонично, что воспринимается совершенно реальным.\n\nПарочка героев тут нестандартная: бойкая девушка-полицейская, ветеран войны, фанатеющая от оружия, и певец-аристократ, сын богатого отца и любимец женщин. \n\nДиалоги в книге — огонь!\n\nТекст от лица героини, но и ее мы узнаем больше через слова и действия. Никакой рефлексии точно не ждите. Да и как их ждать от девушки, которая сушит белье на пулемете и таскает с собой гранаты?))\n\nВторостепенные персонажи также не подкачали: начальник героини, Михалыч с завода, герцогиня с дирижабля, Хозяйка Медной горы (да-да, здесь и она имеется), бывшая героя — врач… Они все яркие и объемные, даже если занимают не очень много «экранного» времени.\n\nЯ уже сказала про Хозяйку Медной горы. Еще тут есть кони, цыгане, завод, с которого невозможно выйти, пока план не будет выполнен (а он не будет!), временная петля, волшебные змеи, лихие военные и не очень, погони, перестрелки, угон самолета, прыжок с парашютом, показ мод с кокошниками и многое, многое другое.\n\nПримечание автора под аннотацией можно было бы отнести к недавнему закону о… *тут слово, похожее на «котики», но не оно*. Но по ходу чтения я пару раз ловила себя на мысли, что и автор, и герои точно что-то употребляют. В хорошем смысле! Потому что текст настолько драйвовый, что на некоторых его поворотах меня натурально укачивало (опять в хорошем смысле!). \n\nДрайв-драйв-драйв! Весело, задорно, динамично!\n\nВ общем, про «буквосодержащий продукт» я категорически не согласна. Мне было классно и весело. И интересно, да. Так что от себя искренне рекомендую. \n\nНо предупреждаю: с серьезным лицом не подходить!\n#Солодкова_читает #Дневник_читателя"}, {"source": "solodkova", "title": "«Дело — в швах! И между строчек»", "book_author": "Анна Ледова", "summary": "Лёгкий авантюрный роман про мошенницу Ами, залёгшую на дно в провинции, и портного-«модистера» Дирка, скрывающегося от столичного скандала, — их пути пересекаются в поезде. Рецензентка называет книгу «настоящим комбо» лёгкости и смысла, особо хваля цельные характеры персонажей и неожиданный поворот ближе к финалу.", "tags": ["авантюрный роман", "юмор", "ромфант", "лёгкое чтение"], "links": [], "date": "2026-03-15", "review": "#Солодкова_читает #Дневник_читателя\nАННА ЛЕДОВА «ДЕЛО — В ШВАХ! И МЕЖДУ СТРОЧЕК»\nАннотация:\nДирк Андер – джентльмен, начинающий модистер и баронет – едет в провинцию за вдохновением для новой коллекции. А ещё чтобы отсидеться в глуши после столичного скандала.\nУ Амариллис Тэм те же планы – залечь на дно подальше от полиции блистательного Ансьенвилля. А уж в неспешном Бриаре она себе занятие найдёт. А вам, кстати, господин хороший, помощница не нужна? Что, может ли Ами что-то пришить?..\nКонечно, конечно! Хоть пуговицу, хоть бывшего!\n👇🏼\n\n⬇️\n\n⬆️\nМилая, легкая, позитивная история, но при этом со смыслом. Так бы я охарактеризовала эту книгу в двух словах. Получилось, правда, в девяти словах, но не суть)) \n\nУ автора вышел настоящий авантюрный роман, полный приключений и неожиданных поворотов, написанный при этом приятным, грамотным литературным языком. Так что получилось настоящее комбо.\n\nЗавязка книги отлично передана в аннотации, так что нет смысла повторяться. Ами, она же мошенница по кличке Куница, украла деньги у подельников и решила залечь на дно в провинции. Дирк, портной, называющий себя красивым словом «модистер», надеется добиться успеха в глуши, раз уж в столице не получилось. Они встречаются в поезде, и, как говорится, завертелось.\n\nО языке книги я уже сказала, поэтому теперь выскажусь о персонажах. Они разные, и все они имеют свои характеры, манеру речи и поведения. А цельные образы — это то, что я ценю выше всего. Дирк и Ами, грозная кухарка (пугающая снаружи, добрая внутри), феечка-обжора, милейшая банда Потрошилы — все они нестатичны, живут и развиваются на страницах книги, но при этом ведут себя строго в соответствии с заявленными характерами с первой до последней строчки.\n\nМне невероятно понравилась выбранная автором профессия главного героя. Редкий вид героя, так сказать. А то, что автор при этом и сама глубоко разбирается в теме шитья, сделало образ Дирка и то, что он делает, абсолютно натуральным. Верю! А так как сама в этом ничего не понимаю, так было еще интереснее: про ткани, швы и прочие нюансы швейного дела.\n\nВ книге полно веселых моментов, если не прямо смешных, то по меньшей мере вызывающих улыбку. Читается бодро и быстро. Текст не буксует, в каждой главе обязательно случается что-то такое, отчего интерес не ослабевает до самого эпилога. \n\nО, да, за эпилог без самой свадьбы, пачки ребятишек и внуков, отдельное спасибо! Бальзам.\n\nА еще ближе к финалу вас ждет настоящий вотэтоповорот. И если я еще подозревала кое-что, то полную картину не могла представить даже близко. Удивилась, да. Понравилось.\n\nНу и помимо всего вышеперечисленного, хочется отдельно отметить то, что за всеми этими смешными ситуациями, шутками-прибаутками, забавными пикировками героев прячется ОН. Смысл! Книга веселая, но она не пустышка. \n\nКрасной нитью через все повествование проходит темы призвания. Затрагиваются темы чести, порядочности, доверия, а также прекрасно показаны разные отношения родителей и детей. \n\nВсегда заметно, когда книга пишется на вдохновении. И это тот самый случай. Видно, что автор любит своих героев. Я тоже их полюбила. Надеюсь, полюбите и вы.\n\nОт себя — рекомендую.\nНа данный момент книга доступна эксклюзивно на АТ.\n#Солодкова_читает #Дневник_читателя"}, {"source": "solodkova", "title": "«Будь моим гостем»", "book_author": "Юля Тихая", "summary": "Тёмное фэнтези про мир, разделённый на солнечные верхние и мрачные нижние земли — полудракон Рыцарь Света Васу захватывает замок леди Яллоры, чтобы получить власть над магическим Сердцем, но она не сопротивляется и предлагает обучить его вместо этого. Рецензентка хвалит оригинальный мир и яркий, «выпуклый» язык, отмечая многочисленные откровенные (18+) сцены, которые работают на раскрытие характеров, а не только сюжет.", "tags": ["тёмное фэнтези", "драконы", "взрослое чтение (18+)", "независимая книга"], "links": [], "date": "2026-03-01", "review": "#Солодкова_читает \nЮЛЯ ТИХАЯ «БУДЬ МОИМ ГОСТЕМ»\nАннотация:\nРыцарь Света Васу — чудовище. Он пришёл в нижние земли с огнём и мечом, залил поля кровью местных воинов и корольков, а бывшую леди поставил на колени.\nГоспожа последнего северного замка Яллора — чудовище. Она принесла много лживых клятв, от души развлекается за счёт гостей и заставляет случайного любовника целовать ей ноги.\nЧудовища не умеют любить, верно?\n\nЧитала книгу в процессе написания, ждала каждую проду, благо они были почти ежедневными, и наконец дождалась финала. Прочитала и спешу делиться прекрасным.👇🏼\n\n⬇️\n\n⬆️\nВ книге очень оригинальный мир, разделенный на верхние и нижние земли. Верхние — привычные нам, с солнцем, зеленой травой и обычными животными: курами, лошадями, собаками и т.д. Нижние земли — земли без солнца, с незнакомыми растениями и тварями, лишь отдаленно напоминающими знакомую всем живность. \nТут и синие яйца с желтком, похожим на глаз, и странные птицы, используемые как аналог кур, но способные видом и цветом своего мяса отбить аппетит даже у самого стойкого человека, и собаки, которые ассоциируются с собаками лишь благодаря своему поведению, а на самом деле выглядят как четырехпалая фигура из жидкой ртути... Представили?\n\nСловом, фантазия автора на высоте, а нижние земли не похожи ни на что привычное, но в то же время ясно встают перед глазами.\n\nА еще в нижних землях есть разлом, откуда лезут твари, которые гораздо опаснее прирученных «ртутных собачек». И если этот разлом не контролировать, то есть шанс, что эти твари доберутся до верхних земель и пожрут там все живое.\n\nИ тогда «верхний» король находит выход: отправляет в нижние земли рыцарей. Рыцари со своими людьми должны захватить «нижние» замки, забрать себе власть, править полученными территориями и следить за разломом. Естественно, речи о том, чтобы договориться с лордами нижних земель и речи не идет. Рыцарям следует жечь и убивать все и всех, кто встает у них на пути и мешает выполнению Великой миссии. Недаром же эти могучие воина называются Рыцарями Света — они принесут Свет этой мрачной земле.\n\nДа и рыцари эти непростые, они наполовину драконы. Чтобы стать рыцарем, каждый из них должен сразиться с настоящим драконом, убить его и впитать его магическую силу. Проигравший полностью утрачивает свою личность, победитель получает вторую ипостась, гордо именуется Рыцарем Света и едет причинять добро «вниз».\n\nВасу, главный герой произведения, как раз-таки Рыцарь Света. Яллора — леди захваченного им замка. Ему следует убить ее, чтобы получить в свои руки не только власть над замком и людьми, но и силу Сердца, магического артефакта, питающего эти земли и подчиняющего только владыке замка.\n\nНо Васу ничего толком не знает ни о Сердце, ни о его силе. А Яллора не пытается защищаться, впускает рыцаря и его людей в свой замок без единого выстрела и обещает научить всему, если он будет добр к жителям ее земель. Заманчиво, хоть и подозрительно. И Васу решает рискнуть, несмотря на то что хорошо понимает, что тварям нижних земель верить нельзя. Даже если они выглядят как прекрасные леди.\n\nТак начинается история, которая закончится вовсе не так, как предполагают сам герои.\n\nИстория небольшая по размеру, но очень яркая и объемная. В книге много моментов 18+ (реальных 18+, а не за подозрительное слово, как сейчас сплошь и рядом). Постельно-откровенных сцен действительно много. Но это не секс ради секса. С помощью этих сцен автор мастерски раскрывает героев, их внутренние страхи и черты характера, которые они скрывают даже от самих себя.\n\nЯзык книги прекрасен. Правда. От построения некоторых фраз я осталась вообще в неописуемом восторге. Снимаю шляпу: я так не умею.\n\nНапример: \nСерпантин дороги подводил к квадрату крепостных стен, оскаленному тремя башнями и закиданному внутри тесно прилепившимися друг к другу строениями.\n\nОдно предложение, а насколько ярко представляется картинка!\n\nИли:\nДень уже вступил в свои права, бросил на пол длинные линии света и повис в комнате серебром пылинок.\n\nЛаконично, но так «выпукло», что я аплодирую стоя.\n\nВсе образы, характеры персонажей также выписаны превосходно. Безусловно, больше всего «экранного времени» досталось главной паре, но и второстепенные герои не подкачали. А какая у Васу сестра! Вроде бы ее в тексте было не так чтобы много, но она вышла настолько живой, что с первой страницы норовила перетянуть внимание на себя.\n\nНа мой взгляд, книга невероятно удалась.\nОт себя искренне рекомендую!\n#Солодкова_читает \n#Дневник_читателя"}, {"source": "solodkova", "title": "«Жрица»", "book_author": "Анюта Соколова", "summary": "Фэнтези о жрице Карен, бывшем боевом маге, спасающей вражеского офицера-мага во время войны за закрытие храмов, развязанной новым императором. Рецензентка ставит книге 9 из 10, отмечая глубоко проработанный мир с системой магии, живых персонажей и то, как автор поднимает тему войны, не навязывая читателю готовых выводов.", "tags": ["фэнтези", "война", "магия", "ромфант"], "links": [], "date": "2026-01-10", "review": "#Солодкова_читает #Дневник_читателя\nАНЮТА СОКОЛОВА «ЖРИЦА»\nАннотация:\nЖрицы — служительницы Предвечной. Они благословляют новорождённых, скрепляют браки и провожают умерших. Века стёрли из памяти людей истинное предназначение жриц, и новый император ведёт войну за закрытие храмов. Жрица Карен лишь исполняет долг, когда спасает вражеского офицера. Однако на всё воля Предвечной, и случайная встреча может многое изменить. Особенно, если Карен — бывший боевой маг, а коммандер элитного отряда — талантливый маг-пространственник, мечтающий покончить с войнами навсегда.\n\nМнение👇🏼\n⬇️\n\n⬆️\nКнига неновая, и возможно, многие из вас ее уже читали. Но я не тормоз, я медленный газ)) И это произведение стало для меня в принципе первым знакомством с творчеством автора.\nСразу скажу: очень удачным знакомством. Книга просто отличная. Я как открыла ее, так и не смогла оторваться, пока не дочитала. И даже мой старый друг гайморит не помешал мне насладиться прекрасной историей. А это уже о многом говорит☝️.\n\nНачну, пожалуй, издалека — как я выбирала книгу.\n\nЛежу я, значит, болею, организм вырабатывает антидела, то есть своими книгами заниматься вообще не вариант, домашние делают кто что, и я понимаю, что мне нужно срочно что-то почитать. Что? А кто его знает. \n\nОткрываю Библиотеку на АТ и смотрю, чего я наоткладывала на будущее. А там — много. И все — хорошее! Ну и начинаю по порядку открывать: захватит — нет. \n\nВсе не то. Настроение не то, не цепляет. А тут открыла и — о да! Стиль, язык, слог, темп — все как я люблю. Текст захватил с первых строк и не отпускал до самого конца.\n\nВ эпиграфе автор говорит, что эта книга прежде всего о любви. И я абсолютно с этим согласна. О любви между мужчиной и женщиной, о любви к семье, к родине, дружбе (а что такое дружба, как не разновидность любви?). Но сколько же там всего, помимо этого!\n\nАвтор поднимает тяжёлую тему войны, рассматривая ее со всех сторон и показывая точки зрения на нее разных героев. Но что особенно ценно, автор не судит, не выносит вердиктов, а позволяет читателю самому сделать выводы и понять, чей подход ему более близок.\n\nТема веры, тема противостояния религии и политики, тема жестокости и милосердия, тема взаимоотношений детей и родителей (через детство героев автор показывает совершенно разный подход к воспитанию детей, и к чему это приводит).\n\nМир истории также прописан превосходно. В нем есть своя география и свои традиции. Он живой и объёмный. Магия в нем — сложная система, которой нельзя научиться с наскока. А за счёт того, что каждое заклятие, каждый магический приём имеют свое название и требуют определённых действий или жестов, все это воспринимается совершенно реальным.\n\nНо, конечно же, больше всего я буду хвалить то, как прописаны персонажи. Ведь что такое сюжет, мир и даже важные темы без живых персонажей? И здесь они выписаны мастерски. Привычки, манера говорить и вести себя, особенности характера, мелкие детали, воспоминания из детства... Все это подаётся дозированно, но так метко, что герои буквально обретают плоть и кровь. Они по-настоящему цельные, часть этого мира со своим бэкграундом, счастливыми и страшными моментами прошлого. И читая, понимаешь, что да, именно эта деталь пазла идеально подходит конкретно этому персонажу и делает его настоящим.\n\nЯ не очень люблю тему богов, особенно когда те в итоге вмешиваются в события и чем-то одаривают героев. Но даже это здесь меня не смутило, потому что богиня негласно присутствовала почти с самого начала истории.\n\nПодводя итог: мне очень понравилось. А какая там замечательная любовная линия! А какие магические бои!\n\nВ общем, отличная книга. По пятибалльной шкале поставила бы пятёрку. По десятибалльной — не меньше девятки.\n\nХвалю и искренне рекомендую.\n#Солодкова_читает #Дневник_читателя"}, {"source": "solodkova", "title": "«Узнай меня, если сможешь»", "book_author": "Лада Шведова (Карина Вальц)", "summary": "Милый новогодний современный любовный роман про студентку Сашу, случайно переписывавшуюся с популярным парнем университета с чужого аккаунта и влюбившуюся в него по-настоящему. Рецензентка особо хвалит отсутствие привычных жанровых клише — герой не мажор и не альфа-самец, героиня не Золушка, а все второстепенные персонажи адекватны и по-настоящему поддерживают пару.", "tags": ["современный роман", "СЛР", "новогоднее настроение", "лёгкое чтение"], "links": [], "date": "2025-12-29", "review": "#Солодкова_читает #Дневник_читателя\nЛАДА ШВЕДОВА «УЗНАЙ МЕНЯ, ЕСЛИ СМОЖЕШЬ»\nАннотация:\nСаша не хотела ничего дурного!\nОна всего-то начала переписку с самым популярным парнем их универа – Антоном Орешиным. Переписку… с чужого аккаунта. Но это была случайность, абсолютная и стопроцентная! А вот влюбленность в обаятельного Антона – уже нет. Но как быть, если в жизни Саша – вовсе не та девушка, на которую парень вроде Антона обратит внимание, пусть до этого и говорил с ней ночи напролет? Как быть, если рассказала ему так много всего, но от лица другого человека? Тут бы самой не запутаться в паутине лжи.\nВсе по местам расставят только горы. И Новый год, конечно.\n\nХотите милую, добрую, забавную, романтическую новогоднюю историю? \nВот такую я сегодня прочла —  и вам рекомендую. 😉\n\n⬇️\n\n⬆️\nЭто СЛР (современный любовный роман), а их я в принципе читаю редко. Но вот захотелось перед Новым годом чего-то легкого, но при этом хорошо написанного. Поэтому я не стала тыкать пальцем в небо и брать книгу кого-то незнакомого, а пошла проверенным путем.\n\nЛада Шведова — это Карина Вальц, если вы не знали. Насколько мне известно, автор этого не скрывает, потому и я говорю во всеуслышание)) \n\nИтак, новогодняя история под Новый год от отличного автора — то, что доктор прописал. Надо брать, решила я. И не прогадала.\n\nПро чудесный язык и грамотность текста, пожалуй, соловьем разливаться не стану. Мне очень нравится, как пишет автор, и эта книга не стала исключением, а история затянула с первых строк.\n\nСюжет, конечно, не нов, но я всегда говорила и буду говорить: сюжет в книге не самое главное, куда важнее, как она написана. И здесь мне очень понравилось как раз то, что вроде бы, на первый взгляд, стандартная романтическая история про студентов написана так, что общепринятых клише в ней в итоге и нет.\n\nПеред нами изначально предстают популярный мальчик и обычная «серомышная» девушка...\n\nВот только в процессе выясняется, что парень популярен в основном своим подкастом. Да, у него хорошо подвешен язык, но при этом многие считают его балбесом с тупыми шутками и мозгом пятилетки. \n\nИ да, он, слава тебе господи, не мажор, не альфа-самец и даже не мачо-мэн. Спасибо, дорогой автор. Бальзам, честное слово, бальзам на душу.\n\n«Серомышная» героиня тоже оказывается не такой уж «серомышной». Не королева бала, но и не страдалица, не принимаемая обществом. Обычная девчонка со своими увлечениями.\n\nИ точно так же, как герой у нас не мажор-миллионер, героиня у нас не бедная Золушка, работающая на трех работах, как это часто бывает в книгах такого жанра.\n\nБолее того, у героини полная счастливая семья! И, надо же, тоже не олигархи. \n\nИ даже родители у героини норм-маль-ные! И с детьми своими общаются. Ну чудо просто расчудесное. \n\nА еще у героини есть подруга. И она не пытается ее подставить, увести парня или наделать за спиной каких-нибудь гадостей. Она действительно Подруга — именно так, с большой буквы, и так, как это и должно быть.\n\nУ героя тоже есть настоящие, хорошие друзья. Такие, которые готовы рвануть с другом в горы, потому что он, дурак такой, влюбился, и ему туда срочно надо — за ней. \n\nИ никто из этих друзей на героиню не имеет видов. \n\nИ одногруппницы-разлучницы тут нет. \n\nИ антагонистов вообще нет. Представляете? А все равно не скучно!\n\nКроме того, мне понравилось описание зимних видов спорта. Сразу видно, что автор понимает, о чем пишет. Лично я вообще далека от сноубордов, подъемников и гор, и мне было интересно. И верибельно, да.\n\nА еще я очень понимала брата героини. Я в нем, можно сказать, узнавала себя: ну не хочу я на горнолыжку, что вы все вечно меня на нее тащите?))\n\nВ общем, отлично провела время с книгой. \nЕсли хочется чего-то веселого, доброго, романтичного и при этом новогоднего — читайте, искренне рекомендую.\n\nP.S. Читала на Литнете.\n#Солодкова_читает #Дневник_читателя"}, {"source": "solodkova", "title": "«Принцесса, подонки и город тысячи ветров»", "book_author": "Анна Ледова", "summary": "Криминальное фэнтези про Принцессу Дна — девушку, потерявшую в детстве титул и семью и построившую новую жизнь среди воров и убийц, — которая ведёт расследование странных убийств вместе с новым начальником городской охраны. Рецензентка называет автора «открытием уходящего года», особо хваля тщательно проработанную систему магии и достоверную иерархию криминального мира, отмечая лишь небольшие логические нестыковки перед финалом.", "tags": ["фэнтези", "криминальный сеттинг", "детектив", "магия"], "links": [], "date": "2025-12-22", "review": "#Солодкова_читает #Дневник_читателя\nАННА ЛЕДОВА «ПРИНЦЕССА, ПОДОНКИ И ГОРОД ТЫСЯЧИ ВЕТРОВ»\nАннотация:\nЛишившись в детстве семьи, титула и дома, я пустилась в бега. И вот спустя восемь лет я – Принцесса. Мое королевство - Дно, криминальная часть города. Здесь не знают жалости, и у подонков нет прошлого. Здесь, среди убийц и воров, я и строю свою новую жизнь. Со Дна ведь выдачи нет.\nС недавних пор город лихорадит от странных убийств – кто-то посмел тронуть наших. А еще появился он – новый начальник городской охраны, и грозит тюрьмой, если не соглашусь помочь. И теперь мне предстоит вести с ним расследование, лавируя между криминалом и законом.\nМне больше нечего терять. Разве что… свое сердце?\n\nМнение👇🏼\n\n⬇️\n\n⬆️\nНу что ж, друзья, начну свою рецензию немного пафосно: Анна Ледова — мое открытие уходящего года!\nВторая прочитанная у автора книга, и она, книга:\nа) классная;\nб) совершенно не похожа на предыдущую.\n\nЯзык/стиль\nПрекрасно! На весь текст встретила одну опечатку. Читается быстро и плавно, текст летит, ритм строго выдержан. Картинка перед глазами складывается.\n\nМир/обстановка\nВ прошлой прочитанной книге описаний было минимум, оно и понятно — мир-то наш. При слове «парк» каждый представит себе парк по соседству. При слове «офис» — вспомнит тот, где когда-то бывал или работал. Здесь же перед нами другой мир, и автор описывает его сполна. Причем описания эти не похожи на вступление к «Звездным войнам», где если понял за десяток абзацев мироустройство, то молодец. Автор мастерски дозирует информацию, погружая нас в выдуманный мир все больше и больше, да так, что он кажется совершенно реальным. \nПроработка мира, на мой взгляд, в этой книге вообще выше всяких похвал. Магия, ее виды, как она работает, как ей обучаются — уделено время всему. Терпеть не могу, когда в книгах магия это «вжух — готово». Здесь же магия — это система, полная подводных камней и нюансов.\nА устройство Дна! Особые жесты, иерархия, слэнг — великолепная проработка. Верю!\nА сколько в книге названий: городов, улиц, ветров, каких-то магических явлений и артефактов! Кстати, от меня отдельное спасибо, что большинство из терминов не поясняется больше сносок богу сносок (нет!), зато прекрасно ясны по контексту. Что делает мир еще более реальным и выпуклым.\n\nГерои\nО, их тут много, и они все разные. Как по мне, персонажи психологически получились совершенно достоверными, причем как главные, так и эпизодические. Многие обитатели Дна описаны вообще буквально парой штрихов, но эти штрихи такие четкие, что персонажи воспринимаются абсолютно живыми.\nГероиня — сильная и смелая, но она тоже ошибается и порой боится.\nГерой — умный и решительный, но иногда тупит не по-детски))\nГлавгад — гад, бесспорно, но не абсолютное зло, которое время от времени заливается дьявольским хохотом. Он умен, расчетлив, жесток, если этого требуют обстоятельства. Он не убивает походя, не мучает котят и не отрывает крылышки мухам. Достойный главгад, в общем.\n\nИнтрига\nЛихо закручена. Понравилось, что в первой трети книги таки есть место сомнениям, кого из двух претендентов на ее сердце выберет героиня (или никого?). Много совершенно непредсказуемых поворотов сюжета. Главгада я угадала где-то во второй половине книги, до этого думала про этого персонажа не очень хорошо, предполагала, что он гад, но что самый-самый, нет, долго не догадывалась.\n\nМинусы\nКнигу я прочла за один день, а это 18 а.л., на минуточку. Так что читала, почти не отрываясь. Видела, что многие читатели отнесли к минусам книги открытый финал. Но мне финал понравился — он дает возможность порассуждать и пофантазировать.\nА вот «предфиналье» меня немного царапнуло. Например, что про разлом до его появления «в кадре» не упоминалось прежде (дорогой автор, если упоминалось и это я прошляпила, то заранее прошу прощения). Ну и появление «на сцене» короля… Логично, что король любит деньги и выбирает тот путь, где их можно получить больше. Но, пожалуй, изъяви волю правителя какой-нибудь его секретарь, я поверила бы больше.\nПовторюсь, я читала книгу целый день, не отрываясь. Поэтому описанный момент всего лишь дал пищу для размышлений, но общего впечатления не испортил.\n\nСмыслы\nВот чего-чего, а смыслов в этой истории хоть отбавляй. В истории про Дно есть двойное дно, так сказать. Поднято много социальных и политических проблем, тема отношений детей и родителей и других родственных связей, тема доверия и предательства, порядочности и подлости. Причем подано это все так, что тот, кто ищет для себя эти серьезные темы, он их увидит и прочувствует, а тот, кому это не нужно, просто хорошо проведет время за чтением, следя за динамичным сюжетом. Я всегда во всем ищу смысл и всегда очень рада, когда нахожу многослойную историю, не пустышку.\n\n⬇️\n\n⬆️\nОт себя искренне рекомендую и бью себя по рукам, чтобы не схватить что-то у автора еще — а то уйду в читательский запой надолго))\n\nАвтору спасибо за отличную историю!\n#Солодкова_читает #Дневник_читателя"}, {"source": "solodkova", "title": "«Рута Нортвич, человек и некромант»", "book_author": "Анна Ледова", "summary": "Необычный «обратный попаданец» — могущественный некромант из другого мира оказывается в современной России и вынужден мириться с тем, что здесь его никто не боится, а собственная помощница ещё и указывает ему, что делать. Рецензентка отмечает умный взрослый юмор, полное отсутствие любовной линии как осознанный плюс и по-настоящему неожиданный финал, объясняющий поступки героя.", "tags": ["фэнтези", "юмор", "попаданцы", "независимая книга"], "links": [], "date": "2025-12-21", "review": "#Солодкова_читает #Дневник_читателя\nАННА ЛЕДОВА «РУТА НОРТВИЧ, ЧЕЛОВЕК И НЕКРОМАНТ»\n\nАннотация:\nСлучайно оказавшись в незнакомом мире, великий и ужасный Амарутанис ищет свое место в нем, а заодно способ вернуться домой. Нет, но что за мир!.. Вместо того чтобы в страхе падать ниц перед могучим некромантом, эти ничтожные людишки поклоняются размалеванным певичкам и кускам пластика! Даже собственная помощница смеет указывать ему, что делать! Еще и деньги зарабатывать велит, зараза... О, пельмешки? Ладно, пусть пока живет...\n\nМнение 👇🏼\n\n⬇️\n\n⬆️\nДля первого знакомства с творчеством автора выбрала короткое произведение. Обложка красивая, название приятное, ну и некромантская тема — все как я люблю. Так что долго не колебалась.\n\nВ том, что книга мне понравится, не сомневалась с первых строк. Язык, темп — все это я оценила сразу. Грамотный, приятный текст, погружение в который происходит буквально моментально.\n\nОднако, прочитав аннотацию и пролог, я ждала совершенно не того, что получила. Сама не знаю, чего именно ждала. Но это тот самый случай, когда ошибаться приятно. Автору удалось удивлять меня в каждой главе, и я понятия не имела, куда дальше завернет сюжет. А уж чем закончится! Браво, правда.\n\nИтак, перед нами история о попаданце. Причем попаданце не из нашего мира в магический, а наоборот.\nАмарута́нис Но́ртвичен-Ве́ген Шантира́н (он же просто Рута) — некромант из другого мира. И однажды он вдруг пришел в себя на скамейке в обычном российском парке. А на соседней скамейке сидела женщина. Для него, конечно же, необычная: юбка всего-то до колена, тощая шибко, да и ниц при виде великого мага падать не стала — непорядок!\nНу и завертелось, как говорится.\n\nСюжет пересказывать дальше бессмысленно, поэтому пройдусь по основным моментам, которые я оценила.\n\n1. Язык, манера повествования, о чем я уже, собственно, упоминала.\nВсе это выше всяких похвал (имхо, разумеется). Долгих описаний нет, антуража минимум, тем не менее картинка перед глазами складывается яркая и объемная. А диалоги выглядят по-настоящему живыми и максимально раскрывают характеры персонажей, не перегружая текст громоздкими деталями. Плюс к этому книга великолепно вычитана — не придраться.\n\n2. Прекрасно прописанные образы.\nК сожалению, во многих книгах о попаданцах оттуда сюда чаще всего герои не отсюда отличаются лишь одеждой, прической и тем, что не знакомы с современной техникой. Здесь же Рута действительно отличается от нас мировоззрением. И автор мастерски «держит» его образ до самой последней строчки. Важно, что при этом герой не статичен, он меняется и растет над собой, но в то же время остается все тем же человеком. И в этом для меня не было ни одной фальшивой ноты.\nТо же самое можно сказать обо всех персонажах истории. Даже старушка-уборщица и охранник криминального авторитета, мелькнувшие в тексте всего несколько раз, воспринимаются совершенно живыми и имеют свои отличительные черты.\n\n3. Юмор. \nОн в этой книге действительно есть. И это юмор взрослый, приятный и, на мой вкус, действительно смешной. Не такой, как бывает в ситкомах с закадровым смехом, если вы понимаете, о чем я).\n\n4. Отсутствие любовной линии.\nДля кого-то это, должно быть, станет минусом, но для меня стало несравненным плюсом. Потому что здесь ЛЛ была бы совершенно неуместна да и лишила бы эту историю индивидуальности.\n\n5. Неожиданный финал.\nДа, я сразу сказала, что для меня многое в сюжете стало неожиданностью. Но финал удивил так удивил. Не совсем финал даже, а то, что выяснилось незадолго до этого. \nВозраст великого мага меня впечатлил и все расставил на места, заставив посмотреть на многие его поступки и слова по-другому.\n\nОт меня — высший балл и искренняя рекомендация читать.\nНу а я, как будет время, обязательно продолжу знакомство с творчеством автора.\n#Солодкова_читает #Дневник_читателя"}, {"source": "solodkova", "title": "«Хлам»", "book_author": "Юля Тихая", "summary": "Глубокая young-adult история про девушку Ани, живущую на Свалке без памяти о прошлом, и парня Криса, чьего отца-учёного арестовали по абсурдному обвинению — оказывается, у героев гораздо больше общего, чем можно представить. Рецензентка отмечает отсутствие классических злодеев: только Система и люди, однажды свернувшие не туда, и хвалит честное раскрытие темы «принудительного добра» со стороны взрослых.", "tags": ["young adult", "драма", "антиутопия", "психологическая проза"], "links": [], "date": "2025-10-26", "review": "#Солодкова_читает #Дневник_читателя\nЮЛЯ ТИХАЯ «ХЛАМ»\nАни живёт на Свалке — потому что только там есть место для ненужных вещей и людей. Она сортирует сломанную технику, отстреливает кислотных крыс и украшает бумажными гирляндами старый минивэн, который служит ей домом.\nДля таких, как Ани, в мире нет будущего. Но именно ей не повезло подружиться с неразговорчивым парнем, изгоем даже в центре для проблемной молодёжи. Крис всего-то хочет помочь отцу защититься от абсурдных обвинений полиции, но все его усилия только вытаскивают на поверхность новые и новые тайны.\nА ещё в голове Криса спрятан большой секрет. И для кого-то он будет очень дорого стоить.\n\nМнение 👇🏼👇🏼👇🏼\n\nОчередная глубокая, многослойная история от Юли Тихой. Впрочем, других у Юли, кажется, не бывает.\n\nЯ начинала читать книгу в процессе, но не выдержала. Не потому что не понравилось, а потому что хотелось получить все и сразу. И вот я наконец-то добралась до этой истории, чтобы прочесть целиком. Не отрываясь, да.\n\nИтак, о чем же книга?\nЕсть девочка Ани девятнадцати лет от роду, и последние полтора года она живёт на Свалке — потому что ничего не помнит о том, кем была раньше. Ведь Свалка на то и Свалка, чтобы принимать тех, кому некуда идти…\n\nА есть восемнадцатилетний мальчик Крис, у которого недавно арестовали отца, учёного, занимающегося какими-то нейроразработками. Самого же Криса поместили в Центр реинтеграции (этакая смесь детдома и реабилитационного центра, выйти откуда можно, только сдав экзамены и доказав свою адекватность и готовность к взрослой жизни).\n\nИ когда эти двое встретятся, обнаружится, что у них гораздо больше общего (общих проблем в том числе), чем и они, и читатели могли бы представить...\n\nПожалуй, на этом рассказывать о сюжете я остановлюсь. Сюжет, бесспорно, лихо закручен и не раз выдаёт вотэтоповороты, но, мой взгляд, многое в этой истории гораздо важнее сюжета - люди и их отношения.\n\nДа, прежде всего это история о людях, как бы банально (или пафосно?) это ни звучало. О том, как они справляются со своей болью, сложными жизненными обстоятельствами, внутренними демонами. Или... не справляются.\n\nАвтор показывает нам разные судьбы и разные характеры. Иногда останавливаясь на ком-то подробно, иногда скорыми мазками — но картинка складывается, все персонажи книги выглядят совершенно живыми, даже если они ни разу не появляются \"в кадре\", а лишь упоминаются в разговоре главных героев.\n\nВ этой книге нет антагонистов, нет злодеев в классическом понимании этого слова. Есть Система, а есть люди, однажды свернувшие не туда, но никто — совершенно никто! — не является абсолютным злом.\n\nИ очень здорово, что автор именно показывает этих людей, подходит с разных сторон, раскрывая грани их характеров и тайны прошлого, но никого не осуждает. Благодаря чему мнение читателей о персонажах постоянно меняется, а узнавание их становится более полным.\n\nКнига дает задуматься, как много травм тянется за нами с детства, остаётся с нами и формирует нас как личности. И в то же время показывает, что прошлое не приговор, а каждый в силах взять судьбу в свои руки.\n\nАвтор мастерски поднимает тему выбора и тему насильного причинения добра. Всегда ли такое добро во благо? И сотрудники Центра, и родители и Криса, и Ани (каждый по-своему) желают детям добра. Но что из этого получается?..\n\nНа родителях героев мне бы хотелось остановиться отдельно. Так как я начинала книгу в процессе и отложила, то читала комментарии других читателей. О том, какой ужасный папа у Криса, сетования о том, как он мог так поступить с сыном, и так далее. О том, как не повезло с родителями Ани и как ей все сочувствуют.\n\nНо знаете что? Я ничего такого не увидела. Я увидела ЛЮДЕЙ, со своими достоинствами и недостатками. Да, и те и другой натворили дел, руководствуясь своим пониманием \"во благо\", но они любят своих детей. Пусть по-своему и иногда неправильно, но любят. И лично я была очень рада прочесть, что Ани все же приняла решение поддерживать отношения с матерью.\n\nПонравилось, как автор показывает, что люди очень любят придумывать свои истории про других и вешать на этих других ярлыки (Карен с ее онлайн-фермой), понятия не имея, что произошло на самом деле, и не задумываясь, что рассказать им правду, даже защищаясь, может быть очень больно...\n\nНу и, конечно, не могу не похвалить авторский мир с его природными изменениями, таунами и прочим мироустройством — реалистично, верю. Свалка - вообще выше всяких похвал.\n\nЛюбовная линия в книге тоже есть, и она также очень правдоподобна. И я рада, что ребята в итоге остались вместе.\n\nКнига вышла по-настоящему глубокой и интересной.\nОт себя - искренне рекомендую. \n#Солодкова_читает #Дневник_читателя"}, {"source": "solodkova", "title": "«В расчёте на любовь»", "book_author": "Марианна Красовская", "summary": "Ромфант про Альмиру — разочарованную в любви трижды разведённую женщину, решившую впредь строить отношения только по расчёту, но обнаруживающую, что жизнь снова подкидывает ей чувства и опасности. Рецензентка хвалит неоднозначную, живую героиню без картонных «идеальных» черт и приятно отмечает отсутствие клишированной коварной соперницы или злой свекрови.", "tags": ["ромфант", "магический мир", "независимая книга (цикл)"], "links": [], "date": "2025-08-13", "review": "#Солодкова_читает #Дневник_читателя\nМАРИАННА КРАСОВСКАЯ «В РАСЧЕТЕ НА ЛЮБОВЬ»\nАннотация:\nЯ разочаровалась в любви. Первый мой мужчина изменил мне через неделю после свадьбы, второй — оставил внебрачного сына. Третий отправил в почетную отставку, да еще поручил найти невесту своему наследнику. Проще говоря — сослал в далекую провинцию. Что же, я и в столице покорила самого государя, и на водах не пропаду, тем более я богата, красива и уверена в себе. Все икшарские князья будут у моих ног! Отныне — все отношения толь

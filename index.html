ге Юли Тихой «Погода нелётная».\nНо нам ведь не надо коротко, правда?))\nК творчеству автора приглядываюсь давно. Начать собиралась, честно говоря, совсем с другой книги и даже сунула туда нос, но отложила, потому что оборотни и истинность вообще не моя тема (поправочка: это я так думала, пока ничего у автора не читала, теперь обязательно прочту). И вот мой выбор пал на «Погоду нелётную».\nСобственно, что это будет не стандартная лавстори, каких сейчас тысячи, я не сомневалась уже по обложке (классная!) и по аннотации. В том, что мне хочется читать про войну, уверена не была. Но все же рискнула.\nИ не пропадала.\nИтак, история начинается с будней Маргареты, смотрителя метеорологической станции. И у Маргареты есть график: в определённое время она пьёт чай, в определённое — смотрит в небо за полётом почтовых драконов и в определённое же поднимается в небо сама на стареньком виверне (тут это некая смесь дракона и летучей мыши размером с лошадь), чтобы оценить погодные условия. Жизнь Маргареты однообразна и размерена. У неё свой маленький мирок, где больше нет ни своей, ни чужой боли. И ей искренне кажется, что так гораздо легче. Она и сама будто превратилась в тень — во множество теней, у каждой из которой своя функция, простая и понятная — строго по расписанию.\nНо все меняется, когда в лесу неподалеку от станции терпит крушение наездник виверны, мало того что герой недавно отгремевшей войны, так ещё и старый знакомый Маргареты.\nТак начинается история.\nПрежде всего хочу отметить язык книги — он прекрасен. Вроде бы автор и не растекается мыслью по древу, не даёт длинных описаний, но в тексте так много мелких и в то же время значимых деталей, что картинка перед глазами встаёт по-настоящему объёмная, настолько, что кажется, её можно потрогать руками.\nГерои не просто общаются — они двигаются, меняются оттенки их голоса, манера речи в зависимости от настроения. Они падают, спотыкаются, им в лицо летит ветер и дождь — живо и необычайно кинематографично.\nПеред нами фэнтези-история. Фэнтези же? Виверны, драконы, ментальное слияние с животными. Кроме того, мир явно авторский, причём оригинальный, необычный, со своим устройством — опять же описанный штрихами, но в то же время яркий и понятный. И тем не менее фэнтези здесь — лишь красивая обёртка. Прежде всего эта книга о людях, обычных людях, таких же, как мы с вами, и о реальных проблемах, боли и травмах таких же людей.\nПерсонажи у автора выписаны мастерски. Они действительно цельные, со своими чувствами, порывами, ошибками и заблуждениями. Они неидеальны, но именно это и делает их живыми.\nИстория, по сути, камерная. Основное действие происходит на богом забытой станции, а перед нами предстают лишь два персонажа. И, если взглянуть в текст поверхностно, может показаться, что в книге ничего толком и не происходит. Но это вовсе не так.\nПризнаюсь, буквально через пару прочитанных глав и я поймала себя на мысли: а о чем там ещё? Ну, встретились два одиночества, есть у них чувства. Как говорится, любите и размножайтесь, дети мои, все ж ясно. Однако все. Далеко не все. А автор умело раскручивает спираль напряжения, погружая читателя в водоворот воспоминаний о прошлом героев, попутно вскрывая все больше и больше их... нет, не зарубцевавшихся — загноившихся душевных ран.\nИ чем дальше читаешь, тем больше понимаешь, что не только фэнтези — верхний слой этой истории. Даже Макс и Маргарета — это один из верхних слоев. Потому что эта история не о персонажах, не об их конкретной жизненной ситуации — она о войне. Не о той фэнтезийной и не о какой-то конкретной. Она о войне в целом. О том, что по каким бы причинам и с кем бы война ни была, кто прав, а кто виноват, война — это всегда боль, грязь и искалеченные судьбы.\n\nА ещё это история о том, что не после каждой темной ночи приходит рассвет — иногда надо мириться с окружающей (а заодно поселившейся внутри тебя) тьмой и не надеяться на чудо — зажигать светильники самим. Вопреки. Не ждать будущего и не прощаться с ним, признать, что будущее уже наступило, и строить его дальше — здесь и сейчас.\nЭто было сильно. Это было глубоко. Это не похоже на то, что сейчас пишут. Но как раз то, что сейчас особенно нужно.\nКнигу искренне рекомендую."}, {"source": "solodkova", "title": "«Плохая учительница, хороший снайпер»", "book_author": "Юлия Стешенко", "summary": "Фэнтези про драконоборца-снайпера Хизер Деверли, которую после конфликта с высокопоставленным генералом отправляют преподавать в провинциальную магическую академию для будущих охотников на драконов. Рецензентка отмечает мастерски выписанных многочисленных персонажей — восемь главных героев и десяток второстепенных — и то, что книга в первую очередь о дружбе и ответственности, а не о романтике.", "tags": ["фэнтези", "магическая академия", "драконы", "независимая книга"], "links": [], "date": "2024-10-17", "review": "#Солодкова_читает #Дневник_читателя \nЮЛИЯ СТЕШЕНКО «ПЛОХАЯ УЧИТЕЛЬНИЦА, ХОРОШИЙ СНАЙПЕР»\n👇🏻\n\nАннотация:\nХизер Деверли - профессиональный охотник на драконов. Но теперь она вынуждена читать лекции по драконоборству в провинциальной магической академии. Ужасный коллектив, ужасные студенты и ужасные условия работы. Но Хизер не боится трудностей. Это трудности боятся Хизер. И правильно делают.\n\nНаконец-то я добралась до нового романа Юлии Стешенко. Я уже говорила, что очень люблю творчество автора? Наверняка говорила, но скажу еще раз: обожаю книги Юлии. И новая прочитанная снова не разочаровала.\n\nПризнаюсь, прочтя название, я ожидала чего-то совершенно другого. Наверное, историю про учительницу и снайпера)) Уж не знаю почему, но в моей голове учительница и снайпер из названия были двумя разными людьми. Ну а что? Встречаются в магической академии из аннотации он — хороший бывший снайпер, она — плохая учительница, и заверте… Ну, вы поняли, фантазия — она такая фантазия. И как же здорово, что мои предположения не оправдались. А стандартные сюжеты — это вообще не про этого автора.\n\nИтак, что мы имеем? Англия, Камелот, дирижабли, фотоаппараты и… огнедышащие драконы. Люди разрабатывают шахты для добычи минералов, содержащих магическую энергию (собственно, за счет которой и летают дирижабли), а драконы эти камни едят (опять-таки, чтобы летать и пыхать огнем). Только у драконов шахт нет, а у людей есть. Ну и дальше логично: драконы нападают на шахты, уничтожая людей, люди — учатся противостоять драконам. \n\nГлавная героиня Хизер Деверли — драконоборец. Конкретно — снайпер. Только вместо винтовки у нее магический жезл. А еще Хизер умна, своевольна и свободолюбива и терпеть не может заносчивых людей. Что и приводит к конфликту с высокопоставленным лицом — генералом Каррингтоном. А дальше — либо увольнение, либо осесть в глуши, пока страсти не улягутся. Начальство Хизер предлагает второе. А она, хоть и не слишком-то держится за свое место, ценит команду, с которой уже сработалась, и потому соглашается на эту авантюру. Почему авантюру? Да потому что Хизер отправляют преподавать в академии для будущих драконоборцев. А Деверли ну вот ни разу не учительница. Правда, это только она так думает)))\n\nТак начинается история. А дальше будет и неожиданная встреча с сыном того самого Карринтона, который, как оказалось, учится на выпускном курсе той самой академии, куда отправляется Хизер. И весьма интересное взаимодействие со студентами. И тренировки тех, кто, казалось бы, не хочет и не способен тренироваться по-настоящему. И проблемы с коллегами. И, конечно же, настоящий дракон.\n\nТексты у Юлии всегда живые и красочные, они легко воспринимаются, быстро читаются и дают по-настоящему объемную картинку происходящего. Поэтому на стиле надолго останавливаться не буду. Скажу только: как всегда великолепно.\n\nОстановлюсь на персонажах. \nПравда, и тут ничем не удивлю — они написаны превосходно. Дело в том, что в книге довольно много действующих лиц. И, несмотря на то что повествование ведется поочередно только с точки зрения Хизер и Алекса Каррингтона, еще шестеро студентов тоже являются практически главными героями романа. То есть у нас перед глазами постоянно восемь главных геров и еще с десяток второстепенно-третьестепенных. Представили? Это действительно немало. Как в них не запутаться? В хорошей книге — очень даже легко.\n\nЧестно говоря, когда в первых главах только происходило знакомство со студентами, я судорожно пыталась запомнить, кто есть кто. Имена, фамилии, прозвища, кто откуда, у кого кто родители. Все это мелькало передо мной калейдоскопом, а память категорически отказывалась фиксировать такое количество новой информации. Но вот она, магия качественного текста — уже через пару глав я стала узнавать каждого героя буквально по нескольким сказанным им фраз. Потому что все персонажи у Юлии действительно разные и со своими отличительными чертами. Темперамент, жесты, мимика, оттенки голоса — все это передано так ярко, что персонажи встают перед глазами как живые. М — мастерство.\n\nТакже мне очень понравилось (и это я всегда особенно ценю в книгах), что герои не статичны — они меняются и растут над собой. И если сама Хизер не так чтобы изменилась и осталась верна себе, то семеро студентов не только научились взаимодействовать друг с другом, но и одержали победу над самими собой.\n\nПонравилось, что, по сути, в этой истории нет антагонистов как таковых. Есть противный ректор, есть мерзкая коллега-учительница, есть напыщенный, закостенелый в своих взглядах генерал. Но все они уж точно не абсолютное зло и даже не относительное — люди со своими достоинствами и недостатками. Да что там, здесь даже драконы вовсе не зло — опасные дикие животные, и только. Но даже их поступки и охота на людей автором прекрасно объяснены.\n\nЛюбовная линия в книге тоже есть но… Пожалуй, «любовная» здесь все же не то слово — слишком оно громкое. На этапе окончания повествования у героев еще не любовь, а симпатия и взаимное влечение. Но даже если бы такой линии не было бы и вовсе, эта история мало бы что потеряла. Потому что эта книга прежде всего о дружбе, о взаимовыручке, о умении нести ответственность за свои слова и свои поступки, о том, как важна поддержка, особенно от самых близких, и как порой ошибочно считать, что ты знаешь лучше, как кому-то жить, пусть даже этот кто-то — твой собственный ребенок.\n\nЕдинственным для меня недостатком стала разве что некая недосказанность. Например, я бы не отказалась узнать, как в итоге отец принял решение Алекса, на какой ноте они расстались и как так вышло, что фамильяром Каррингтона-младшего стал волкодав, а не лев, с которым он очень долго пытался совладать. Но… мечты, мечты, а на все воля автора.\n\nТак что от себя — книгу искренне рекомендую. Моими любимчиками у автора по-прежнему остаются «Подоконник» и «Баллада о неудачниках», тем не менее «Учительницу» прочла с интересом и удовольствием и, как только Юля допишет свою новую книгу, обязательно буду читать и ее.\n\nВ общем, Стешенко для меня must-read. Чего и вам желаю))\n\nВсем добра и хороших книг.\n\nТатьяна С."}]</script>

    visible.forEach(([tag, count]) => {
      const btn = document.createElement('button');
      btn.className = 'chip' + (state.tags.has(tag) ? ' active' : '');
      btn.innerHTML = `${escapeHtml(tag)}<span class="count">${count}</span>`;
      btn.addEventListener('click', () => {
        if (state.tags.has(tag)) state.tags.delete(tag);
        else state.tags.add(tag);
        renderTags();
        renderClear();
        renderGrid();
      });
      tagRow.appendChild(btn);
    });
    if (sortedTags.length > PRIMARY_TAG_COUNT) {
      const more = document.createElement('button');
      more.className = 'chip-more';
      more.textContent = tagsExpanded ? 'свернуть' : `ещё ${sortedTags.length - PRIMARY_TAG_COUNT} тегов…`;
      more.addEventListener('click', () => { tagsExpanded = !tagsExpanded; renderTags(); });
      tagRow.appendChild(more);
    }
    const clearBtn = document.createElement('button');
    clearBtn.className = 'clear-btn' + ((state.tags.size || state.query || state.author !== 'all') ? ' show' : '');
    clearBtn.id = 'clearBtn';
    clearBtn.textContent = 'Сбросить фильтры ×';
    clearBtn.addEventListener('click', () => {
      state.tags.clear();
      state.query = '';
      state.author = 'all';
      searchInput.value = '';
      [...authorToggle.children].forEach(b => b.classList.toggle('active', b.dataset.author === 'all'));
      renderTags();
      renderGrid();
    });
    tagRow.appendChild(clearBtn);
  }

  function renderClear() {
    const btn = document.getElementById('clearBtn');
    if (btn) btn.classList.toggle('show', !!(state.tags.size || state.query || state.author !== 'all'));
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function hostFromUrl(url) {
    try {
      const h = new URL(url).hostname.replace(/^www\./, '');
      return h.split('.')[0];
    } catch (e) { return 'link'; }
  }

  const LINK_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14 21 3"/></svg>';
  const CHEVRON_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>';

  function reviewToParagraphs(text) {
    return text
      .split(/\n\s*\n/)
      .map(p => p.trim())
      .filter(Boolean)
      .map(p => `<p>${escapeHtml(p).replace(/\n/g, '<br>')}</p>`)
      .join('');
  }

  function matches(book) {
    if (state.author !== 'all' && book.source !== state.author) return false;
    if (state.tags.size) {
      const hasAny = [...state.tags].some(t => book.tags.includes(t));
      if (!hasAny) return false;
    }
    if (state.query) {
      const q = state.query.toLowerCase();
      const hay = (book.title + ' ' + book.book_author + ' ' + book.summary + ' ' + book.tags.join(' ')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  }

  function sortBooks(list) {
    const copy = [...list];
    if (state.sort === 'new') copy.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    else if (state.sort === 'old') copy.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
    else if (state.sort === 'title') copy.sort((a, b) => a.title.localeCompare(b.title, 'ru'));
    return copy;
  }

  function renderGrid() {
    const filtered = sortBooks(DATA.filter(matches));
    resultCount.textContent = filtered.length === DATA.length
      ? `Показаны все ${DATA.length} рекомендаций`
      : `Найдено: ${filtered.length} из ${DATA.length}`;

    if (!filtered.length) {
      grid.innerHTML = `<div class="empty-state"><div class="big">🔍📖</div>Ничего не нашлось. Попробуйте изменить запрос или сбросить фильтры.</div>`;
      return;
    }

    grid.innerHTML = filtered.map(book => {
      const linksHtml = (book.links || []).slice(0, 5).map(url =>
        `<a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer" title="${escapeHtml(hostFromUrl(url))}">${LINK_ICON}</a>`
      ).join('');
      const tagsHtml = book.tags.map(t => `<span class="tag-pill">${escapeHtml(t)}</span>`).join('');
      const dateLabel = book.date ? formatDate(book.date) : '';
      const hasReview = !!(book.review && book.review.trim());
      const reviewToggleHtml = hasReview ? `
          <button class="review-toggle" type="button">
            <span class="toggle-label">Читать оригинальный пост</span>${CHEVRON_ICON}
          </button>
          <div class="review-full">${reviewToParagraphs(book.review)}</div>` : '';
      return `
        <article class="card" data-source="${book.source}">
          <div class="card-head">
            <div>
              <h3 class="card-title serif">${escapeHtml(book.title)}</h3>
              ${book.book_author ? `<p class="card-author">${escapeHtml(book.book_author)}</p>` : ''}
            </div>
            <div class="card-date">${dateLabel}</div>
          </div>
          <p class="card-summary">${escapeHtml(book.summary)}</p>
          <div class="card-tags">${tagsHtml}</div>
          <div class="card-foot">
            <span class="source-badge">${AUTHOR_LABEL[book.source]}</span>
            <div class="card-links">${linksHtml}</div>
          </div>
          ${reviewToggleHtml}
        </article>`;
    }).join('');
  }

  function formatDate(iso) {
    const months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
    const [y, m, d] = iso.split('-');
    return `${parseInt(d,10)} ${months[parseInt(m,10)-1]} ${y}`;
  }

  searchInput.addEventListener('input', debounce(() => {
    state.query = searchInput.value.trim();
    renderClear();
    renderGrid();
  }, 120));

  authorToggle.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    state.author = btn.dataset.author;
    [...authorToggle.children].forEach(b => b.classList.toggle('active', b === btn));
    renderClear();
    renderGrid();
  });

  sortSelect.addEventListener('change', () => {
    state.sort = sortSelect.value;
    renderGrid();
  });

  grid.addEventListener('click', (e) => {
    const btn = e.target.closest('.review-toggle');
    if (!btn) return;
    const card = btn.closest('.card');
    const nowExpanded = !card.classList.contains('expanded');
    card.classList.toggle('expanded', nowExpanded);
    const label = btn.querySelector('.toggle-label');
    label.textContent = nowExpanded ? 'Свернуть' : 'Читать оригинальный пост';
    if (nowExpanded) {
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  });

  function debounce(fn, ms) {
    let t;
    return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
  }

  renderTags();
  renderGrid();
})();
</script>

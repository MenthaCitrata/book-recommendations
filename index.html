ю не в плане эротики, а в плане атмосферы и реалистичности мира, в который погружаешься, историю.\n\nГлавная героиня истории – Тина – очень одинока, несмотря на 6 кошек, живущих в её огромном пустом доме. Тина работает в библиотеке, Тина кормит кошек, и Тине невыносимо её существование. Она словно в тумане, словно в паутине обыденности. И так ей тошно становится в один момент, что она однажды кричит с моста реки – «Забери меня отсюда!».\nИ с этого момента в жизни Тины начинают происходить жутковатые и невероятные события.\n\nМне очень понравилось, как Софья описывает выход из того депрессивно-безразличного состояния, в котором Тина пребывала. Всё это идет фоном, штрихами к сюжету – сначала она начинает чувствовать запахи, затем – вкус кофе, замечать людей, делать добрые поступки, ощущать текстуру тканей и материалов. Вокруг неё собираются люди, которым она оказывается нужна. Это сделано очень филигранно. И в конце концов как апофеоз пробуждения случается любовь)\n\nГлавный герой – Кённа, одновременно могущественное и древнее существо и в то же время почти подросток, и это всё становится понятным, когда мы узнаем его историю. Он тоже одинок, несмотря на то, что его жизнь тесно связана с жизнью города, и он тоже находит свою стаю.\n\nА пока Тина ищет выход из своей невыносимой жизни, в городе начинают происходить страшные вещи. Из морга пропадает мертвец, чьё сердце продолжает биться на льду, в городе нашествие черных крыс, а знакомые люди начинают вести себя не по-человечески.\n\nОчень рекомендую для всех, кто любит неспешные вступления, драматичное развитие событий, микс забавных и жутких эпизодов, полновесное повествование и всех персонажей, включая второстепенных, со своим лицом и историей.\nОгромное спасибо Софье!\n\nАннотация:\nУ Тины Мэйнард лучшая в мире семья – шесть кошек, прибившихся к порогу. У неё полно друзей – сумасшедшая девчонка по соседству и тысячи книг. Есть и работа мечты – в провинциальной библиотеке, в компании стервы и престарелого ловеласа. \nУ Тины Мэйнард всё прекрасно. \nА когда она устанет убеждать себя в этом, то скажет на мосту над тёмными водами Кёнвальда: «Пожалуйста, кто-нибудь, забери меня отсюда». \nИ река услышит. \nРека придёт за ней.\n\n#авторчитаетирекомендует #СофьяРолдугина"}, {"source": "kotova", "title": "«Встречная-поперечная»", "book_author": "Антонина Циль, Анна Вронацкая", "summary": "Славянско-имперская фэнтези-история про Марию, преподающую языки Поперечья — мира кикимор, леших и водяных, — которая расследует тайну гибели отца и получает в наследство загадочное поместье бабушки-дворянки. Автор дочитала книгу до конца и подтверждает первое впечатление: «очень-очень хорошо».", "tags": ["фэнтези", "славянские мотивы", "тайны", "независимая книга"], "links": ["https://litnet.com/ru/book/vstrechnaya-poperechnaya-b450964", "https://www.litres.ru/book/anna-vronackaya/vstrechnaya-poperechnaya-69793849/", "https://litmarket.ru/books/vstrechnaya-poperechnaya-1"], "date": "2024-05-01", "review": "#авторчитаетирекомендует\n\nПо совету Иры Зволинской, кажется, нашла новый бриллиант. «Встречная-поперечная» от Антонины Циль и Анны Вронацкой.\n\nПока прочитала четверть, но это бесконечно атмосферно, свежо и необычно. Славянско-имперский сеттинг, Поперечье как обозначение мира нечисти/нежити, героиня Мария, преподающая языки поперечья: кикимор, леших, водяных и т.п., тайна, связанная с её погибшим отцом и поместье, доставшееся в наследство от бабушки-дворянки, с которой отец не общался.\n\nПрямо очень хорошо.\n\nНадеюсь, дальше уровень не упадёт. Как дочитаю, будет более полный отзыв.\n\nЧитаю на Литнет.\nЕсть на ЛитРес и Литмаркете.\n\nЧитали? Как вам книга?\n\nДобавлено: дочитала до конца, мнение не изменилось. Очень-очень хорошо. С удовольствием почитала бы еще истории по этому миру, мир очаровательный.\nСпасибо огромное авторам за классно проведенное время!"}, {"source": "kotova", "title": "«Невеста из холмов»", "book_author": "Янка Лось", "summary": "Тёплая, медитативная и почти лишённая любовного «стекла» история о дружбе, студенческом братстве и связи времён на стыке мира людей и мира Ши. Автор сравнивает атмосферу книги с творчеством Элеоноры Раткевич и Оксаны Демченко и называет её «книгой для тихого счастья и утешения».", "tags": ["фэнтези", "доброе чтение", "дружба", "дебютный роман"], "links": ["https://litmarket.ru/books/nevesta-iz-holmov-1", "https://www.litres.ru/book/yanka-los/nevesta-iz-holmov-70448833/", "https://www.labirint.ru/books/1005694/"], "date": "2024-03-23", "review": "#авторчитаетирекомендует\n\nСегодня мою душу согрела и излечила книга соавторского дуэта  @yuuhi_hi Янка Лось \"Невеста из холмов\" . Я крайне настойчиво рекомендую. \nВ электронке есть на ЛитМаркет https://litmarket.ru/books/nevesta-iz-holmov-1\nИ на Литрес, но там еще предзаказ до 29 марта https://www.litres.ru/book/yanka-los/nevesta-iz-holmov-70448833/, есть в бумаге https://www.labirint.ru/books/1005694/\n\nЯ долго откладывала чтение \"Невесты\", и сегодня я поняла почему. Она ждала этого дня. Именно она мне оказалась нужна сегодня - с ее волшебством, образностью, светом, пронизанная добром. Эта книга вышла в ромфантовской серии, но, хотя любовь есть, книга не только об этом. Здесь нет стекла и пиков-поворотов, связанных с любит-не любит. Прелесть этой книги в другом.\n\nОна о дружбе, в том числе о студенческом и академическом братстве, о связи времен, о том, как разнится мир Ши и мир людей и при этом как много у них общего. Это неспешное, но при этом полное смысла повествование, уютное, несмотря на присутствующее зло, теплое, медитативное, согревающее. Книга будто окутала меня одеялом, согрела объятьями. Очень трогательная, где-то философская, светлая.\nЕсли вы читали книги Элеоноры Раткевич и Оксаны Демченко, то у Янки Лось тот же флер доброты и чистоты. Мягкий, чуть горьковатый, солнечный свет. Мягкий и добрый юмор. И при этом книга далеко не простая. Я обязательно буду к ней возвращаться и с удовольствием почитаю другие книги по этому миру.\n\nВ \"Невесте\" есть и то, что отличает хорошие книги. Ощущение большого мира и истории за сюжетом. Живые герои, без картона и схематичности.\n\nА еще я влюбилась в... так, это уже спойлер. Скажу так, в воина Ши с узорами на теле, который мудростью и юмором напомнил мне Четери)). \n\nКрайне рекомендую эту книгу для тихого счастья и утешения. Очень хороша.\n\nЯнка Лось обещает скоро начать выкладку на Литмаркете второй книги по миру, я обязательно сообщу об этом.  \nИ, друзья, так как авторы - дебютанты, а \"Невеста из холмов\" - их первая книга, им очень важны ваши отклики и комментарии."}, {"source": "kotova", "title": "«Твоя далёкая звезда»", "book_author": "Галина Бахмайер", "summary": "Книга с Самиздата с ошеломляющей концовкой, которую автор канала мечтает переиздать в своей книжной серии — предупреждает, что начало «головоломное», но затем всё встаёт на свои места.", "tags": ["фэнтези", "недооценённая книга", "только на Самиздате"], "links": ["http://samlib.ru/b/bahmajer_g_w/far_far_away.shtml"], "date": "2024-03-12", "review": "Дорогие друзья, читатели и авторы! Мне нужна коллективная память тех, кто жил и читал на Самиздате!\n\nЯ очень бы хотела издать в «Королевской библиотеке» нереально прекрасную, с совершенно ошеломляющей концовкой книгу Галины Бахмайер «Твоя далёкая звезда».\n\nКто не читал – почитайте на Самиздате, не пугайтесь начала, оно головоломное, но потом всё встает на свои места.\n\nА кто читал – может, кто-то знает что-то об авторе? Где она, откуда, может, пишет под другим псевдонимом?\n\n#поболтайка #авторчитаетирекомендует #королевскаябиблиотека_ИК"}, {"source": "kotova", "title": "«Помощница и её писатель»", "book_author": "Анна Шнайдер", "summary": "Лёгкая и забавная история про мать-одиночку Нину, которая теряет работу редактора и устраивается помощницей к странному, но привлекательному писателю с диссоциативным расстройством личности. Автор предупреждает про юмористически-эротическую сцену «ниже пояса».", "tags": ["ромфант", "юмор", "лёгкое чтение", "издательская тематика"], "links": ["https://litnet.com/ru/book/pomoshchnica-i-ee-pisatel-b464721"], "date": "2024-03-05", "review": "Лёгкая и забавная история от Анны Шнайдер «Помощница и её писатель».\n\nСкоро конец, так что я смело вам рекомендую, если хотите отдохнуть и поулыбаться. И получить некоторое представление о работе писателей и издательств)\n\n‼️ Сразу предупреждение – в книге присутствует эротически-юмористическая сцена с юмором слегка ниже пояса, не всем он зайдёт.\n\nГлавная героиня теряет работу из-за происков бывшего поклонника, по совместительству сына директора издательства. И, чтобы было что кушать и чем кормить ребёнка, она принимает предложение поработать помощницей у известного писателя.\nА тот… странненький, с диссоативным расстройством личности, забавным и парадоксальным взглядом на мир – и в то же время очень прямолинейный и привлекательный.\n\nЯ прочитала всё, что выложено на данный момент, жду окончания. \n\n📖 Аннотация:\nНина Маркова – редактор и мать-одиночка. Перед Новым годом она неожиданно осталась без работы по вине сына генерального директора, ещё и с «волчьим билетом».\nУстроиться помощницей к известному писателю Олегу Бестужеву - хороший вариант, тем более если в любое другое место Нину не возьмут. Но есть нюанс...\n\n#авторчитаетирекомендует #АннаШнайдер #ПомощницаИЕеПисатель"}, {"source": "kotova", "title": "«Познакомлюсь с принцем. Не Золушка»", "book_author": "Антонина Циль", "summary": "Добрая сказочная история про современницу, попавшую в тело средней сестры Золушки — с неожиданными версиями всех классических персонажей. Автор особо ценит деликатное раскрытие темы лишнего веса без унизительных штампов, часто встречающихся в похожих книгах.", "tags": ["ромфант", "сказочное фэнтези", "попаданцы", "лёгкое чтение"], "links": ["https://litmarket.ru/books/poznakomlyus-s-princem-ne-zolushka", "https://litnet.com/ru/antonina-cil-u8770907", "https://author.today/u/antonina_tsil"], "date": "2024-03-02", "review": "#авторчитаетирекомендует\nПрочитала книгу Антонины Циль \"Познакомлюсь с принцем. Не Золушка\". \nЗацепилась взглядом за рекламу вконтакте, перешла на текст, сильно ни на что не рассчитывая (название не сильно зашло), и была приятно удивлена мягким приятным языком и хорошим добрым повествованием. С удовольствием прочитала и абсолютно точно рекомендую тем, кому нужна добрая, но не примитивная история для расслабления и отдыха. Буду обязательно читать у автора другие истории, и Антонина Циль идёт для меня в комфортящий набор авторов, к которым с удовольствием возвращаешься. \n\nЯ читала на ЛитМаркете\nhttps://litmarket.ru/books/poznakomlyus-s-princem-ne-zolushka\nНо книга есть и на других ресурсах. \nhttps://litnet.com/ru/antonina-cil-u8770907\nhttps://author.today/u/antonina_tsil\nhttps://litgorod.ru/books/view/2931\n\nЭто история о женщине, попавшей в тело одной из сестёр Золушки. И в ней и сестры, и мачеха, и сама Золушка выглядят очень неожиданно) \nИ в целом книга читается как сказка, без наивности, скорее, с общим налётом волшебства. И принц тут, что немаловажно, нормальный мужик))\n \nАннотация:\n\nСкучно жить было, Танюша? Надоело работать в престижной финансовой компании? Ну радуйся: ты теперь средняя сестра в замке вдовы королевского лесничего. И да, твоя мать - мачеха Золушки, а ты - главный потребитель печенья и пирожных в доме, девушка, под которой прогибается главная лестница.\nА ведь скоро бал, Золушка рвет сказочные шаблоны, а вокруг одни интриги. И еще (крепись, Танечка), чтобы вернуться домой, тебе придется завоевать сердце принца, победить злую колдунью и, самое главное, изменить обе свои жизни, наполнив их новым смыслом!\n\n⬆️\nЕщё очень в книге порадовало одно обстоятельство. 👆Я, как человек, всю жизнь страдающий от расстройств пищевого поведения и оскорбительного отношения из-за лишнего веса, жутко триггерюсь на книги, где используется троп \"попала в тело толстухи и с наскоку научила её родину любить, то есть худеть\".При этом в большинстве таких книг попаданка абсолютно не стесняется в выражениях относительно нового тела, там и бегемотика, и свинота, и жируха и тп, и описывается всё это через ощущение дикого отвращения, презрения и высокомерия. \nЛюдям с лишним весом читать подобное - это примерно как женщинам читать книгу, где автор и герой всеми способами транслирует мысль об убогости, тупости и неполноценности женщин. \nПри этом она резво начинает сидеть на диетах и бегать, и ей это даётся легко и непринуждённо, мол, жрать надо меньше и ура. \nОбычно я такие книги захлопываю как нечто отвратительное, потому что автор выгуливает белое пальто (и потому что у меня травма, да), и при этом понятия не имеет о том, что вес - это не \"она много жрёт\", а \" почему она много жрёт\".Потому что инсулинорезистентность, или кортизол, или щитовидка или всё вместе и ещё что-то. \nЧеловек в норме не хочет сожрать холодильник, и сила воли тут вообще не работает. \nИ вот когда некто в белом пальто начинает высказывать своё особо ценное мнение, раздраженно-безапеляционно, мне хочется, чтобы автор реально попал в тело человека с рпп. Чтобы осознал, наконец, что если у тебя его нет - это не ты уникальная волевая снежинка, это тебе повезло с гормональным и эмоциональным балансом. \n\nТак вот, тут этого нет, тут хотя и идёт этот троп, всё очень деликатно и по-доброму, за что автору спасибо. \n***\n\nКак-то получилось, что я не о книге больше написала, а о своей травме, но полные люди меня поймут, а остальным : не пугайтесь, вопрос веса там на сотом месте, вы его и не заметите, если у вас самих с ним всё ок)"}, {"source": "kotova", "title": "«Люся, которая всех бесила»", "book_author": "Тата Алатова", "summary": "Современное славянское фэнтези-детектив в реальном российском городе — вредная и принципиальная журналистка-главред Люся вынуждена работать вместе с сыном бывшего мэра, которого сама когда-то разоблачила в статье о пьяном вождении. Автор называет героиню «чумовой» и отмечает органичный микс магии, идущей от славянских божеств, с современным сеттингом.", "tags": ["фэнтези", "детектив", "славянские мотивы", "ромфант", "вражда-к-любви"], "links": ["https://litnet.com/ru/book/lyusya-kotoraya-vseh-besila-b420315", "https://www.labirint.ru/books/1000827/"], "date": "2024-02-20", "review": "В рамках заплыва по книгам Таты Алатовой – она же tapatunya – примкнула к «Люсе, которая всех бесила». И какая же она классная!\n\nОна такая классная, что я купила её одновременно на ПМ, чтобы читать оффлайн и на Литнете, чтобы читать онлайн.\nНе спрашивайте, в чем смысл, извилиста моя логика)))\n\n«Люся» на Литнете и на ПМ.\nИ есть в бумаге!\n\nОчень-очень хочу, чтобы её прочитали все)\n\n⬇️Подробности⬇️\n\n#авторчитаетирекомендует #ТатаАлатова #ЛюсяКотораяВсехБесила\n\n⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️\n\nВо-первых, это не СЛР, как можно подумать по названию, обложке и позиционированию, а классное фентези с детективом, расследованиями, таинственным и умным злодеем, покушениями, заговорами и вот это вот всё))\n\nВо-вторых, это современное славянское фентези в современном городе России, с инетами-телефонами-такси и прочими радостями, но при этом с жителями, пошедшими от разных славянских божеств и сущностей и обладающих соответствующими чертами характера и магией. Сделано круто, органично, без гоев еси и очень живо.\n\nА в-третьих, там совершенно чумовая главная героиня, которая одновременно является главредом и журналистом крупнейшего в городе интернет-портала новостей, интриг, расследований, и спуску не дает никому. Потому что принципы. И вредная))\n\nКрайне рекомендую, изумительная история, точно буду перечитывать для поднятия настроения. Едва удерживаюсь, чтобы сразу не начать перечитывать. Тате Алатовой мое восхищение. И, конечно, ужасно жду вторую обещанную историю по миру, мир уникальный.\nА, ещё. Там така любов, така любов!))\n\nИ в завязке, помимо детектива, крючок – в город на место в силовых структурах возвращается сын бывшего мэра, которого героиня (сына, а не мэра) энное количество лет назад разгромила в статье за пьяное вождение и наезд на человека и обеспечила ему пару лет тюрьмы.\nКак понятно, добрыми чувствами Павел к Люсе не пылает, но им то и дело приходится работать вместе.\n\nАннотация:\nПавел считал, что Люся испортила ему жизнь. Она была уверена, что он легко отделался. Он твердо планировал держаться от нее как можно дальше. Она не собиралась давать ему такой шанс. \nКто больше причинит другому неприятностей? И как продолжать воевать друг с другом, если каждое утро вы завтракаете вместе?\n\n#авторчитаетирекомендует #ТатаАлатова #ЛюсяКотораяВсехБесила"}, {"source": "kotova", "title": "«Моя милая ужасная невеста»", "book_author": "Марина Ефиминюк", "summary": "Забавный ромфант про магическую академию, где уникальная девушка с двумя видами магии из тёмного рода оказывается рядом с наследником враждебного рода — и семьи, десятилетиями враждовавшие, внезапно решают помириться. Автор говорит, что часто перечитывает книги Марины Ефиминюк для самокомфорта.", "tags": ["ромфант", "магическая академия", "юмор", "вражда родов"], "links": ["https://litgorod.ru/books/view/21503"], "date": "2024-02-18", "review": "Я дерусь потому что я дерусь© и я читаю Марину Ефиминюк потому что это Марина Ефиминюк)\n\n«Моя милая ужасная невеста» —  как всегда забавна и остроумна. Обожаю Маринины книги, часто их перечитываю для самокомфортинга.\n\nИтак, есть светлые и тёмные магические рода. Бывает так, что в тёмном роду рождается уникальный ребенок, который обладает 2 магиями.\nИ уникальность-то уникальностью, да вот никто особо не знает, что с ней делать.\n\nСветло-тёмная Марта Варлок с весьма необычным характером, от которого даже некроманты плачут, оказывается в тёмной магической академии. И училась бы она себе тихо, но надо же оказаться там и Закари Торстену, наследнику враждебного рода.\nСемейная вражда – святое дело, и отпрыски отлично поупражнялись в ней. Но что делать, есть семьи вдруг решили помириться?\n\nОчень классно, если кто ищет чтение на выходные – обязательно берите «Невесту».\n\nКто уже читал – прошу поделиться впечатлениями, чтобы другие читатели могли определиться, читать им или нет.\n\n#авторчитаетирекомендует #МаринаЕфиминюк"}, {"source": "kotova", "title": "«Тайна ассистентки дракона»", "book_author": "Ольга Пашнина, Анна Одувалова", "summary": "Уморительно смешной ромфант про наивную девушку, устроившуюся на работу к боссу-дракону в сверкающий офис мегаполиса — веселье начинается уже на следующее утро после праздничного оформления на работу. Автор смеялась в голос и называет книгу одной из тех, что будет перечитывать при упадке настроения.", "tags": ["ромфант", "юмор", "драконы", "лёгкое чтение"], "links": ["https://www.litres.ru/book/anna-oduvalova/tayna-assistentki-drakona-69544087/", "https://www.labirint.ru/books/961491/"], "date": "2024-02-17", "review": "«Тайна ассистентки дракона» от Ольги Пашниной и Анны Одуваловой – книга-огнище, очень рекомендую для поднятия настроения. Вчера читала в ночь и затыкала себе рот, чтобы не ржать в голос и не разбудить моих соплящих котят.\n\nНовенькая и слегка наивная девица устраивается на работу в мегаполис, к боссу-дракону, в сверкающий высотный офис. И решает отметить своё устройство.\nНо всё веселье начинается на следующее утро и идёт по нарастающей)\n\nОна точно отправляется на полку с книгами, которые я буду перечитывать при упадке всего)\n\nРеально отличная юморная книга, при этом нет ни тупых шуток, ни шуток ниже пояса, которые я терпеть не могу. Читается за вечер влет, а полученной дозы эндорфинов точно хватит надолго.\n\nОчень рекомендую!\n\nВ электронке есть на Литрес, в бумаге в Лабиринте.\n\n#авторчитаетирекомендует #Тайнаассистенткидракона #АннаОдувалова #ОльгаПашнина"}, {"source": "kotova", "title": "«Тэсса на краю земли»", "book_author": "Тата Алатова", "summary": "Взрослая (18+) история о деревне изгоев-«монстров» Нью-Ньюлин, куда сбежали те, кто не может жить среди «нормы» — идеалистка Тесса, боец без правил Фрэнк и уникальный гений Холли Лонкли постепенно открываются друг другу. Автор называет книгу «зарядкой для мозга» и подчёркивает, что несмотря на травмы всех героев, главное слово этой истории — доброта.", "tags": ["фэнтези", "ромфант", "взрослое чтение", "атмосферное"], "links": ["https://litnet.com/ru/book/tessa-na-krayu-zemli-b417475"], "date": "2024-02-01", "review": "Тата Алатова tapatunya и её «Тесса на краю земли».\n\n📲 Я читала на Литнете и на ПМ, но есть и на других площадках.\n\nБезусловно могу рекомендовать эту книгу, прямо настойчиво, но имейте в виду, это очень взрослая книга, это 18+ (и не только из-за секса, хотя там он есть, я бы больше сказала, эта история пропитана сексом, хотя она вообще не о сексе, а о людях и человечности).\n\nТата Алатова для меня – человек с принципиально иной работой мозга, и поэтому её книги читать бесконечно интересно, как я читала бы книги инопланетянки. Она как автор идёт другой дорогой, отличной от моей, и возможность прикоснуться к этому восхитительна, это как зарядка для моего мозга.\n\nЭта история – про отверженных и в то же время таких обычных и трогательных людей. Целая деревня «монстров», которые бежали от людей, потому что жить среди условной нормы невыносимо. Потому что их не принимают, а где-то они и опасны для других.\n\nЭта история – о прекрасной и свободной женщине, которая мучается кошмарами, потому что в прошлом совершила тяжелую, смерноносную ошибку. Тесса, главная героиня, всё ещё та идеалистичная девочка, которая пошла в 15 лет в свою профессию из веры в справедливость. И сейчас, погружённая в кошмары, она живет в странном месте Нью-Ньюлин и делает всё, чтобы эта жизнь была нормальной.\n\nЭта история – о бойце без правил Фрэнке, ломаном-переломанном, прошедшем через ужас, о том, кого тоже считают монстром. И о том, как он впервые за всю жизнь нашел кого-то, к кому можно привязаться без страха.\n\nИ третий главный герой, Холли Лонкли, это, конечно, уникум. Но как Тате удалось выписать этого гения, это невероятно, конечно!\n\nА ещё здесь всё, как я люблю – Тата переключает «камеру» на разных жителей Нью-Ньюлина, и мы многое видим их глазами. И, несмотря на травмы, несмотря на то, что все эти отверженные – травматики, главное слово этой истории – доброта.\n\nКрайне рекомендую.\n\nНу, и конечно, если вы уже читали – поделитесь впечатлениями, это поможет другим читателям решить, читать или нет.\n\n📖 Аннотация:\nТэсса живет в крохотной деревушке на самом конце земли. Здесь всего сорок два жителя, но каждый из них хранит свои тайны и способен на самые неожиданные поступки. \nИстория о нетривиальной любви, ста пятидесяти покойниках и одном художнике.\n\n#авторчитаетирекомендует #татаалатова #ТессаНаКраюЗемли"}, {"source": "kotova", "title": "«Дюжина лазеек»", "book_author": "Анна Орлова", "summary": "Юмористический «производственный роман» про юриста Анну, которая сопровождает самых разных существ — драконов, троллей, гномов и эльфов — в мире после слияния всех девяти скандинавских миров с современностью. Автор называет книгу забавной и очень комфортной, «пластырем на душу», жалея лишь, что она не вдвое длиннее.", "tags": ["юмор", "городское фэнтези", "скандинавская мифология", "лёгкое чтение"], "links": ["https://www.labirint.ru/books/980134/", "https://www.litres.ru/book/anna-orlova/duzhina-lazeek-69819094/"], "date": "2024-01-18", "review": "С удовольствием прочитала книгу Анны Орловой «Дюжина лазеек».\n\nЭто производственный роман)) про женщину-юриста, которая работает в современном мире, в котором есть автомобили и телефоны, но при этом в нём произошло слияние мидгарда с асгардом и хель (точнее, все 9 скандинавских миров слились в 1) и вышло, что рядом живут драконы, тролли, гномы, эльфы и обычные люди.\n\nИ после этого события всем пришлось поднатужиться и вывести общие законы, в том числе для юридической практики. И вот наша героиня, Анна, берётся за юридическое сопровождение самых разных существ с учетом их менталитета и общего права.\n\nЗабавная, юморная, очень комфортная книга, вообще без жести, как пластырь на душу. Очень рекомендую. Единственный минус – мне хотелось больше раза в два))\n\n📘 Вышла в бумаге в ЭКСМО в личной серии Анны Орловой\n📲 Есть на ЛитРес.\n📲 И на ПМ (я читала на ПМ).\n\n#авторчитаетирекомендует #АннаОрлова #ДюжинаЛазеек"}, {"source": "kotova", "title": "«И солнце взойдёт» (дилогия)", "book_author": "Варвара Оськина", "summary": "Современный любовный роман про врачей-хирургов в Канаде — молодая нейрохирург Рене Роше проходит практику под руководством невыносимого, но гениального Энтони Ланга, и оба травмированных героя постепенно сближаются. Автор честно предупреждает о жёстких (21+) эпизодах в прошлом героини и об эгоистичном, местами отталкивающем поведении героя, но подтверждает хэппи-энд и мощные эмоциональные качели.", "tags": ["современный роман", "медицинская драма", "взрослое чтение", "дилогия"], "links": ["https://vk.com/wall-52510824_178002", "https://t.me/dontbeakant", "https://www.litres.ru/author/varvara-oskina/"], "date": "2024-01-04", "review": "#авторчитаетирекомендует\n\nУже пошла читать книги по вашему топу отсюда из ВК (можете смело добавлять свой топ, это для меня прямо сокровищница история).\n\nИ первой историей в новом году стала дилогия «И солнце взойдёт» Варвары Оськиной. Читала я на Литресе, но книги есть и в бумаге.\n\nЯ проголотила обе книги за два дня, поэтому могу смело сказать, что автор умело держит нас на крючке интереса.\n\nНо, пожалуйста, прочитайте несколько предупреждений ниже, чтобы решить, ваш ли это сорт травы.\n\nЭто современный любовный роман про врачей-хирургов в Канаде. Сделано очень круто, плотно. Основное достоинство и то, почему я эту книгу рекомендую – это эмоциональные качели о-о-от такого размаха. Если вы любите вот это все, от радости до слез, от счастья до стеклища – это туда, читайте. Попереживать получится на отлично.\n\nО чём эта книга?\nМолодая и подающая огромные надежды нейрохирург Рене Роше попадает на практику для получения лицензии к совершенно невыносимому, самолюбивому, грубому Энтони Лангу. Одна проблема – он гениальный хирург и учиться у него – отличная практика.\n\nЭто завязка. А история о том, как два травматика, каждый из которых по-своему справляется с травмой, идут рядом, затем вместе… но надолго ли? Сразу говорю, что хэппиэнд в книге есть, для меня это важно. \n\nГероиня, Рене – такое солнышко, пережившее в прошлом страшные события. С этими событиями связано мое первое предупреждение – это реально чернуха, 21+, и пусть в книге очень коротко, я такие вещи не люблю и очень долго от них болею. Все это можно было написать не настолько физиологично, и да, я понимаю, что это мой пунктик, но я люблю, когда автор выдерживает уровень тьмы в романе и не делает вставки из тьмы совсем невыносимой, если по роману он средний или лёгкий.\n\nРене иногда казалась мне непостижимо дурной в плане всепрощения, и только то, что иногда она срывалась и тогда все летели во все стороны, объясняет мне её характер.\n\nГерой, Энтони – настоящий мудак. Да, гениальный, но мудак. Поверьте, вы будете его ненавидеть. Да, я понимаю травматиков, но, во-первых, его травма и травма Рене – это две большие разницы, во-вторых, то, как он позволял себе с ней обращаться, меня коробило безумно. Да, тут есть отдаленное сходство с линией Алина-Макс, но есть моменты, за которые хотелось Энтони отдубасить сковородкой.\n\nПонятно, что история его переломала и вывела на перерождение, и уже от него зависело, шагнёт он туда или нет. И обе арки закрылись красиво.\nНо упаси Боже от таких мужчин рядом, ей-богу. Наверное, только такая как Рене и могла быть рядом с ним и не зависимой, а равной, а то и превосходящей.\n\nКороче, вы поняли. Хорошо написанная книга с отлично показанной внутренней больничной кухней с её змеиным клубком внутри (всегда поражалась, почему на западе главные врачи и главы отделений позволяют себе унижать и грубить новичкам, что это за традиция такая больничной дедовщины на западе?). И с очень неоднозначными героями.\n\nВызывает ли у меня Рене симпатию?\nДа, она сильная и добрая.\n\nВызывает ли у меня симпатию Энтони?\nНет, он редкостный эгоистичный ублюдок с тягой с саморазрушению и разрушению всего вокруг, которому наплевать на всех вокруг, и которому просто несказанно повезло, что рядом оказалась такая как Рене. Да, он травматик, да, он сидит на опиатах, потому что мучается мигренями, а это разрушает личность, но от таких надо держаться подальше.\n\nЯ всё вам рассказала, решайте сами. Эмоциональные горки и хорошие арки героев вам обеспечены.\n(А ещё очень понравилось оформление книги – где на иллюстрациях Энтони, которого явно списывали с Кайло Рена, показан с железным шипастым обручем вокруг головы – так Рене видела его мигрени)."}, {"source": "kotova", "title": "«Договор» (рассказ)", "book_author": "Юлия Жукова", "summary": "Новогодний рассказ про юную изобретательницу и профессора алхимии, запертых в новогоднюю ночь в школе, которую наводняют слуги хаоса. Автор жалеет, что это всего лишь короткая форма, и мечтает о полноценном романе по этому сеттингу.", "tags": ["фэнтези", "новогоднее настроение", "короткая форма", "магическая академия"], "links": ["https://t.me/yulia_zhukova_worlds", "https://author.today/work/310476"], "date": "2023-12-29", "review": "Кстати к новогодним историям! Я же не рассказала вам об обалденном новогоднем рассказе от Юлии Жуковой!\n\nПрошу любить и читать «Договор»! Я сама прочитала его ещё летом, и он лежал у Юли ждал своего времени. И дождался!\n\nЭто правда классно, читайте, не пожалеете! Ну а кто уже прочитал – поделитесь впечатлениями)\nЕдинственный недостаток – мне так понравился сеттинг и история, что я бы с удовольствием прочитала про этих двоих в этой академии полноценный роман. Но Юля говорит, что это маловероятно.\n\nНо вдруг, вдруг? База там огромная, писать можно про разных героев)\n\nАннотация:\nУ юной изобретательницы есть мечта. У профессора алхимии есть секрет. Эти двое в новогоднюю ночь оказываются заперты в школе - как раз когда её наводняют слуги хаоса. Поймёт ли Квенильда, с кем связалась, и оправдаются ли страхи Аритона? Всё решит полуночный бой часов!\n\n#авторчитаетирекомендует #ЮлияЖукова #Договор"}, {"source": "kotova", "title": "«Ведьмина ночь»", "book_author": "Карина Демина", "summary": "Современная альтернативная Российская империя с телефонами и ноутбуками, а также вампирами, ведьмами и оборотнями — героиня, участковый офицер и слабосильная ведьма, отправлена бывшим любовником в глушь, чтобы не злить его жену. Автор делится первыми яркими впечатлениями сразу после начала чтения: «Открыла и закрыть не могу».", "tags": ["городское фэнтези", "ведьмы", "альтернативная история", "детектив"], "links": [], "date": "2023-12-27", "review": "Начала читать \"Ведьмину ночь\" Карины Деминой. О, услада моего сердца, радость моих глаз и счастье для моего внутреннего читателя!\nСовременная Российская империя с телефонами, ноутами, а также вампирами, ведьмами и оборотнями. Героиня - участковый офицер, ведьма-слабосилок, которую бывший любовник ссылает в глушь, чтоб жена не гневалась.\nОткрыла и закрыть не могу, так приятно читать. Карина, конечно же, высочайший мастер своего дела.\n\n#авторчитаетирекомендует"}, {"source": "kotova", "title": "«Сочинские рассказы»", "book_author": "Юлия Волкодав", "summary": "Тёплая нехудожественная проза в виде житейских заметок о жизни в Сочи — каждая глава посвящена месту, району или событию города, а главным сокровищем историй становятся живые, колоритные люди. Автор дважды писала об этой книге в ноябрьской хандре, называя её идеальным средством от «тленомрака» и способом добавить в жизнь немного солнца и тепла.", "tags": ["нехудожественная проза", "путевые заметки", "тёплое чтение"], "links": ["https://t.me/volkodav42", "https://www.labirint.ru/books/940434/", "https://www.litres.ru/book/uliya-volkodav/sochinskie-rasskazy-69841534/"], "date": "2023-11-22", "review": "Сегодня под утро настойчиво снилась @volkodav42 Юля Волкодав. Она строила дом, собиралась на концерт, готовила что-то. А все почему? Потому что я почти дочитала ее \"Сочинские рассказы\")))\nОтличное средство против ноябрьского тленомрака - почитать про солнечный Сочи, море, добрых, колоритных и таких разных людей, про то, как Юля в Сочи осваивалась.\nЯ давно лелею мечту хотя бы на мрачномерзкие месяцы уезжать в теплые края. Правда, Юля пишет, что с ноября по апрель в Сочи дожди. И влажно, как в Питере.\nНо, как говорится, есть нюанс)))\nЯ тут последние недели медитирую на погоду в Сочи. У нас +2, -3, + 4, -1. В Сочи 15, 21, 23,14, 18. Хороший такой нюанс, особенно когда уже пару недель угрюмо ходишь в скафандре, как пингвин, чтобы не замёрзнуть, а с недавних пор ещё и в скафандре с утеплением в виде термобелье) Мне читательница на днях прислала запись золотого сочинского рассвета, так я чуть не расплакалась. И даже не из-за собственно рассвета или абсолютно зелёной листвы, а из-за пения птиц. Они на видео утром пели так, как у нас бывает только летом. \nУ нас сейчас только вороны хрипло проводят совещания по утрам, да чайки тоскливо орут над  Невой.\nКороче, хотите солнца, но нет возможности рвануть в Сочи - читайте \"Сочинские рассказы\" (бонусом - снится Юля. Юля, отличная рекламная идея, я считаю, свежая, незатертая)))))\n#авторчитаетирекомендует\n\nЯ дочитала «Сочинские рассказы» Юлии Волкодав и рекомендую с тройной настойчивостью всем, кому в эти мрачные дни хочется тепла, солнца и добра.\n\nИменно такие книги нужно читать в ноябре, честное слово, а не ваши эти хорроры с мистикой! Хоррор с мистикой хорошо идет в летнем саду с лениво жужжащими шмелями, когда так жарко, что даже комары ленятся тебя кусать. Тогда можно пустить за шиворот немного холодка. А для тепла на душе – читать такие книги, как «Сочинские рассказы».\n\nЭто очень хорошая проза, написанная в виде этаких житейских заметок. Каждая глава соответствует месту, району или событию в Сочи – и читатель вместе с Юлей осваивается в Сочи, удивляется ему и узнает его, строит дом на горе, посещает Олимпиаду-2014 и слушает чемпионат мира по футболу. \n\nНо главное сокровище этих историй – люди. Добрые и вредные, мудрые и хитрые, открывающиеся с совершенно разных сторон. Очень колоритные – ох уж этот дядя Сосо с его жизнелюбием!\n\nЯ чувствовала запах булочек и пирожков с Сочинского вокзала, меня укачивало в маршрутках на сочинских серпантинах, и с огромным удовольствием побывала на концерте Иосифа Кобзона. Честно, когда прочитала, захотелось найти запись того концерта. Потому что описанное Юлей словно стало и моими воспоминаниями.\n\nХочу отметить и писательскую мягкость, очень изящное завершение каждой главы авторским выводом, одно удовольствие было читать – профессионально сделано очень хорошо. Если вы любитель путевых заметок, встреч с городами их жителями, если вам сейчас требуется солнце и тепло – эта книга прямо для вас.\n\nОна издана в «Руграм» с очень подходящей и классной обложкой, и на Лабиринте прям отличная сейчас скидка.\nИ есть в электронке на ЛитРес.\n\nЯ очень ценю книги, от которых тепло на душе. Спасибо Юле за время, которое я провела с этой книгой в Сочи.\n\n#ЮлияВолкодав #СочинскиеРассказы #авторчитаетирекомендует"}, {"source": "kotova", "title": "«ДракоНиЯ Тайна»", "book_author": "Светлана Нарватова", "summary": "Магическая академия, «плохой» мальчик, юморная сильная героиня и несколько пластов тайн — сирота Бьянка поступает в академию не ради развития дара, а чтобы отомстить неизвестному отцу-дракону, бросившему её мать, и с первого дня сталкивается со звездой академии. Автор называет книгу «антистрессом» и хвалит умелую подачу знакомого сюжета.", "tags": ["магическая академия", "юмор", "драконы", "ромфант"], "links": ["https://t.me/upssss_books", "https://author.today/work/266961", "https://litnet.com/ru/book/drakoniya-taina-b434136"], "date": "2023-10-25", "review": "Прочитала чудную историю от Светланы Нарватовой «ДракоНиЯ Тайна».\n\nТо, что я люблю – академия, “плохой” мальчик, сильная и классная юморная героиня, несколько пластов истории, тайны прошлого, игры и расследования настоящего. Мне очень понравилось, прочитала на одном дыхании. Реально книга-антистресс, рекомендую!\n\n📲 Есть на АТ и ЛитНет.\n\nЕсли вы читали – традиционно прошу делиться мнениями, это помогает другим читателям.\n\nЕсть, насколько я поняла, на всех порталах, читайте, где вам удобно. Если нужно погрузиться и улыбнуться – прямо туда и ныряйте. Я бы, если честно, прочитала бы ещё из этой серии книги.\n\n⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️\n\n#авторчитаетирекомендует\n#светлананарватова #дракониятайна\n\n⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️\n\n📖 Итак, Бьянка, героиня, воспитанница приюта, сирота, обладает редким для человека уровнем магического дара. Но в академию магии она поступает не затем, чтобы развить свой дар. А чтобы отомстить отцу, который когда-то учился в этой академии, соблазнил и бросил её мать.\nТолько вот ни имени отца, ни имени матери она не знает. И в первый же день ухитряется столкнуться со звездой академии.\n\nЗнакомый сюжет в части “столкнуться со звездой”, но, как говорится, важен не избитый сюжет, а умение его подать. И удалось это Светлане прекрасно! А ещё, как я уже сказала, ей отлично удалось вложить в однотомник много судеб, тайн, местных и глобальных интриг и проблем, и всё это весело, динамично и романтично.\n\nКороче, обязательно читайте. От всей души рекомендую.\n\n📕 Аннотация:\nМне много не надо: найти своего отца-дракона и сделать так, чтобы он пожалел об этом. Тайна моего рождения скрыта в стенах Даллийской Высшей Академии Магии. При моём уровне дара и упорстве добраться до её секретов проще простого. Беда в том, что кто-то любой ценой намерен мне помешать. И если это кто-то - ты, Диего де ла Ньетто, то тебя не спасёт ни богатство,ни происхождение, ни статус любимчика Академии. Ты получишь по заслугам! А если не ты, то всё равно получишь. Никто не сможет остановить меня на пути к справедливости. Тем более, какой-то дракон.\n\n#авторчитаетирекомендует\n#светлананарватова #дракониятайна"}, {"source": "kotova", "title": "«Кризисный центр \"Монстр\"»", "book_author": "Валентина Елисеева", "summary": "Городское фэнтези с юмором про учёного-биофизика Элен, которая после дебоша в баре с оборотнями и вампирами попадает в психиатрическую больницу, где её лечащий врач оказывается не совсем тем, кем кажется. Автор хвалит реалистичную, без искусственности манеру повествования и классную романтическую линию с маньяком и тайнами героини.", "tags": ["городское фэнтези", "юмор", "ромфант", "независимая книга"], "links": ["https://litnet.com/ru/book/krizisnyi-centr-monstr-b411234"], "date": "2023-10-05", "review": "Прочитала «Кризисный центр “Монстр„»  Валентины Елисеевой и смело рекомендую тем, кому хочется добротного, необычного и интересного городского фентези.\n\nМеня, если честно, привлекло название. И с первых страниц стало понятно, что автор ведёт повествование уверенно и легко, и читать – одно удовольствие. Пишет Валентина в реалистичной манере, и ты веришь в написанное, нет никакого балагана, нарочитости, искусственности. Очень приятно было читать.\n\nНу и сюжет прекрасен)\n⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️\n\n#авторчитаетирекомендует #КризисныйЦентрМонстр #ВалентинаЕлисеева\n\n⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️\n\n📕 Элен, ученый-биофизик, как-то раз заглядывает в бар, рекламу которого обнаружила у себя в почтовом ящике. И устраивает там дебош, потому что подсевший к ней пофлиртовать парень вдруг сверкает клыками, у кого-то обнаруживается чешуя, а у кого-то хвост.\nЭлен привозят в психиатрическую больницу, ибо она уверяет всех, что видела в баре вампиров и оборотней. Но у неё впереди – защита докторской, и теперь нужно убедить главного врача, что она совершенно нормальна, чтобы он её отпустил.\nНо у врача слегка другие планы))\nИ не романтические, увы.\n\nОтличный роман с юмором, забавными ситуациями проблем у «монстров», классной романтической линией, маньяком, подозрениями в адрес главной героини, тайнами в её прошлом и отличным взрослым, но очень нескучным главным героем.\n\nПрямо рекомендую, читайте.\n\nЕсли читали – поделитесь, другим читателям будет интересно.\n\n📖 Аннотация:\nЕсли вы просите Судьбу о встрече с Мужчиной своей Мечты – не забудьте оговорить условия этой встречи! Иначе рискуете предстать перед Мечтой в смирительной рубашке и с завязанным ртом под объяснения ругающихся полицейских. И неважно, что ваши крики про демонов и вампиров в баре были правдой! \nК слову, психиатрическая лечебница, в которую вас доставили, не менее странная, чем тот бар, и остаётся ощущение, что вас по-прежнему окружают чудовища… А если это так, то вряд ли ими командует человек, скорее, тут всем заправляет Главный Монстр – тот самый, кого вы ошибочно приняли за Мужчину Мечты! \nКто же вы, врач-психотерапевт Эрл Абсалон Хэлл? И кто ваши пациенты?! \nДраконы, боящиеся огня? \nВампиры с аллергией на кровь? \nВ кризисном центре «Монстр» помогают всем! \nОднотомник.\n\n#авторчитаетирекомендует #КризисныйЦентрМонстр #ВалентинаЕлисеева"}, {"source": "kotova", "title": "«Одиссей Фокс»", "book_author": "Антон Карелин", "summary": "Техничная и драматичная космофантастика-детектив про немолодого космического сыщика, принципиально не улучшающего своё тело биотехнологиями — история построена как связка отдельных дел-повесток со сквозным сюжетом. Автор, обычно равнодушная к космофантастике, отмечает уютное послевкусие вроде путешествий Алисы и растущий от дела к делу накал.", "tags": ["космофантастика", "детектив", "независимая проза (со сквозным сюжетом)", "премия"], "links": ["https://t.me/kotovafantasy/2451", "https://www.labirint.ru/authors/265330/", "https://author.today/work/96083"], "date": "2023-10-02", "review": "Антон Карелин «Одиссей Фокс». Безусловно рекомендую!\n \nВы уже видели мои короткие восторги по мере прочтения, а теперь я наконец-то добралась до большой рецензии.\n\nПрежде всего хочу выразить гигантскую признательность автору за такую крутую, необычную, очень техничную и драматичную космическую фантастику. Не зря «Одиссей Фокс» получил один из Росконов в этом году. И не зря его взяли в печать – скоро в АСТ выходит уже четвёртая книга серии. Я читала в электронке на Автор.Тудей.\n \nЧестно признаюсь – я не любитель космофантастики, меня она частенько вводит в скуку. Но «Одиссей Фокс» – это не просто космофантастика, это космодетектив, приправленный таким количеством футуризма, необычайных технологий, встреч с самыми разными инопланетянами, что оторваться невозможно.\n \nОчень необычен главный герой – слава писательским богам, не нагибатор, уставший человек средних лет, который отчего-то принципиально не занимается биоулучшением своего тела и мозга.\n\n⬇️⬇️⬇️\n\n#авторчитаетирекомендует #АнтонКарелин #ОдиссейФокс\n\n⬇️⬇️⬇️\n\nОдиссей – космический сыщик, который, как и его древнегреческий предтеча, бороздит океаны, только космические. Он вдумчив, спокоен и логичен, и распутывает самые сложные дела, удивляя заказчиков. И при этом он не просто баловень судьбы, все его удивительные способности будут объяснены. И он совсем не неуязвим.\n \nПоначалу он кажется совсем серым, неинтересным, непримечательным. Но шаг за шагом приоткрываются его тайны и его прошлое, и к концу книги ты просто влюбляешься в героя. Но у меня в принципе самое привлекательное в мужчине – это ум и доброта.\n \nИ вот ещё одна необычность героя заключается в том, что он справедлив и принципиально добр. Многие воспринимают доброту за слабость, он Одиссей Фокс, как мы потом узнаем, не слаб. Он силен, и он осознанно добр. И поэтому после прочтения истории остается внутри очень хорошее, очень уютное чувство, какое было у нас после прочтения космических путешествий Алисы, например. И да, отсылки к Алисе в «Одиссее» тоже есть.\n \nБолее того, там нашлось место и для социальной фантастики (а хорошая космофантастика всегда социальна), и для космохоррора, и для божественных игр. И даже для романтической линии нашлось место, пусть в конце. И она тоже – прекрасна.\n \nИскусность автора состоит в том, что он постепенно увеличивает накал: каждое последующее дело интереснее, динамичнее, эмоциональнее предыдущего. За главу про блеф в казино и последние главы я вообще готова расцеловать – настолько они захватывающие и настолько изумительно технично сделаны. Но уже в первой главе Антон Карелин щедро насыпает сюжетных крючков, загадок и тайн, и цепляет читателя на интерес.\n \n«Одиссей» – произведение редкой цельности. Оно состоит из повестей-капсул, очень плотных, без расхлябанности, присущей авторам, которые пишут как бог на сердце пошлёт. Каждую повесть можно читать отдельно, но при этом есть сквозной сюжет, на который они нанизаны, как на связующую нить. Поэтому безусловно рекомендую эту историю и горячо жму руку Антону Карелину за то удовольствие, которое мне доставило чтение «Одиссея Фокса». Дальше читать однозначно буду.\n\n#авторчитаетирекомендует #АнтонКарелин #ОдиссейФокс"}, {"source": "kotova", "title": "«Чёрная невеста»", "book_author": "Мария Покусаева", "summary": "Неспешный атмосферный ромфант эпохи Регентства с магическим антуражем — юная леди Флоренс вынуждена выйти замуж по указке опекуна, а вокруг неё клубятся личные и государственные тайны, включая запрет на упоминание имени отца в доме дяди. Автор называет книгу «предчувствием ромфанта» без бурь и искр, но с заботой, честностью и доверием, отмечая отличных живых второстепенных персонажей.", "tags": ["ромфант", "историческая проза", "эпоха Регентства", "атмосферное"], "links": ["https://t.me/turnezolle_pub", "https://www.labirint.ru/books/970317/", "https://author.today/work/252974"], "date": "2023-09-16", "review": "Наконец-то я могу полноценно рассказать вам о «Чёрной невесте» Марии Покусаевой! Плюсы, минусы, подводные камни, как любит говорить сама Маша) Проще говоря, я расскажу, для кого эта книга и что вы получите, прочитав её.\n \nВо-первых, она вышла в МИФе очень крутым тиражом в 8000 экземпляров, но главное даже не это, а то, что она крайне эстетична. Вы только гляньте на обложку, форзацы, внутренние иллюстрации – это же бальзам на душу! В Лабиринте уже висит предзаказ. И я давала ссылку на неё в электронке.\n \nВо-вторых, это идеальная книга для тех, кто любит атмосферность, неспешность, эпоху регенства («Невеста» ещё и с магическим антуражем, и он играет важную роль в сюжете), и при этом – ярких героев и неожиданные повороты. Её нужно читать, если хотите отдохнуть, погрузиться в хороший слог и атмосферу английского романа. Если вы читаете только динамичные книги (в этом нет ничего плохого, я люблю и неспешные, и быстрые) – эта история не для вас. Но я всё же рекомендую заглянуть, вдруг это то, что вам было нужно?\n⬇️\n\n📗 «Чёрная невеста» – это история юной леди Флоренс, воспитывающейся в пансионе – а сразу после пансиона вынужденной выйти замуж за того, на кого ей укажет дядя и опекун. И если вам кажется, что вы всё поняли в этой истории, то нет, вы ошибаетесь. Здесь с первых глав мы оказываемся впутаны в множество тайн, как личных – почему имя отца Флоренс нельзя произносить в доме дяди, что за проклятый дар скрывает она сама, – так и государственных. \n\n👩🏻‍🦰 Сама Флоренс – девушка своей эпохи, которой дали ровно то образование, которое пристало юным девицам, которую оберегают от излишней информации, которая наивна, робка, неуверенна в себе. Мы ведь помним про эпоху и про то, сколько прав и возможностей тогда имели юные девушки? Не нужно ждать, что она будет лихо скакать на лошади и подрывать устои – эта история не настолько фентезийная) Но Фло точно сумеет вас сильно удивить.\n \nМария ведёт главных героев разными дорогами (мне очень понравился главный герой Ронан Макаллан – сын земли вересковых холмов и северного ветра), и встречаются-то они почти в середине книги. «Чёрная невеста» – это, конечно, ромфант, хотя я бы назвала этот жанр «предчувствие ромфанта», потому что вы не найдете здесь искры, бури, безумия, но найдете заботу, честность и доверие. Любовная линия здесь – сильно второстепенная, потому что история любви мужчины и женщины здесь возможна только тогда, когда героиня полюбила себя, приняла себя, как личность, и в имеющихся условиях научилась решать и понимать, что нужно ей.\n \nСразу хочу отметить, что, несмотря на неспешность, история читается очень легко и бодро. И мне очень нравится посыл – потому что история человека, за которого долгое время все решали другие и которому пришлось научиться решать самому – это хорошая история.\n\nОтличные, просто отличные второстепенные герои, живые, насыщенные. Нет ни одного персонажа, который встал бы в картон, всё очень живо от дам высшего света до медсестры в приюте для душевнобольных.\n \nМне очень понравилось, что «формула Золушки» здесь не даётся в лоб, и сёстры Флоренс не так однозначны, а тётя, которая её опекает, не зло под солнцем. Да и в принципе эта книга в начале – это такая книга-обманка, потому что всё дается через призму взгляда самой Флоренс, а потом, постепенно мы вместе с ней приходим к пониманию, что мир шире и сложнее, чем ей казалось. \n \nИ мне как автору очень зашёл профессионализм, с которым Мария сжимала спираль напряжения у Фло до такой степени, что взрыв стал неминуем. А ещё я до сих пор помню цвет и запах истории – когда начинается всё с пыльных, тёмных, чёрно-белых подавленных тонов, душного дома, а в конце это простор, вересковые яркие поля, живая собака и добрые люди.\n \nПо вопросам, которые у меня остались – мне очень хотелось бы узнать судьбу родителей Фло, что же с ними всё-таки случилось. Но так как Мария планирует цикл книг в этом мире с другими героями «Невесты» (по принципу Бриджертонов), думаю, этого она тоже коснётся, хотя мне, повторюсь, очень хотелось, чтобы эта арка была закрыта там же, где она была открыта. И не хватило досказанности о мотивах слуги лорда Нейтингейла, хотя читателю даётся возможное объяснение, мне конкретно в этой части истории хотелось покопаться глубже и рассмотреть пристальнее.\n \nЯ читала эту книгу и по мере написания эпизодами, и затем перечитывала целиком. Так вот при перечитывании, несмотря на беспомощность Фло в первой половине книги, оказалось, что «Невеста» удивительно расслабляющая и оторваться от неё невозможно (со мной сейчас очень редко бывает, чтобы я читала до трёх ночи, ибо мой сон – величайшая для меня ценность после многих лет недосыпа с детьми)). Я не легла спать, пока не дочитала. И я бы с удовольствием прочитала ещё том про развитие отношений Фло и Ронана, про её обучение, про жизнь в замке среди вересковых полей и т.п. А ещё – про сестру Флоренс Матильду – некрасивую и умную, люблю такой типаж героинь.\n⬇️⬇️⬇️⬇️⬇️⬇️\n\nПодытоживая – это ваша книга, если вы любите атмосферность, истории типа «Джейн Эйр» и вересковые шотландские поля)) А ещё – хороший язык и приближенных к реальным героев.\n \n📖 Аннотация:\nФлоренс Голдфинч юна и осторожна. Ее судьба предрешена опекуном: принудительное замужество, либо тихая жизнь в обители святой Магдалены. Неизбежно и то, что страшные тайны прошлого могут выйти на свет в самый неудобный для Флоренс момент… \nРонан Макаллан — честный сын Эйдина. В его мире ценят доброе сердце и справедливость. Его жизнь посвящена служению закону: магия не может применяться во вред людям и миру. Но что случится, если однажды ему придется защищать того, кто убил человека магией?\n\n#авторчитаетирекомендует #МарияПокусаева #ЧёрнаяНевеста"}, {"source": "kotova", "title": "«Эхо Миштар» (вторая часть)", "book_author": "Софья Ролдугина", "summary": "Большое атмосферное фэнтези, которое автор канала называет «литературой на уровне большого фэнтези» — динамичное, философское, романтичное и жизненное одновременно. Рекомендация автора канала размещена на обороте второй книги дилогии.", "tags": ["фэнтези", "атмосферное", "философское", "дилогия"], "links": ["https://www.labirint.ru/books/963185/", "https://t.me/kotovafantasy/2109", "https://i-gram.ru/u/AnotherCentury/books/"], "date": "2023-09-13", "review": "Друзья, вышла из печати вторая часть «Эха Миштар» Софьи Ролдугиной – и я реально готова ходить за каждым читателем, заглядывать в глаза и говорить: почитай, это очень круто, атмосферно, необычно, динамично, весело и грустно, романтично и ужасающе, философски и жизненно. Это литература на уровне большого фэнтези и «Эхо» очень-очень приятно читать.\n\nЯ обязательно перечитаю дилогию, когда получу вторую книгу.\n\nМоя рецензия на «Эхо» здесь.\n\nА ещё на обороте второй книги – моя рекомендация, и я этим безумно горжусь.\nВот тут книга в электронке для тех, кто не читает в бумаге.\n\nИ нет (специально для Роспотребнадзора), это не реклама, это мое искреннее восхищение и рекомендация.\n\n#авторчитаетирекомендует"}, {"source": "kotova", "title": "«Кельтский крест»", "book_author": "Екатерина Каблукова", "summary": "Историческая фэнтези-романтика про попаданку, отправленную в магическое прошлое, где она вынуждена принять покровительство шотландского правителя, проклятого ещё до рождения. Автор отмечает историчность, вайбы «Чужестранки» и адекватное поведение героини, не забывающей о цели вернуться домой.", "tags": ["исторический роман", "попаданцы", "ромфант", "Шотландия"], "links": ["https://t.me/kablukovabooks", "https://www.labirint.ru/books/964707/", "https://www.litres.ru/book/ekaterina-kablukova/keltskiy-krest-69526672/"], "date": "2023-08-30", "review": "С творчеством Каблуковой Екатерины я знакома давно, и много слышала про книгу «Кельтский крест», но почему-то всё не было оказии прочитать. И тут я узнала, что книга выходит в Руграм прямо к ММКЯ – собственно, это и стало тем самым поводом взять с собой электронку в дорогу.\n\n📲 Брала я на ЛитРес, но есть и на ЛитНет.\n\nЕкатерина Каблукова из тех авторов, открывая книги которых, ты чётко знаешь, что получишь отличный уровень, историчность и хорошую драму. И я всё это получила. Вдобавок – сильная, неистеричная и самодостаточная героиня, холодная шотландская природа, замок, интриги и тайны – всё то, что держит внимание до конца.\n\n📖 Героиня, попав в прошлое, причём прошлое с магическим оттенком, не забывает мгновенно о своём настоящем и ведёт себя адекватно ситуации. Она не дура, осторожна и внимательна, и встретившийся классный мужик не заставляет её забыть о цели вернуться домой. Задуматься – да, но дом не исчезает из мыслей как по волшебству, вытесненный торсом возлюбленного.\n\nОчень нравится лошадиная тема в книгах Катерины, ибо она в этом точно разбирается, и в целом видно, что автор эрудирован и знает об эпохе, о которой пишет.\n\nЕсли сравнивать, то есть хорошие такие вайбы «Чужестранки», так что любителям точно зайдёт. А я вспоминала толстенькие романы, которые читала пачками в 90е-00е, и там был роман про попаданку в шотландские земли – я очень его любила, хотя не вспомню сейчас точно название. И от «Кельтского креста» стало тепло на душе.\n\nА ещё очень здорово перекликается с сюжетом сам расклад «Кельтский крест» и значения карт, вынесенные в эпиграфы.\n\nХорошо сделано, безусловно рекомендую для любителей фентезийно-исторических романов и шотландских скал, замков и мужчин)\n\nНу и традиционно жду ваших отзывов под постом, если вы книгу уже читали, это помогает читателям найти свои книги.\n\n📕 Аннотация:\nДесмонд Оркнейский… \nПравитель, который был проклят еще до рождения. Я никогда не слышала о нем, пока ангелы смерти не сыграли со мной злую шутку, отправив сквозь время и пространство. Мне пришлось принять его покровительство, чтобы выжить в чужом мире. Мире, где царит жестокость и каждый неверный шаг может стать последним. \n \nНо если любишь, то ни времена, ни нравы не имеют значения. И если мне выпадет шанс вернуться домой, захочет ли этого мое сердце?\n\n#авторчитаетирекомендует #екатеринакалукова #кельтскийкрест"}, {"source": "kotova", "title": "«Механика невезения»", "book_author": "Галина Герасимова", "summary": "Ромфант про женщину-механика-артефактора, чей муж был обвинён в заговоре и убит в королевской тюрьме, и следователя, который вёл его дело — сплетение ненавязчивой романтики с крепким сюжетом заговоров и артефакторики. Автор хвалит логичное, не «притянутое за уши» поведение героев.", "tags": ["ромфант", "детектив", "артефакторика", "магическая академия"], "links": ["https://litgorod.ru/books/view/22498", "https://www.litres.ru/book/galina-gerasimova/mehanika-nevezeniya-63642256/"], "date": "2023-08-11", "review": "#авторчитаетирекомендует Прочитала \"Механику невезения\" Галины Герасимовой. Отличный необычный ромфант про женщину-механика-артефактора, чей муж был обвинен в заговоре и убит в королевской тюрьме. И про следователя, который вел дело мужа. Очень хорошее сплетение приятного, ненавязчивого ромфанта и крепкого сюжета с академкой, заговорами и интригами и артефакторикой. Нормальные герои со своими особенностями, логикой поведения и без внезапной дури из серии \"автору нужно ещё как-то закрутить сюжет\".  Прямо рекомендую https://litgorod.ru/books/view/22498 и https://www.litres.ru/book/galina-gerasimova/mehanika-nevezeniya-63642256/\nАннотация: \nБывший маг-артефактор, а ныне механик Тайрин мечтает о двух вещах: сохранить мастерскую покойного мужа и найти его убийц. Кто же знал, что в наследство ей достались не только механизмы и артефакты, но и неприятности, с ними связанные!\n   Её жизнь подвергается нешуточному риску, когда следователь Лэртис, человек, которого она ненавидит всем сердцем, отправляется за отпрыском королевской крови.\n   Сумеет ли Тайрин найти общий язык с врагом или станет очередной жертвой преступлений? Клубок загадок становится всё опаснее и запутаннее."}, {"source": "kotova", "title": "«Посмотри, наш сад погибает»", "book_author": "Ульяна Черкасова", "summary": "Тёмное славянское фэнтези про дочь свергнутых князей Велгу и наёмного убийцу Белого, чьи судьбы переплетаются в одну страшную ночь — история серых, неоднозначных героев без единого по-настоящему положительного персонажа. Автор честно предупреждает, что это тяжёлый дарк не для «нежных натур», хотя признаёт мастерство и самобытность автора книги.", "tags": ["тёмное фэнтези", "дарк", "славянские мотивы", "взрослое чтение"], "links": ["https://www.litres.ru/book/ulyana-cherkasova/posmotri-nash-sad-pogibaet-69291823/"], "date": "2023-08-10", "review": "«Посмотри, наш сад погибает» Черкасовой Ульяны.\n\n🛍️ Книга есть в бумаге, и на ЛитРесе.\n\nОтдельно хочу отметить обложку и внутренние иллюстрации «Сада».\nОни нереально прекрасны и словно оттеняли светом и сочетаниями цвета мрачность истории. Очень крутые, эстетически идеальные.\n\nЯ давно хотела познакомиться с творчеством Ульяны Черкасовой, и причин тому несколько:\n• Во-первых, её трилогия «Сокол и ворон» выпущена огромными по нынешним меркам тиражами (насколько я помню, более 30 тыс тираж) и в нескольких изданиях;\n• Во-вторых, сама Ульяна была и остаётся читательницей КК, и это круто;\n• В-третьих, я видела, как она вкладывается в свои книги – снимает ролики, клипы, под книги пишут песни, косплеят. А когда она приезжала в Питер, то сидела в Российской национальной библиотеке и смотрела для «Сада» планы старых боярских и княжеских усадеб. Такое погружение достойно уважения.\n\n⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️\n\n#авторчитаетирекомендует #ульяначеркасова #посмотринашсадпогибает\n\n⬇️⬇️⬇️⬇️⬇️⬇️\n\nИ в целом Ульяна – это такой пример исполнения мечты, когда человек пишет, много пашет по писательству параллельно с основной работой – и вот наконец писательство становится его основной профессией.\n\nЯ хотела начать с «Сокола и Ворона», но как раз выходил Сад и Ульяна предложила сначала почитать его. \n– Правда, это дарк, это не твоя тема, так что лучше не читай, – сказала она, и да, была права.\n \nЭто дарк. То есть вы не найдёте там смакования отвратительных подробностей, размазывания крови и кишок по нервам читателей и наслаждения валянием в человеческих пороках и грязи. Но это тёмное фентези, и такой нежной ромашке как я, было тяжело его читать – это действительно не моё.\n\nНо первую книгу я прочитала, и смело могу её рекомендовать тем, кто:\n• Обладает более крепкой душевной организацией, чем я;\n• Любит динамику, серых героев, в которых много плохого и неприемлемого, но в то же время есть и доброта, и человечность;\n• Любит славянский сеттинг.\n • А самое главное – любит погружение в атмосферу, потому что в «Посмотри, наш сад погибает» абсолютно осязаемая реальность, в которую ты падаешь. Кто любит ментальные посещения других миров – вам сюда.\n \n📖 Итак, Велгу, юную дочь влиятельных Буривоев, бывших когда-то князьми, да свергнутых, выдают замуж за северного князя. Но в ночь, после которой Велга должна отправиться на север к жениху, происходит страшное. И жизнь Велги меняется радикально.\nВ это же время Белый ворон, наемный убийца, получает заказ на семью Буривоев. И да, после этой ночи его жизнь тоже меняется, хотя он этого и не осознает сразу.\n \nПомните, я говорила вам про сложных, серых героев? Я терпеть не могу истории, в которых главный герой – убийца или какой еще преступник, мне трудно ему сочувствовать, я не знаю, как можно простить те вещи, которые Белый совершил.\n \nНо при этом по мере прочтения понимаешь, что и сам Белый, и его сёстры и братья по клану – это такие же жертвы, как те, кого они убивают, это изломанные, перекроенные злой волей дети, и им из этого не выбраться.\n \nИ тем удивительнее видеть, как в Белом, убийце и цинике, вдруг проскакивает человечность. Как он оказывается способен на переживания и чувства (я сейчас не про любовь), не становясь при этом кротким исправившимся ангцем.\n \nЕсли говорить про Велгу – то и она проходит свой путь. Из девушки, которая с рождения ступала по пуху, которая привыкла к поклонению, гордячки, высокомерной «принцессы» – в человека, который начинает видеть мир таким, какой он есть, и из щепки, которую несёт по течению, становится рулевым своей и чужой жизни. Да, её попытки манипулировать поначалу наивны, но она входит во вкус, и это видно.\n \nЕсть ещё Матеуш, несчастный горбун, калека, немощный князь, которого презирают и жители, и другие, в том числе Велка – и это весьма болезненные для меня моменты, потому что я очень остро отношусь к тому, когда человека унижают из-за его физических недостатков. Он – темная лошадка, и ничего плохого вроде не сделал, но не доверяю я ему. Хотя его любят животные, а животные чуют, когда человек плохой.\n \nДа и в целом в Саде нет абсолютно положительных героев, разве что Змай, который помогал Велге просто так, ничего от неё не желая. Если мы какие-то книги читаем ради комфорта, то эту стоит читать, если вы любите страшные сказки.\n \nЯ уже говорила про атмосферу – очень искусно вплетены славянские мотивы, божества, обряды, но без имитации старославянского, без гоев еси и подобной радости. Кое-где проскальзывали современные выражения, но таких было слишком мало, чтобы это нарушало атмосферу.\n \nЯ не знаю, буду ли читать вторую часть – мне очень интересно, я где-то с 5 главы ушла в запой и, пока не заглотила книгу целиком, не оторвалась. Но всё же после тёмного фентези я несколько дней болею, вспоминаю жестокие моменты и переживаю. Если вы покрепче, чем я – читайте.\n⬇️⬇️⬇️⬇️⬇️⬇️\n\n⬇️⬇️⬇️⬇️⬇️⬇️\n«Сад» хорош и тем, что он ни на что не похож, там видна индивидуальность автора, там нет шаблонов. И мне как писателю очень зашла аллегория смерти и перерождения в виде цветущего, прекрасного яблоневого сада Буривоев, который оказался сожжён и разрушен. Но и в нём осталась жизнь.\n\nТак что рекомендую, но с вышеуказанными оговорками.\n\n❓ Если вы читали – расскажите, как вам? Это поможет другим читателям решить, их это сорт травы или нет.\n\n#авторчитаетирекомендует #ульяначеркасова #посмотринашсадпогибает"}, {"source": "kotova", "title": "«Больница в Гоблинском переулке»", "book_author": "Анна Платунова, Наталья Шнейдер", "summary": "Добрый производственный ромфант про молодую целительницу-стажёрку, приезжающую в провинциальную больницу для бедных, организованную аристократом со скандальным прошлым — им предстоит работать вместе. Автор особо отмечает глубокое раскрытие детективной интриги и нешаблонную «стерву-бывшую», которая оказывается сложнее привычного штампа.", "tags": ["ромфант", "производственный роман", "детектив", "независимая книга"], "links": ["https://www.litres.ru/book/anna-sergeevna-platunova/bolnica-v-goblinskom-pereulke-68690538/", "https://litnet.com/ru/book/bolnica-v-goblinskom-pereulke-b421838"], "date": "2023-08-09", "review": "Прочитала «Больницу в Гоблинском переулке» Анны Платуновой и Натальи Шнейдер.\n\n📲 Я читала на Литресе (там она заслуженно носит плашку «бестселлер»), но есть и на других площадках, например, на Литнете.\n\nОчень рекомендую для тех, кому, как и мне, хочется добра, бальзама на сердце и глубокой, неповерхностной истории. Это хороший больничный производственный роман о том, как молоденькая стажёрка-целительница из простолюдинов приезжает в глушь, в провинциальный городок, проходить практику в больнице для бедных. Организовал больницу аристократ, целитель, который несколько лет назад со скандалом и разрывом помолвки уехал из столицы. И им предстоит работать вместе.\nГерой – живой, нормальный, при этом не скучный и классный. Героиня – девушка со стойкими принципами и высоким жизнелюбием. Очень понравилось и раскрытие детективной интриги, и то, что «стерва-бывшая» куда глубже, чем это принято в подобных сюжетах, и в целом посыл книги.\n\nОчень-очень рекомендую. Авторы пишут вторую часть, но первая абсолютно автономна и закончена.\n\n❓ Если вы читали – традиционно прошу поделиться впечатлениями, чтобы другие читатели могли определиться, читать или нет.\n\n📖 Аннотация:\nПрактика не задалась с самого начала. Больница в бедном квартале провинциального городка! Орки-наркоманы, матери-одиночки, роды на дому! К каждой расе приходится найти особый подход. Странная болезнь, называемая проклятием некроманта, добавляет работы, да еще и руководитель — надменный столичный аристократ. Рядом с ним мой пульс учащается, но глупо ожидать, что его ледяное сердце способен растопить хоть кто-то.\n\nОтправляя очередной запрос в университет, я не надеялся, что найдутся желающие пройти практику в моей больнице. Лечить мигрени столичных дам куда приятней, чем копаться в кишках бедолаги, которого пырнули ножом в подворотне. Но желающий нашелся. Точнее, нашлась. Студентка, отличница и просто красавица. Однако я ее начальник и мне придется держать свои желания при себе.\n\nP.s. ранее эта была на канале в виде аудио.\n\n#авторчитаетирекомендует #больницавгоблинскомпереулке #аннаплатунова #натальяшнейдер"}, {"source": "kotova", "title": "«Что ты несёшь с собой»", "book_author": "Юлия Жукова", "summary": "Нестандартное этнически-бюрократическое фэнтези с атмосферой китайских новелл — девушка-воин Ицара отправляется мстить клану, убившему демонессу-покровительницу её рода, но вместо мести оказывается выдана замуж в этот самый клан. Автор отмечает высокий порог входа из-за непривычных терминов, но и богатый культурный бэкграунд, и своеобразное «прогрессорство» героини изнутри вражеского клана.", "tags": ["фэнтези", "восточный сеттинг", "приключения", "лёгкий ромфант"], "links": ["https://t.me/kotovafantasy/2260", "https://author.today/work/247662", "https://litnet.com/ru/book/chto-ty-nesesh-s-soboi-chast-i-b425410"], "date": "2023-08-07", "review": "Здесь уже была аудиорекомендация, но теперь она же, текстом.\n\n«Что ты несешь с собой?» от моей любимой Юлии Жуковой – необычное этнически-бюрократическое, забавное и приключенческое фентези с чёткой атмосферой китайских новелл, восточных историй и фирменным авторским стилем. Безусловно рекомендую.\n\n📲 Есть на Автор.Тудей и на Литнет, на ЛитРесе есть тоже.\n\nЭто фентези, слегка поцелованное ромфантом – вы не найдёте тут ахов-вздохов и сюжет не крутится вокруг отношений, но всё же романтическая линия здесь есть. Необычная)) Кто прочитает – поймёт.\n\nВторой том Юля жаждет дописать до Нового года, а первый заканчивается вполне конкретно, поэтому можно спокойно передохнуть в ожидании. \n\nВ этой книге абсолютно прекрасна аутентичность мира – чувствуется богатый культурный и исторический бэкграунд автора. Поначалу может быть сложновато освоиться в тексте из-за некоторого количества новых понятий, к которым нужно привыкнуть и понять по контексту, но через пару глав уже читается как песня и определения воспринимаются как родные.\n\nВы уже поняли, что это очень нестандартная книга?)\n\n📖 Итак, молодая девушка-воин Ицара отправляется отомстить воинам соседнего клана, которые убили демонессу-покровительницу клана Ицары. Из-за этого воины лишились махары – волшебной энергии, благодаря которой они могли защищать простых людей от злых демонов и других существ. Но по прибытии в город обстоятельства складываются так, что вместо мести Ицара выходит замуж в этот самый клан.\nИ… дальше вообще не то, о чём вы подумали. Дальше борьба с системой, своеобразное прогрессорство, множество загадок, в том числе и жутеньких, колоритные древодома и приключения, которые на свою беспокойную… голову ищет героиня.\nКороче, это нужно читать, потому что нешаблонные истории сложно пересказать, не потеряв при этом значительной части их очарования.\n\nЧитается совершенно влёт, я проглотила за вечер – и, конечно, буду читать второй том.\n\nОчень, очень рекомендую!\n\n📕 Аннотация:\nРаньше моя семья охотников на демонов была под божественным покровительством и располагала огромной силой, но из-за подлого клана Саинкаеу всё изменилось. Мне не остаётся ничего, кроме мести, и средства выбирать не приходится, тем более, что мне и так выпал смертный жребий. \n \nВот только судьба подбрасывает неожиданный шанс: чтобы проникнуть во вражеский клан и отомстить, мне понадобится выйти туда замуж. \n \nЧто ждёт меня там? Месть и смерть в бою или бесславная жизнь при ненавистном муже? А может, помимо личной жизни придётся закатать рукава и заняться наведением порядка в делах клана, ведь они далеко не в идеальном состоянии...\n\n#авторчитаетирекомендует #юлияжукова #чтотынесешьссобой"}, {"source": "kotova", "title": "«Война меча и сковородки»", "book_author": "Артур Сунгуров", "summary": "Добротный сильный ромфант о девице Эмер, привыкшей к бою на мечах, которую королева награждает браком с добрым, умным и рассудительным (то есть, по мнению героини, скучным) мужем. Автор особо отмечает, что жанр и хорошая книга не зависят от пола автора, и рекомендует не пугаться обложек — книга бесплатна.", "tags": ["ромфант", "юмор", "бесплатная книга", "независимая история"], "links": ["https://litnet.com/ru/book/voina-mecha-i-skovorodki-b12637"], "date": "2023-07-01", "review": "В рамках подбора книг к новой серии имени моих рекомендаций перечитала «Войну меча и сковородки» Артура Сунгурова.\n\nИ это реально очень крутой, очень добротный и сильный ромфант. Хотя герой там, конечно, редкостный чурбан))) Но героиня изумительно прекрасна и восхитительна)\n\nПросто читайте и не пугайтесь мужского авторства – здесь высококлассный ромфант и лишнее подтверждение того, что жанр и хорошая книга – внегендерны.\n\n📖 Итак, девица Эмер награждается королевой хорошим замужеством. И муж ей назначен добрый, умный и рассудительный.\nОднако Эмер – девушка из краёв, где женщины не гнушаются боя на мечах, а волосы её, как и характер – настоящее пламя. И с таким мужем ей, конечно, будет скучно.\nНу что же… Эмер обеспечила весельем и себя, и нас)\n\nОчень рекомендую, бесплатно.\nОбложки не пугайтесь)\n\n#авторчитаетирекомендует #войнамечаисковородки #артурсунгуров"}, {"source": "kotova", "title": "«Эхо Миштар» (дилогия, первая книга)", "book_author": "Софья Ролдугина", "summary": "Плотное многожанровое фэнтези-эфирпанк о магах-кимортах, теряющих память и молодость после «сброса» силы — ученица Фогарта отправляется на поиски своего учителя и возлюбленного, лишившегося памяти после такого сброса. Автор называет книгу без единого минуса, отмечая огромный достоверный мир, множество живых взаимосвязанных героев и глубокие темы рабства, насилия и власти без скатывания в откровенный дарк.", "tags": ["фэнтези", "эфирпанк", "ромфант", "восточный сеттинг", "дилогия"], "links": ["https://www.labirint.ru/books/937061/", "https://t.me/brioline_bruce", "https://i-gram.ru/b/etzlp-eho-mishtar/", "https://i-gram.ru/b/apsqn-eho-mishtar-2-vershinyi-i-propasti/"], "date": "2023-06-17", "review": "#авторчитаетирекомендует\n\nПоследний месяц я была в печали, ибо 99% из того, что начинала, бросала. И какое же счастье, что по итогу решила взяться за вторую часть дилогии «Эха Миштар» Софьи Ролдугиной! Я в восхищении и просто категорически рекомендую всем любителям хорошего фентези, крепких сюжетов, плотной, многожанровой литературы, глобальных арок, приключений и ромфанта!\n \n📚 Первая книга вышла в бумаге в Эксмо в редакции Киры Фроловой, есть и в электронке, а вторая в бумаге выйдет в августе, а в электронке есть на сайте айграм.\n \nИтак, в мире «Эха» существуют киморты – маги, которые могут использовать магию-морт, способную изменять мир. Они не стареют, не умирают, только набирают могущества с возрастом. Но ничто не бывает бесконечно, и в какой-то момент происходит сброс – сила киморта переходит в звезду-спутник, который теперь всегда рядом и из которого можно черпать силы лишь кровью. А сам киморт лишается памяти и оказывается выброшен далеко-далеко от места, где он жил.\n\n⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️\n\nТак и случилось – вместо могущественного киморта Алайоша Та-Ци далеко-далеко появляется безымянный странник. Но его юная ученица Фогарта не может смириться в тем, что нет рядом больше любимого – учителя и мужчины. И она, узнав о крошечной возможности вернуть киморта после сброса, отправляется на его поиски.\n\nЧто же в «Эхе Миштар» такого, что она так меня зацепила?\n\nВо-первых, это абсолютно достоверный огромный мир, внутренне логичный. Он и так большой, но, читая книгу, ты всё время понимаешь по деталям, обрывкам разговоров, старым статуям, надписям и т.п., что за рамками повествования есть ещё огромная часть его географии, истории, культуры. Это мир с уникальной системой магии, которая называется морт – её принцип действия описан достоверно и понятно. Это люди с разными традициями в зависимости от региона проживания, это масштаб, захватывающий дух. Сеттинг Ишмирата – это восточный, даже ближе к азиатскому, сеттинг, но этот ориентир – крайне условный, вы поймёте, о чём я, когда прочитаете. В истории участвуют жители разных стран – и северяне, и кочевники с юга.\n\nВо-вторых, там много разных, живых, понятно мотивированных, связанных друг с другом, постоянно перемешивающихся и взаимодействующих героев. По мере движения сюжета и вокруг Алара, и вокруг Фогарты собираются люди с разными судьбами, кто-то уходит, кто-то переходит из одной «команды» в другую, и это выглядит очень органично. Каждый герой является на своем отрезке движущей частью сюжета, там нет героев первого и второго плана, которых можно убрать и ничего не изменится.\n\nВ-третьих, мы видим разные виды любви. Любовь ученицы к учителю, любовь мужчины к женщине, любовь к детям, к науке, к миру. Вся история – о любви, хотя, кроме ромфанта, там ещё много-много жанров, и любовь именно в романтическом смысле там одно из блюд, а не основное. И ещё эта история – о любви, грандиозной любви автора к своему миру. \nНаверное, ещё и это очень-очень покорило меня, я почувствовала здесь родственную душу)\n\nВ-четвёртых, вопросы, которые поднимает в «Эхе» Софья – вопросы рабства, насилия, братоубийства и детоубийства ради власти, вопрос о том, как победить дракона, самому (или самой) не став драконом – это очень важные, очень актуальные вопросы. И, несмотря на тяжесть отдельных моментов, эта книга – очень добрая, очень светлая и наполненная мягким авторским юмором. Мне очень нравится то, что перед героями не стоит мелких задач, хотя начинается все с желания ученицы вернуть учителя и любимого. Мне нравится, что эта история поднята над мелкими дрязгами, хотя и основана на последствиях человеческих страстей.\n\nЯ так расхвалила, и вы спросите – неужели нет вообще никаких минусов? Я ведь всегда стараюсь указать то, что меня царапнуло или не понравилось, не зашло. \nТак вот, в «Эхе» действительно нет вообще никаких минусов. Я уже говорила Софье – мне даже зацепиться не за что, это прекрасная, плотно написанная, гармоничная, полностью самодостаточная и очень красивая история.\n \nЕдинственное, о чём хочу предупредить (это не минус, а особенность) – эту историю не получится читать фоном, вполглаза, пролистывая – она требует внимания, поэтому лучше растянуть удовольствие по 100 страниц в день, чем пытаться заглотить всё сразу (сказала Котова, которая заглотила))). И у этой истории высокий порог входа. Нужно прочитать главу-две, чтобы привыкнуть к миру, влиться в темп повествования и в стиль. Софья изначально использует несколько незнакомых терминов, которые потом ты понимаешь по контексту (хотя я изначально искала глазами ссылочку на определение, кто такой экстра, что такое спутник и т.п.). Но потом ты понимаешь принцип повествования и вливаешься в него. Собственно, если вы в «Королевской крови» в начале первой книги ловили себя на мысли «что происходит и кто все эти люди» – то на первой главе «Эха» может создаться подобное впечатление. Но это все со второй главы уходит напрочь, ты с головой ныряешь в историю.\n⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️⬇️\n\nМне кажется, я могу бесконечно признаваться в любви к этим книгам. Это полновесное, крепкое фентези, жанр которого сама Соня определяет как «эфирпанк» – то есть движущей силой в механизмах тоже является магия. Но это, безусловно, не одножанровое фентези – это и ромфант, и приключения, и история взросления, и детектив, и социальное фентези, и политическое. Местами жесткое, но не скатывается в откровенный дарк, за что моё Соне большое спасибо. Короче, 100% моя книга.\n\nВ принципе, я неоднократно говорила, что считаю Софью Ролдугину одной из лучших писательниц России на данный момент, и после Эха готова повторить это ещё много раз. Спасибо огромное Софье за удовольствие, а всем читателям – читайте обязательно!\n\n#авторчитаетирекомендует #эхомиштар #софьяролдугина"}, {"source": "kotova", "title": "«У любви на крючке»", "book_author": "Тесса Бейли", "summary": "Лёгкий зарубежный современный любовный роман про сестру и друга героев книги «Что случилось этим летом» — Ханна, привыкшая быть «королевой вторых ролей», и известный бабник Фокс с крепкой репутацией, которая не позволяет ему заводить серьёзные отношения. Автор канала дала свой отзыв для обложки книги и называет её идеальным пляжным чтением с мягким юмором и внезапно яркими горячими сценами.", "tags": ["современный роман", "СЛР", "лёгкое летнее чтение", "зарубежная проза"], "links": ["https://www.litres.ru/book/tessa-beyli/chto-sluchilos-etim-letom-68935749/"], "date": "2023-05-27", "review": "Подробнее о книге и истории отзыва читайте ниже)\n\n#авторчитаетирекомендует\n\nЯ уже говорила, что некоторое время назад отчего-то завернула на зарубежные современные любовные романы. И где-то в это же время Александра Румянцева бренд-менеджер ЭКСМО предложила мне прочитать, и, если понравится, дать свой отзыв на обложку романа «У любви на крючке» Тессы Бейли. Это автор нашумевшего СЛР «Что случилось этим летом» – и «У любви на крючке» рассказывает о сестре и друге героев из первой книги.\n\nЯ прочитала, и мой отзыв появится на обложке книги) Я даже купила и прочитала первую, потому что меня заинтересовала судьба героев. Первая есть на Литрес, а вторая как раз готовится к выходу в конце июня.\nТак вот, что я имею вам сказать.\nЭто отличная книга на лето. Идеальна для пляжного чтения, или чтения в самолете-поезде.\nЕсли вы любите романтику небольших городов, хорошую музыку (я реально расширила свой плейлист, потому что героиня увлекается виниловыми пластинками и герои постоянно обмениваются различными песнями) и горячие сцены, то вам точно сюда. Но это книга ещё и очень милая, так что секс выпрыгивает на вас внезапно где-то после середины, когда ты уже думаешь, что его и не будет.\n\nЭто хорошая летняя книга про то, как низкая самооценка (героиня, Ханна, привыкла быть на вторых ролях и сама себя называет королевой вторых ролей) или сложившаяся репутация (Фокс – известный в городке бабник, который никогда не заводит серьезных отношений) – это не то, чем ты являешься, и не надо позволять этому портить себе жизнь.\n\nНе ждите от неё глубин человеческих драм, философских откр

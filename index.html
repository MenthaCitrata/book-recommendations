<script id="book-data" type="application/json">[{"source": "kotova", "title": "«Человек с островов»", "book_author": "Анюта Соколова", "summary": "Ромфант с необычным альтернативно-современным миром, где рядом с людьми живут мавки, лешие и домовые, а между Империей и островитянами идёт война. История о хладнокровной героине-имперке, которая покупает измождённого раба-островитянина и постепенно влюбляется в него, при этом книга поднимает непростые социальные темы и не боится жёстких моментов.", "tags": ["ромфант", "фэнтези", "война культур", "рабство (осторожно)", "социальная тематика"], "links": ["https://author.today/work/400053", "https://litnet.com/ru/book/chelovek-s-ostrovov-b505122", "https://vk.cc/cZ8TQA", "https://feisovet.ru/book286313137?utm_content=286349206_286313137_0"], "date": "2026-06-28", "review": "Всегда радуюсь, когда нахожу нового самобытного автора со своей узнаваемой манерой. Сегодня хочу рассказать вам о «Человеке с островов» Анюты Соколовой .\n\nЯ читала на Автор.Тудей https://author.today/work/400053\nНо есть и на Литнет https://litnet.com/ru/book/chelovek-s-ostrovov-b505122\nНа Литрес (есть и аудио) https://vk.cc/cZ8TQA\nИ на ПМ https://feisovet.ru/book286313137?utm_content=286349206_286313137_0\n\nОб Анюте Соколовой я слышала давно, и вот наконец-то до нее добралась и за последние несколько дней прочитала цикл «Острова» - каждую книгу можно читать отдельно.\n\nНо зацепила меня именно «Человек с островов», а затем уже я с удовольствием прочитала и остальные две книги в цикле. При этом, если бы не множественные рекомендации, я бы не заставила себя даже открыть книгу, потому что она начинается с темы рабства, а эта тема для меня антикинк, книга должна быть очень хороша и очень многие должны ее рекомендовать, чтобы я пробралась через эту тему к прекрасному.\n\nДля тех, кто так же, как и я, не любит эту тему – не переживайте, о рабстве там первые несколько страниц, а история вообще не о нем.\n\nТо, что меня покорило в «Человеке с островов» - автор слой за слоем по ходу сюжета снимает с героев их тайны, и заставляет читателя каждый раз удивляться и переживать. Очень люблю такие истории, в них влетаешь с размаху и не можешь остановиться, пока не дочитаешь.\n\nМир альтернативный, но вполне современный – с альтернативными видами связи, автомобилями-метро, но при этом с уникальной магией. История мира дана ненавязчиво, но объемно, и эта история влияет на современные события.\nИ герои тут отличные – изумительно хладнокровная героиня, которая работает скромным клерком и как-то приходит на рынок купить щенка, а в результате из жалости покупает истощенного раба. И собственно, герой, который взрослеет и матереет на наших глазах. А еще она – имперка, а он – островитянин, и между их странами как раз сейчас идет война.\n\nПобаловала нас автор и перевертышем, когда сначала все так, а потом бац – и этак, и это тоже добавило плюсов истории. Ну и погладила по душе идея, что любовь может остановить войну. Немного утопическая, но в это хочется верить, да?\nВ целом по циклу хочу добавить, что есть довольно жестокие моменты, это не дарк, но уколы реала ощутимы. Не все герои благостные пирожочки и вполне могут совершать ошибки и некрасивые поступки.\n\n Плюс Анюта Соколова на фоне чистого ромфанта – потому что все эти истории это прежде всего ромфант – поднимает непростые социальные вопросы. И весь цикл крутится вокруг одной семьи – семьи императора Бергана, и мне нравится ощущение семейственности, которое есть в этом цикле.\n\nЯ очень рекомендую «Человека с островов» - это идеально сделанный ромфант с очень приятной и самобытной манерой автора на фоне социальных и военных проблем. «Кодекс целителя» того же автора для меня оказался жестковат, с темой насилия, а «Человек» прямо идеально зашел.\nСпасибо автору за прекрасные истории! Если вы читали  - обязательно напишите под постом, чтобы поддержать автора и дать ориентиры другим читателям!\n\n(А для моих курсантов с курса «Ромфант для продолжающих» - обратите внимание на последние абзацы романов этого цикла – это пример того, как автор внутри цикла делает идеальные клиффхэнгэры и крючки). \n\nНу и напоминаю, что все мои рекомендации можно найти вконтакте по тегу #авторчитаетирекомендует"}, {"source": "kotova", "title": "«Драконьи сказки» (и «Драконий сад»)", "book_author": "Ольга Абрикосова", "summary": "Городское/эпическое фэнтези о противостоянии белых и чёрных драконов и лис-тёмных ведьм, начинающееся с истории раненого молодого дракона Шнурра, спасённого ведьмой Маррой, которая драконов ненавидит. Мир с серой моралью, элементами дарка и юмора, где расы и их менталитет прописаны нестандартно и убедительно.", "tags": ["фэнтези", "драконы", "дарк-элементы", "серая мораль", "цикл"], "links": ["http://author.today/work/505697", "https://t.me/abrikosovasamizdat"], "date": "2026-06-20", "review": "Совершенно случайно наткнулась на чудесный цикл «Драконьи сказки» Ольги Абрикосовой.\n\nС автором до этого знакома не была, поэтому очень приятное впечатление оставила свежая концепция мира, глобальный сеттинг, противостояния драконов с их нечеловеческими традициями и внутренним светом и лис-тёмных ведьм, которых так тянет к драконам из-за их света. И тяга эта взаимна.\n\nНачала я читать как всегда не с начала цикла (каждую книгу в цикле, кроме первого трёхтомника «Драконьи сказки», можно читать отдельно), а с однотомника «Драконий сад». И так он мне понравился, что пошла читать остальные книги. \nЧитала на Author.Today, на остальных порталах – ознакомительные фрагменты.\n\n«Драконьи сказки» – это условное начало цикла. И начинается он с того, что между белыми и чёрными драконами заключается мир – чёрные попадают под пяту белых, но со всеми привилегиями. Однако солдаты противников не всё знают ещё о мире. И тройка чёрных драконов нападает и сильно ранит молодого белого дракона Шнурра, которому удаётся скрыться – но который на грани издыхания и еле-еле доползает до жилья и валится там в сарае помирать.\n\nА сарай принадлежит лисе-тёмной ведьме Марре, у которой был уже неудачный роман с жестоким драконом и которая их терпеть не может.\n\nА Шнурр, как бы ни харахорился – ещё очень-очень молод. Он моложе Марры и о женщинах знает… немногое.\n\nЭта история не только об этих двоих. Но и о чёрной боевой драконице Злате и сильном, полном света драконе Эррине, который кажется слабым и изнеженным. О его враге Ригане, главе инквизиции, которая борется с тьмой в ведьмах и драконах и сестре Эррине Лане, которая, вот незадача, дочь их общего отца от наложницы-лисы. И всё это на фоне расследований, обширного мира, в который щедро намешаны сказочные элементы и элементы жути и дарка, и, много раз предупрежу, далеко не благородных и не высокодуховных героев. Они не мрази и не сволочи, но до героев в белых плащах им далеко.\n\nЭто фэнтези, в котором очень классно прописаны особенности рас и их отличие от человека.\n\nЗдесь серая мораль – герои делают и хорошие, и плохие поступки, здесь есть элементы дарка и при этом элементы юмора, здесь, как я уже сказала, отлично исторически сделано мироустройство и противостояние Света в драконах и Тьмы в лисах-ведьмах.\n\nДа, иногда кажется, что герои и героини придумывают себе проблемы, но это не вызывает раздражение и читатель может объяснить это как раз особенностями не-человеческого менталитета. Как и то, что периодически они друг друга мучают. Там, наверное, только Шнурр – относительный гринфлаг, остальные той или иной степени поганистости. Особенно мужики. Но наблюдать за ними интересно, хотя иногда думаешь “ну ты не дракон, а козел, блин!”\n\nДраконы здесь – не огромные зверюги. В обороте они размером от одной коровы (молодые, их называют ещё щенками) до трех коров. А в человеческом виде, конечно же, прекрасны, носят длинные волосы, обожают, чтобы их расчёсывали ведьмы, вполне могут оторвать голову за непочтительность, хитры и коварны.\n\nМне очень понравился логичный и прописанный мир, который создала Ольга Абрикосова, и я обязательно дочитаю все истории до конца. И драмы там достаточно, хотя без чрезмерности. Я уже прочитала «Сад» и «Сказки» и читаю дальше)) \nИ вам рекомендую!\n\n#авторчитаетирекомендует@kotovafantasy"}, {"source": "kotova", "title": "«Сага о принце на белом коне»", "book_author": "Юлия Стешенко", "summary": "Ромфант о столкновении культур — викинг-наследник ярла Торвальд должен соблазнить попаданку-колдунью Иву из технологически развитого мира, чтобы выведать магические секреты, но вместо этого они оказываются втянуты в дарковатый детектив. Автор отмечает отличную детективную линию, горячую романтику без пошлости и убедительно прописанный быт древней Скандинавии.", "tags": ["ромфант", "попаданцы", "викинги", "детектив", "столкновение культур", "18+"], "links": ["https://t.me/steshenkojula", "https://author.today/work/379859", "https://litnet.com/ru/book/saga-o-prince-na-belom-kone-b513672", "https://feisovet.ru/book286313977?utm_content=286349206_286313977_0"], "date": "2026-06-13", "review": "Прочитала я два тома этой серии и побежала к автору кричать «где третья?». А она мне и говорит – а мне надо переключаться между сериями, а то вдохновение страдает, не могу подряд одну писать.\n\nКороче, рекомендую вам классную-прекрасную историю с огоньком, столкновением культур и отличным сексом. Исключительно ради того, чтобы вы страдали и ждали вместе со мной!\n\n«Сага о принце на белом коне» Юлии Стешенко – спонсор моей бессоницы пару недель назад. (А ещё спонсор моего желания пойти к логопеду, потому что часть имён там ещё сложнее выговорить, чем муджангские имена у Юли Жуковой).\nХм, похоже, это заговор Юль.\n\n                       Читать на:\n                🤩АТ 🤩 ЛН 🤩 ПМ\n\nЧитайте, читайте, читайте! История классная. Первый том разгоночный, второй – уже идёт на полной скорости.\n\n🫡Торвальд – настоящий викинг, силен, красив, белобрыс, боеспособен, а еще и наследник ярла. И невеста у него прекрасная, и меч острый – правда, папа не позволяет сыну пока выбрить виски, как настоящему мужчине, ждёт настоящий подвиг, достойный сына ярла. А все те подвиги, которые Торвальд уже совершил, мелковаты. Для сына ярла, конечно же, для обычных людей огого.\n\nИ жил бы себе Торвальд, соблазняя девиц, совершая подвиги и участь премудрости управления землями, если бы не чужаки-маги, которые неведомо откуда пришли на земли ярла и договорились с ним о торговле. Построили своё селение за высоким забором, полное всяких чудес, и начали жить-поживать.\n\nИ с одним из них, колдуном, Торвальд даже сдружился. Но вот отец решил ,что нечего красоте сына пропадать, и велел ему соблазнить колдунью, подругу друга Торвальда (уж простите за сериальный оборот), чтобы та, разомлев, передала местным все колдовские премудрости.\n\n💥Да вот только колдунья Ива – девушка из другого мира, мира, для которого даже Земля – отсталая. Мира, где технологии соседствуют с магией, а корпорации добывают ресурсы во всем множестве миров, в которые имеют доступ. И наследник ярла для неё – дикарь, не обременённый моралью, как и все местные.\n\nВы поняли, да, почему меня так зацепило?)) Обожаю столкновение культур ещё со времен «Замужа с осложнениями». И люблю, когда герой такой весь из себя двухметровый гигант, а героиня мелкотравчатая)\n\nНо понеслось для меня всё тогда, когда эти двое встречают на своем пути путника и тот просит его убить))) Вот прям с этого момента история перестала быть просто книгой о столкновении культур, а стала ещё и слегка дарковым детективом.\n\nИдеально дана разница в мировоззрениях, в том, что допустимо, а что нет, и на этом строится множество комичных ситуаций. Не балаганно-комичных, а приятно-комичных, всё же эта история – не юмор, хотя иронии там достаточно. Иве и Торвальду приходится вместе заниматься расследованием, и детективная линия в антураже древней Скандинавии тоже очень хороша. Круто даны подробности быта, культуры, религии – я воспринимала всё очень кинематографично.\n\nИ самое классное то, что несмотря на свое варварское воспитание, наличие рабов, решение проблем насилием, Торвальд – умный и нормальный мужик. Знает, так сказать, как обходиться с девушками, и Иве устоять очень сложно. В первой книге больше детектива, во второй – наряду с ним много горячего секса, и любителям горяченького прямо рекомендую – всё без пошлости и тесной физиологии, но и без возвышенности и пафоса. Хорошо написано.\n\nЮлия Стешенко даёт не только конфликт культур, но и внутренний конфликт героини. Ива, дитя мирного мира с победившим гуманизмом (в котором лишь иногда происходят преступления), постоянно на грани. С одной стороны – её к герою тянет (и я её понимаю, он прекрасен, очень живой, очень такой плотский без томности мужик, варвар, но без сморкания в скатерти). 💔💔💔\n\n#авторчитаетирекомендует@kotovafantasy\n\n💔💔💔С другой – то, как просто он относится к насилию, к смерти, как легко он может кого-то убить, похитить, то, что живут викинги разбоями и только последнее время из-за торговли с её одномирянами набегов этих стало меньше – заставляет её и сомневаться, и испытывать страх, и быть настороже.\n\nСама героиня прекрасная – современная, разумная, с иронией, с острым языком, но без дурости, заставляющей хамить сильным мира сего и лезть на рожон.\n\nФух, вот писала вам и захотелось перечитать сразу же. Может и сорвусь в перечит. А может, всё же возьму силу воли в кулак и буду ждать третью часть. Не знаю, будет ли она заключительной.\n\nЕсли что, и в 1 и во 2 части арка закрывается, нет такого, что ты подвешен и не знаешь, что случится дальше. Каждая книга – как отдельное расследование + развитие отношений Ивы и Торвальда. И знакомство с обоими мирами.\n\nЭто одна из тех книг, которую мне хочется тыкать каждому в руки и кричать: «Читайте, читайте, обязательно читайте»!!!\nКак, вы еще не читаете?\nОбязательно читайте!!!!))\n\nЗ.Ы. «Сага» входит в цикл «Врата между мирами», но читается абсолютно автономно, и я прямо рекомендую начать с неё. Первую я тоже прочитала, но она мне показалась более дарковой, хотя главный герой там, Марк, тоже обалденный. Но всё же рекомендую начать с «Саги». Это моя фишка, похоже, начинать не с первых книг циклов)\n\n#авторчитаетирекомендует@kotovafantasy"}, {"source": "kotova", "title": "«Рионада»", "book_author": "Натали Смит", "summary": "Романтическая космофантастика о выживании на загадочной враждебной планете — наследник космической империи Андрей и девушка-киборг Настя постепенно сближаются на фоне тайн, оставленных погибшим отцом героя. Автор отмечает уютную атмосферу истории несмотря на напряжение, ярких героев и обаятельный ИИ по имени Морок.", "tags": ["космофантастика", "ромфант", "выживание", "тайны", "независимый роман"], "links": ["https://author.today/work/495356", "https://litnet.com/ru/book/rionada-b556289", "https://www.litres.ru/book/natali-smit/rionada-72622111/"], "date": "2026-06-06", "review": "#авторчитаетирекомендует\n\nОх, какую классную историю я вам принесла! Впервые за долгое время я так погружалась в чтение, что выныривала на детской площадке, на скамейке, и не понимала, где я и как сюда попала.\n«Рионада» Натали Смит - это космофантастика, выживание на дикой, ни на что не похожей планете, загадки, тайны, медленное сближение героев.\nЯ читала на АТ https://author.today/work/495356 , но есть на\nЛитнет https://litnet.com/ru/book/rionada-b556289\nЛитрес https://www.litres.ru/book/natali-smit/rionada-72622111/\n\nПрямо очень рекомендую и всем любителям романтической космофантастики – история будет интересна и женщинам, и мужчинам, потому что упор там именно на «фантастику», и сделана история очень классно. И тем, кто этот жанр не любит, тоже очень советую почитать, потому что это возможность примкнуть и получить удовольствие.\n\nА еще, несмотря на драматизм и напряжение второй половины истории, в ней было на диво уютно. Уютно в космическом корабле Андрея Кощеева, главного героя, уютно в станции на той самой странной планете Рионада, которая тоже является героем романа. И герои меня порадовали – они нормальные, без прибабахов, но при этом читать про них не скучно вот ни на капельку.\n\nАндрей – наследник космического магната и путешественника, которого отец вырастил «в пробирке» как будто сын - один из его экспериментов. Отец таинственно погиб как раз на планете Рионада, оставив сыну свою мегаимперию и необходимость в ней разбираться. А еще - желание выяснить, что же случилось с родителем.\n\nНастя Богатырева – и девушка, и частично киборг. Когда-то давно она потеряла маму в аварии, а сама была покалечена. И теперь она чрезвычайно сильна – потому что вместо рук у нее киборг-протезы.\nА еще она – дочка прославленного космического генерала Черномора, который честен, смел и потому беден. И дочка под стать отцу – нанимается помощницей к Кощееву, чтобы заработать денег и поправить дела семьи. Мне очень нравится то, как Андрей, глядя на Настю, начинает ощущать красоту и вкус мира вокруг, потому что она очень искрення в эмоциях.\n\nА еще там совершенно обалденный искусственный интеллект по имени Морок, едко-ироничный, мудрый и сильный, в которого я почти влюбилась.\n\nА еще – планета, где все живое стремится тебя убить. Планета эта появилась в звездной системе внезапно, словно ниоткуда, на ней происходят удивительные явления – которые и летит исследовать Андрей.\n\nЧитатель словно оказывается в дальнем будущем, так тщательно и при этом нескучно описывает автор это самое космическое будущее. Технологии и возможности, расселение человечества и рост науки. А уж несколько вотэтоповоротов в истории нагнетают динамику и напряжение и заставляют нестись вперед по тексту, пока не дочитаешь. И какая там классная романтика, так мне понравилось наблюдать за зарождением и развитием чувств, за сближением, за узнаванием друг друга, за моментами близости. Я обычно не поклонник такой динамики, но тут прямо ах.\n\nНатали Смит многие знают по нашумевшему «Блогу Бабы Яги», но мне, как всегда, свойственно начинать не с первых книг цикла («Рионада абсолютно независимая история, однотомник, можно читать отдельно от серии). Узнала я о книге в теме самопиара для авторов, которую открываю раз в месяц в своих группах, заглянула и пропала.\n\nСейчас я читаю «Блог Бабы Яги» - это горфэ, и я подспудно понимаю, что «Рионада» - это то, что происходит в альтернативной \"Блогу\" реальности. Мне нравится налет славянскости без лубочности, который расширен до галактических масштабов в «Рионаде», пожалуй, это та самая эклектика, которую я люблю в книгах.\nОчень рекомендую, читайте – для выходных самое то, и попутешествовать по другому миру, и уютностью побаловаться, и попереживать за выживание, и за любовью понаблюдать.\nСпасибо огромное, Наталья, за удовольствие и за то, что я действительно в книгу «проваливалась», отключаясь от реальности!"}, {"source": "kotova", "title": "«По всем вопросам обращаться в дракона»", "book_author": "Наталья Филимонова", "summary": "Юмористическое романтическое фэнтези про женщину Инну, попавшую в мир, где она оказывается полудраконом — а полудраконов там официально не существует, и раскрываться ей нельзя. Устроившись секретарём к ректору-дракону магической академии, она сталкивается со свежим взглядом на «попаданчество» и глобальной проблемой, которую придётся решать.", "tags": ["юмористическое фэнтези", "ромфант", "попаданцы", "драконы"], "links": ["https://author.today/work/362518", "https://litnet.com/ru/book/po-vsem-voprosam-obrashchaites-v-drakona-b499304", "https://litgorod.ru/books/read/13452", "https://www.litres.ru/book/natalya-filimonova/po-vsem-voprosam-obraschaytes-v-drakona-71727142/"], "date": "2026-05-31", "review": "#авторчитаетирекомендует\n \nПришла к вам с книгой, которая по названию кажется юмористически-забавной. А на самом деле там помимо забавности есть и глубина, и глобальная проблема, и интересный мир. Издательствам, которые ищут хорошее качественное романтическое юмористическое фэнтези, прямо рекомендую присмотреться.\n \n«По всем вопросам обращаться в дракона» Натальи Филимоновой – отличное чтение на несколько вечеров.\nЯ читала на АТ \nНо есть и на Литнет  и Литгород \nИ на Литрес \n  \nГлавная героиня, Инна, взрослая уже женщина с ребенком, попадает в мир, где она является полудраконом. Проблема в том, что полудраконов там не признают. В смысле, считают, что их нет. Но очень-очень тайно известно, что таких, как она, забирают себе драконы… и потом полукровки пропадают с концами.\nТо есть раскрываться ей нельзя никак. А вот как справиться то со стихийно выступающей чешуей, то языками пламени, нужно разобраться – и для этого Инна решает устроиться секретарем к ректору магической академии. Ректор, конечно же, дракон. Но хороший такой дракон, качественный. Без властопластелинства и рычаний, и не функция для поигрывания кубиками.\n \nМне очень понравилась сама концепция попадания – я такой нигде не встречала, и это стало довольно свежей философией.\n\n Не буду пересказывать, но она меня очаровала. Понравилась героиня – она далеко не дурочка, и действительно умеет уболтать кого угодно. Понравилось, что под ее полукровство-полудраконство подведена глобальная проблема, которая началась давным-давно и которую героиня должна решить.\n\nА еще в философии попаданства в этом цикле (книга – однотомник, но в этом цикле есть другие истории, объединенные как раз необычным концептом попаданства) есть очень классный момент. Человек мир не выбирает, он попадает туда, где есть какая-то большая проблема или несправедливость, которую он может исправить. И сам он попадает в критичный для себя момент.\n\nНаталья Филимонова хорошо описывает детей – ее дети это не ангелочки, которых мама-попаданка накормила, погладила по головушке, оставила няне и усвистала строить личную жизнь и спасать мир. Нет, они активные, живые, и не являются фоном, чтобы показать, какая героиня хорошая мать. Здесь ребенок является активным участником истории.\n\nОчень приятное послевкусие после истории, поэтому я уже дочитываю вторую из этого же цикла.  Первой является «Дом, где тысячи дверей», но я как неформал от чтения, решила оставить его на потом )) https://author.today/work/210738"}, {"source": "kotova", "title": "«Знак Саламандры» (трилогия)", "book_author": "Мария Камардина", "summary": "Городское фэнтези о современной России, куда 15 лет назад пришла магия элементалей и драконы — секретарь Катя скрывает опасную тайну, пока не оказывается втянута в убийство и межмировую угрозу. С каждой книгой детективный сюжет набирает масштаб, а любовная линия развивается органично и правдоподобно.", "tags": ["городское фэнтези", "детектив", "драконы", "трилогия", "ромфант"], "links": ["http://author.today/work/226952", "https://www.litres.ru/series/departament-licenzirovaniya-drakonoborcev-853675", "https://www.chitai-gorod.ru/r/yMBdN"], "date": "2026-05-22", "review": "Перед выходными я пришла к вам с трилогией, про которую обещала рассказать. Она схватила меня за бочок и не выпускала, пока я не прочитала все 3 книги. Трилогия закончена, книги нужно читать одну за другой.\n\nОчень рекомендую – «Знак Саламандры» Марии Камардиной.\n\nЧитала я на Автор.Тудей, \nНо первые 2 книги есть и на Литрес, и, как понимаю, скоро появится и третья. Аудио тоже есть и на Литрес, и на Яндекс книгах.\n\nЧитала я с огромным удовольствием. Это городское фэнтези, современный мир, Россия, в которую 15 лет назад пришла магия. Магия необычная – не буду сейчас пересказывать, но мне очень понравился концепт своей свежестью и неизбитостью.\n\nПроизошло столкновение нашего мира с параллельным миром элементалей, которые и сильнее, и умнее, и справедливее – и за прошедшие годы всем пришлось приспособиться. И им, и нам. А ещё Землю наводнили драконы. Самые разные, мелкие и большие, дикие и те, кого удалось приручить. И это добавляет очень крутого колорита, потому что драконы и дракончики активно участвуют в истории. И магия тут с одной стороны знакома нам всем по сказкам и сказаниям, а с другой – необычна и эклектична.\n\nНу а вы знаете, что если где-то в истории есть эклектика и автор круто миксует натуру и жанровые особенности, даёт свежих персонажей, то Котова бежит читать быстрее, чем бежит за шоколадкой. Или даже набором шоколадок)\n\nГлавная героиня, Катя, работает в Департаменте лицензирования драконоборцев секретарем. Вроде бы обычная бюрократическая работа, на которой за Катей ухаживают сразу 2 коллеги.\n\nНо только вот у Катерины есть тайна, и никакой личной жизни у неё быть не может.\n\nОднако в один прекрасный день в департамент приходит новенькая, которая метила на место, на которое назначили Катю. И эта новенькая становится причиной и того, что тайна Катерины становится явной, и обвинения Кати в убийстве, и вовлечения её в самое захватывающее приключение её жизни.\n\nМне понравилась главная героиня – она серьёзная, вдумчивая, упрямая, настойчивая. И мне очень понравился герой. Во-первых, он обычный. Работает, подрабатывает, помогает семье, миллиардов нет, золотой ложки во рту тоже. Вот просто парень из соседнего двора, без избранности и сверхъестественных способностей (магия у него есть, но обычная магия, без мажористости))). Во-вторых, он нормальный. Полюбился мне сейчас типаж грин-флагов, если они не скучно написаны, а тут прям хорошо и скучать некогда. В-третьих, у этого героя, как и у героини, очень внятная и классная арка развития. И крутость свою он обретает в процессе, и не просто обретает – зарабатывает. У него есть характер, принципы и основательность, он хороший такой надежный мужчина, при этом, повторюсь, вообще не скучный.\n\nИ любовная история, которая сплетается с очень крепким детективным сюжетом, очень хороша, она такая правильная, хорошо развивающаяся.\n\nС каждой книгой трилогии складывается детективная история, набирая размах – и от обычного, казалось бы, убийства по неосторожности переходит к межмировой угрозе. Есть здесь место и драме, и замиранию сердца, есть моменты умиления – то есть трилогия написана очень правдоподобно, в историю веришь, герои воспринимаются как живые, нет нарочитости в характерах.\n\nТак что безусловно рекомендую.\n\nЯ поискала для любителей бумаги – все три книги уже вышли.\n\nОбложки классные прямо, да? То, что там написано, что это «Гарри Поттер в российском сеттинге» – не обращайте внимания, это из серии «там волшебники и здесь волшебники, там министерство магии и тут министерство». Ничего общего нет, это отдельная классная история.\n\nЧитайте на здоровье! Напишите потом, как вам, понравилось или нет, а если уже читали – напишите впечатления.\n\n#авторчитаетирекомендует@kotovafantasy"}, {"source": "kotova", "title": "«В лучших драконьих традициях»", "book_author": "Марианна Красовская", "summary": "Тёплая новогодняя романтическая (и слегка эротическая) повесть в жанре городского фэнтези — секретарь-лисица Софья вынуждена устроиться на работу к боссу-дракону на архипелаг, напоминающий Японию, где, по местной традиции, боссы часто заводят романы с секретаршами. Небольшая, уютная и согревающая история без надрыва.", "tags": ["ромфант", "горфэ", "новогоднее настроение", "повесть", "лёгкая эротика"], "links": ["https://author.today/work/559558", "https://litnet.com/ru/book/v-luchshih-drakonih-tradiciyah-b585444", "https://vk.cc/cXB71e"], "date": "2026-05-08", "review": "#авторчитаетирекомендует\nПока готовлюсь к завтрашней лекции, посоветую вам на вечерок пятницы для согрева и тепла малышку-малышку, повесть на 4 алки от Марианны Красовской. \n\n\"В лучших драконьих традициях\" - это романтическая (и слегка эротическая) история в жанре горфэ, с необычным миром, где оборотни живут прям как люди. \n\nГероиня - Софья Лапкина, оборотень-лисица шикарных форм, работает на мажора, невыносимого мерзкого босса. Она секретарь, и высокопрофессиональный секретарь. Работает, потому что дала обещание деду нынешнему боссу-молокососу, и сто раз об этом пожалела.\n\nИ если вы думаете, что история о том, как босс-молокосос оказался классным мужиком, а хамил потому ,что брутально не умеет иначе выражать чувства, то вы ошибаетесь))\nОчень не хочется проспойлерить, но Софья оказывается на улице с волчьим билетом... и ей ничего не остается, кроме как принять предложение стать секретарем к боссу-дракону, господину Шумао, на Драконий архипелаг, который очень напоминает нашу Японию.\n\nПодойдет и любителям азиатчины, и любителям романтики))) Милейший новогодний вайб с ощущением чуда под елку, который и сейчас читается прекрасно.\nСразу скажу, что меня зацепило название, оно классное. И историю я прочитала взахлеб, она какая-то теплая и при этом забавная, очень согревающая. Без стекла и жести, с хорошим романтическим напряжением. Рекомендую)\n\nЯ читала на Автор.Тудей https://author.today/work/559558, но есть и на Литнет\nhttps://litnet.com/ru/book/v-luchshih-drakonih-tradiciyah-b585444\nНа Литрес https://vk.cc/cXB71e\n\nАннотация: Я мечтала работать на Драконьем Архипелаге ровно до того момента, как узнала про милейшую драконью традицию: боссы обычно спят со своими секретаршами. Так вот почему там такие большие зарплаты! \n\nНо так уж вышло, что я осталась без работы, и единственное предложение я получила от “Полярной совы”, крупнейшей на Драконьем Архипелаге корпорации по промышленной безопасности. Господин Шумао Гардиани желает видеть меня своей секретаршей и предлагает просто великолепные условия. В чем же подвох? Мне тридцать девять, я уже старовата для роли любовницы! \n\nВпрочем, может быть, Гардиани просто пытается загладить свою вину, ведь уволили-то меня из-за него!"}, {"source": "kotova", "title": "«Неисправная Анна»", "book_author": "Тата Алатова", "summary": "Имперский стимпанк в альтернативном Петербурге середины XIX века — механик Анна возвращается из ссылки, чтобы отомстить сыщику Архарову, из-за которого туда попала, но история оборачивается взаимным притяжением и постепенным восстановлением героини. Автор особо отмечает достоверность быта эпохи и нестандартных, ярких персонажей.", "tags": ["стимпанк", "альтернативная история", "детектив", "ромфант", "атмосферное"], "links": ["https://t.me/tata_alatova", "http://author.today/work/494234", "https://litnet.com/ru/book/neispravnaya-anna-b555234"], "date": "2026-05-01", "review": "А что я принесла вам для чтения в майские?\n💔💔💔💔💔💔💔💔\n\nПодкину вам классного чтения на выходные, а то вдруг вы ещё (сомневаюсь, но всё же) не слышали про эту книгу.\n\nВчера вечером я совершила огромную ошибку. Я взялась читать «Неисправную Анну» Таты Алатовой. И в результате легла вчера в 3, а встала в 9 сегодня, и вот только что дочитала 2 том.\n\n📖Я читала на АТ, но есть и на Литнет.\n\nБоже мой, какая же это невероятная прелесть) Я нарочно не начинала, ждала окончания обоих томов, и вот, дождалась, специально закончила все свои дела, чтобы взять и насладиться. Потому что я знаю, что у Таты иначе не будет.\n\nТакой и должна быть жанровая литература – самобытной, яркой, умной, достоверной, атмосферной, переживательной.\n\nТата Алатова – уникальный самобытный автор. У нас таких на писательском пантеоне немного, и они все светятся как звёздочки, и даже среди них Тата особенная. Она пишет ради собственного удовольствия, она не эксплуатирует одну тему, она легко экспериментирует и отрицает жанровые ограничения. Её герои всегда необычны и очень-очень живые как раз этой своей нешаблонностью. Более того, она работает с языковыми формами, и язык в одной ее книге отличается от другой. Нет, знаете, вот этого ощущения «это я у автора уже читала», «этот характер уже видела».\n\nЭто её игровое, лёгкое, нетяжеловесное отношение к писательству очень считывается, и я искренне надеюсь, что пройдёт несколько лет, и Тата будет сверхпродаваема и в бумаге, и в электронке. Да, люди в массе своей любят более простые, более формульные книги, но мы все растём как читатели и рано или поздно нам хочется уже иметь тот самый «свой» книжный ресторанчик, а лучше несколько, где всегда вкусно и всегда удивят. \nПо моим словам выше понятно, что я в восторге.\n\n«Неисправную Анну» я про себя обозвала имперским стимпанком. Дело происходит в альтернативном Петербурге середины 19 века. Там нет магии, но есть расцвет механизмов – автоматонов.\nАнна Аристова – механик. Дочь гениального механика, владельца механических заводов, девушка с блестящим будущим. Была. 8 лет назад она влюбилась… и эта любовь привела её на каторгу.\n\nИ сейчас она, отбыв наказание, возвращается в Петербург с одной целью – отомстить Александру Архарову, сыщику, благодаря которому она и оказалась на каторге.\n\nИстория этих двоих безусловно интересна, потому что есть моё любимое «всё не то, чем кажется».\n\nАнна, вроде бы сломленная, почти потерявшая достоинство и здоровье, со справкой каторжанки, которая закрывает перед ней кучу дверей, с отрекшимся от неё отцом, постепенно, по крошке, по капле восстанавливается. И безумно интересно наблюдать за её переосмыслением своего прошлого, за тем, как из мрачности посткаторжного существования пробиваются лучи интереса, радости, надежды. Как просыпается душа и тело. Как месть, заставляющая ее жить, трансформируется в что-то не менее мощное.\n\nАрхаров же – конечно, изумительный мужик. То, как организует он и своё следовательское «механическое» управление, и всё остальное, как прёт, «как паровоз», не видя препятствий – это всё вызывает восхищение.\n\nОчень-очень интересно прописаны дела, которые раскрывает отделение. Их много, и за детектив, основанный на разных механических штуковинах для организации преступления – отдельное спасибо.\n\nАбсолютно характерные, непохожие один на другого герои, даже второстепенные и третьестепенные.\n\n😍 Но знаете, что? За что я готова Тату качать?\nВосхитительно передана натура того времени и тех людей. И я даже не о манере речи, хотя она безупречна. Сотни, тысячи деталей быта – я читала и как автор ужасалась и восхищалась, потому что это нужно не только иметь энциклопедические знания о той поре, но и видеть в них систему. Абсолютное достоверное погружение. Вот героиня выходит из общежития, а в конце улицы стоят водовозы. Вот на холодном Невском торгуют сбитнем и пирожками. Вот богадельня и монастырь, а вот завод, а вот прозекторская, а вот поезд и станция. И гостиные самых разных людей – от промышленников и простых следователей до великих князей.\n💔💔💔💔💔💔💔💔💔💔💔\n\nНазвания тканей и предметов быта, то, во сколько встают ямщики и как можно заработать бедной девушке, не уходя в проституцию – всё это дано с такой кропотливостью, при этом не перегружая текст, что ты как реально хорошую энциклопедию повседневности зачитываешь. Увлекательную.\n\nИ как классно сшита эта альтернативная реальность с нашей! Герои упоминают Достоевского и Анну Каренину, например.\n\nНу и динамика чувств там, конечно, передана отлично. Сомнения и подозрительность, ненависть и желание, обретение себя и зависимость от другого – всё смешалось и превратилось в самобытную (третий раз пишу слово самобытная, но что же) и запоминающуюся книгу, которую обязательно захочется перечитать.\n\n🥰Спасибо огромное, Тата! Жду следующих шедевров)\n\n#авторчитаетирекомендует@kotovafantasy"}, {"source": "kotova", "title": "«Печать безумных» (тетралогия)", "book_author": "Екатерина Гичко", "summary": "Полноценный эпик со сложной географией и десятками героев — героиня-оборотень Лирка скрывает от героя-оборотня Риша, что когда-то провела с ним ночь, а он этого не помнит. Автор отмечает высокий порог входа, но огромную продуманность семейных связей и глубокие темы прощения, войны и мира.", "tags": ["эпическое фэнтези", "оборотни", "семейная сага", "сложное чтение", "тетралогия"], "links": ["https://t.me/gichkoekaterina", "https://litnet.com/ru/book/pechat-bezumnyh-bezymyannye-b452890", "http://author.today/work/300224", "https://litmarket.ru/books/pechat-bezumnyh-bezymyannye"], "date": "2026-04-15", "review": "Я недавно закончила тетралогию «Печать безумных» Екатерины Гичко, и у меня после неё впервые за долгое время произошло книжное похмелье. Мне не хотелось уходить из мира, мне хотелось еще больше, больше эпилогов, короче, зацепила меня история по полной.\n\nЧитала на Литнет, ещё есть на АТ и Литмаркете. \n\nЕсли первая «салейская» (относящаяся к государству Салея) тетралогия Екатерины – «История о краже» – это детектив, приключения, драма и семейная сага, то вторая, «Печать безумных» – это полноценный, крутой эпик. Это сложное чтение с высоким порогом входа, с десятками, если не сотнями героев, с обширнейшей географией происходящего. Читать сложно – я иногда путалась в духах, но упорно шла вперед, потому что оторваться было невозможно.\n\nЕкатерина показала мастер-класс по открытию старых секретов героев и повышению ставок в «Истории о краже», а в «Печати» она вообще превзошла себя. Я иногда рот не успевала закрыть от одного поворота, как происходил другой.\n\nПри этом обожаю книги Екатерины за эту пронизывающую все и вся семейственность. Я и в своих книгах это пестую, но у неё это, конечно, на высочайшем уровне – удержать в голове все родственные связи, не повторить характеры, выписать взаимодействие, удержать кто где когда на чем и почему находится… это очень высокий уровень продуманности и авторского мастерства, серьезно. Как коллега я могу только аплодировать.\n\nА ещё в «Печати безумных» Екатерина сталкивает 2 мира, точнее, 2 территории. И если поначалу Хоетор, большой жутко-волшебный лес со старыми городами кажется дикарским и недоразвитым, в войне понимаешь, что всё совсем не так. И неизвестно, чья будет победа.\n\nИ самое главное – мораль, как бы ни кривили от неё иногда носы. Я обожаю книги любых жанров, в которых по ходу сюжета автором и героями исследуются природы добра и зла, войны и мира, любви и дружбы, предательства и прощения. В этой истории очень много о прощении. О выходе из круга ненависти. О том, как ошибки в прошлом чудовищно влияют на мир настоящего (а мне это очень близко). Как самопожертвование и храбрость могут этот мир спасти, а доброта – сделать его лучше.\n\nНу и любовь, конечно. Когда-то давно героиня, оборотень-медведица, боевой маг Лирка провела ночь с правителем Салеи, хайнесом. Оборотнем-совой.\n\nТак, отвлекусь, не бейте меня)). Вот! Что ещё хотела сказать! Изумительны выписаны характеристики и особенности разных родов оборотней. Если это лисичка – то лисичка. Если волки, как Вотые, то это прямо настоящие волки. А снежные совы, в том числе мужики – настоящие неврастеничные мамашки, в том, что касается их потомства) \n\nВернусь к нашим героям. Так случилось, что героиня об этом помнит, а герой – нет. И Лирка очень-очень не хочет, чтобы герой вспомнил. Потому что ей есть что скрывать.\n\nЗарождение и развитие чувств здесь очень неспешное и тоже сложное, горячие сцены прям ух)) Хайнес Риш, главный герой, настоящий краш)\n\nЧитайте обязательно – но помните, что эту историю не получится заглотить спешно, а то у вас мозги вскипят. Читайте её неспешно, наслаждаясь, как хорошим плотным сериалом. Не будьте мной, а то я так спешила узнать, что дальше, что теперь обязательно буду перечитывать, а то не все уложила в голове.\n\nСпасибо огромное, Екатерина, и я очень-очень надеюсь, что в салейских историях появится ещё не одна тетралогия))\n\n(И прекрасный дядюшка Шидай наконец-то обретет достойную его женщину, а мы все будем радоваться за него и ревновать)).\n\nА ещё я напоминаю, что к выходу в бумаге готовится первая книга «Истории о краже», и я очень надеюсь, что выйдут все 4 книги. Всё зависит от того, как раскупятся первые. А уж за ней можно и Печать безумных выпустить. А книги про государство нагов из того же мира можно давно уже купить в бумаге, например, вот здесь.\n\n#авторчитаетирекомендует@kotovafantasy"}, {"source": "kotova", "title": "«Sweetie(tm)» (трилогия, первая книга «Новая жизнь Джей»)", "book_author": "Юлия Жукова", "summary": "Магфантастика об очеловеченных гомункулах-Свити с кошачьими чертами, которых общество считает бездушными машинами, хотя они способны чувствовать боль и привязанность. История поднимает острые социальные вопросы о границах сознания и этичности использования разумных существ, при этом оставаясь доброй и уютной.", "tags": ["магфантастика", "социальная фантастика", "философское", "трилогия"], "links": ["https://author.today/work/407348"], "date": "2026-03-18", "review": "#авторчитаетирекомендует\n\nВ любви к Юлии Жуковой я уже признавалась несколько раз, а уж ее «Замуж с осложнениями» - это вообще мой ежегодный весенний антидепрессант (надо перечитать, кстати). Юля – очень нестандартный автор, и книги у нее нестандартные, но при этом захватывающие (и про любовь там есть).\n\nНедавно я дочитала ее трилогию «Sweetie(tm)» - первая книга «Новая жизнь Джей» https://author.today/work/407348 И это оказалось очень свежо, необычно, хорошо, очень остросоциально, и очень философски.\n\nЖанр я бы определила как магфантастика, и это тоже свидетельство Юлиной необычности - мир там не наш, очень технологичный, но технологии эти – магически-био технологии. Так, там есть поезда – гигантские разумные технологичные гусеницы с купе и сидениями внутри, которые мчатся по подземным тоннелям. Представляете себе?) И я бы не представила. А Юля не только представила, но и написала.\n\nИтак, Эдна, блестящий аудитор, в одной из проштрафившихся фирм получает в качестве «взятки» бракованно-списанного Свити. Это человекоподобные магически созданные гомункулы, которые выглядят как очень красивый человек с кошачьими ушками. И в их манере тоже есть что-то кошачье.\n\nВсе воспринимают Свити как андроидов, как машины, в которых заложена определенная программа. Она действительно заложена – помимо всего есть так называемый человеческий контроль, который причиняет боль Свити, если он не выполняет приказ человека, плохо или неправильно выполняет или не способен выполнить.\n\nНо Свити не могут про это сказать. И те, кто ими пользуется, про это не знают. Кроме тех, кто их изготавливает, конечно.\n\nКак вы понимаете, оказывается, что Свити вовсе не неразумные человекоподобные программы. Что у них есть и воля, и опыт, и эмоции, и страх, и боль. Они фактически – рабы корпорации. И их используют для всякого – не только для помыть окна, изготовить чайник или вести секретарскую работу, или охранять. Но и для различной степени тяжести сексуальной работы.\n\nНаш герой, Джей, оказывается у Эдны. Зашитый в него человеческий контроль заставляет его ее слушаться. А хозяйка слегка безалаберна и занята и приказывает Джею занять себя чем-нибудь самому. И вообще настаивает на том, чтобы он был свободен.\n\nМы видим, как обучается Джей, как открывает для себя мир, и как мир открывает его. Мы видим судьбы других Свити – и трилогия приходит в конце концов к решению глобальной проблемы.\n\nОчень трогательные послания Джея в блог. Очень интересный его анализ людей. Юле идеально удается писать про слегка аутистичных персонажей, не от мира сего.\n\nИ социальные вопросы, которые она ставит, предстоит решать уже, думаю, и нашему поколению, которое застанет полноценных человекоподобных андроидов. Благо ли, когда одиноким или семейным помогает андроид-горничная-повариха-няня? Конечно, благо. Но до какой степени эти андроиды будут именно запрограммированными машинами, вещами, а не субъектами сознания и права? Насколько морально использовать андроидов для сексуальных извращений или охоты (когда охотятся на них, а они изображают людей?). Будут ли они критично относиться к заданиям от хозяев? Будет ли у них какое-то самосознание, которое делает управление ими аморальным? Не являемся ли мы, люди, такими же биогомункулами, как Свити Жуковой, которых создали для развлечения и облегчения быта, а потом бросили?\n\nМного вопросов поднимается. Трилогия реально классная, очень добрая, несмотря на социальное положение Свити, и очень уютная.\n\nЯ бы не отказалась от такого Свити в доме) Не как рабовладелец, а как наниматель, конечно.\n\nОгромное спасибо, Юля! И всем – читайте обязательно!"}, {"source": "kotova", "title": "«Лили» (цикл повестей)", "book_author": "Анна Орлова", "summary": "Литературно-детективный цикл про Лили, дерзкую женщину-помощницу частного детектива в магической Америке начала XX века, которая курит, стреляет и не вписывается в консервативное общество. Медленно развивающаяся любовная линия с влюблённым в неё кузеном-адвокатом дополняет детективные расследования от повести к повести.", "tags": ["детектив", "магический реализм", "ретро-сеттинг", "цикл повестей"], "links": ["http://author.today/work/412760"], "date": "2026-03-13", "review": "Недавно залипла на литературно-детективный сериал Анны Орловой – “Лили”\n\nМагия, сеттинг Америки начала 20 века и Лили – женщина-помощник частного детектива.\nЛили курит, носит мужские костюмы, пьёт коньяк и умеет стрелять. А общество вокруг консервативно и такое поведение не одобряет. Не одобряет её и её семья.\n\nЛили давно и безнадежно влюблена в своего кузена, адвоката Дариана, который бросил её перед свадьбой. Он её тоже не одобряет, но своеобразно о ней заботится.\nИ раз за разом она оказывается в гуще событий.\n\nОт повести к повести (всего их на данный момент 6, 7 Анна только начала выкладывать) повествование накаляется. Последняя, шестая повесть на данный момент вообще моя любимая, очень классная. Все сюжетно закончены, но внутри есть сквозной сюжет.\n\nА ещё мне очень нравится медленное развитие чувств в этой истории. Оно такое аккуратное и при этом захватывающее, очень классно сделано. И я прям ругалась, когда шестая повесть закончилась на драматичном месте. Хорошо, что Анна уже выкладывает следующую)\nИ надеюсь ещё на несколько повестей.\n\nРекомендую, читайте с удовольствием)\n\n📒 Аннотация:\nЧастный детектив – профессия исключительно мужская? Вот еще! Мисс Лили Корбетт, первая в городе леди-детектив, готова это опровергнуть. Благо, в веселом и шумном Фриско за интересными загадками дело не станет. А в расследовании Лили помогут не только напарник, острый ум и револьвер системы «Смит-и-Вессон», но и кое-какие магические таланты. Итак, сыщица, странные убийства, симпатичный инспектор… Поехали!\n\n#авторчитаетирекомендует@kotovafantasy"}, {"source": "kotova", "title": "«Медведь и вороненок»", "book_author": "Наталья Русинова", "summary": "Славянско-имперское фэнтези про аристократку-целительницу, потерявшую семью и жениха, которая сопровождает сестру на смотрины невест в закрытое княжество медведей-оборотней. Автор отмечает обстоятельный быт, историчность и увлекательные этнографические справки по славянскому фольклору в конце каждой главы.", "tags": ["славянское фэнтези", "оборотни", "ромфант", "незавершённый цикл"], "links": ["https://t.me/kikimorapochetnaya", "https://litnet.com/ru/book/medved-i-voronenok-lekarka-dlya-oborotnya-b562534"], "date": "2026-02-18", "review": "#авторчитаетирекомендует\nНашла для себя нового добротного автора и спешу поделиться.\n\"Медведь и вороненок\" от Натальи Русиновой- первая книга написана, вторая в процессе, сколько будет, не знаю. Читаю на Литнете, только там, похоже, и есть https://litnet.com/ru/book/medved-i-voronenok-lekarka-dlya-oborotnya-b562534\n\nИтак, героиня, аристократка - целительница, у которой погибла вся семья, кроме двоюродной сестры и дяди, живет в крайне стесненных условиях с этим самым дядей и сестрой. Работает она в госпитале для простого народа, жених ее погиб во время черного мора, который она остановила ,выгорев почти дотла. И потому на какой-то больший заработок рассчитывать не может. Как и на удачное замужество, так как уже не невинна, это раз, и приданного у нее нет, это два. Живут они в столице условной Российской империи, Николасбурге, но недалеко существует закрытое княжество медведей-оборотней, Росславль (вь?), куда оные медведи периодически забирают невест. И выбор падает на сестру героини, а она едет за сестрой как присматривающая тетушка.\n\nГероиня - отличная, без дури в голове, очень взвешенная.\nГерой - честно говорю - малахольный))) В плане брутальный, но дурной. Не идеальный, правда, солдафонище такое. Не чудак на букву М, но иногда по характеру своему как ляпнет что, так и лаптем по голове хочется дать. Но красив и еще и брат князя. И под влиянием героини он постепенно становится обтесанней)\nНо чем мне понравилась история - очень много там быта, историчности, размышлений о том, что везде свои достоинства и недостатки, ну и глобальная интрига закручена, хотя и кажется мне, что я угадала, кто этот чернокнижник, которого они там по лесам ловят на фоне отбора невест для князя и берендеев (чуть не написала берманов) менее знатных)\n\nОчень рекомендую, затянуло. Жалею, что нет пока целиком, но первая книга тоже хорошо читается, можно ждать вторую) История сквозная, обстоятельная.\nЭтой обстоятельностью и живостью произведения автор меня и покорила. А еще очень круто читаются в конце каждой главы этнографические и исторические справки по славянскому и позднерусскому фольклору, верованиям и тп.\n\nКак вы уже поняли, это славянское фэнтези. Я бы даже сказала, эклектика - имперско-славянское фэнтези. И вышло отлично. Я очень рассчитываю, что автор не скомкает конец, все будет выведено и закончится логично и круто. А пока рекомендую и жду конца."}, {"source": "kotova", "title": "«Злодейка чужого мира» (дилогия)", "book_author": "Екатерина Белова", "summary": "Нестандартный «тяжёлый люкс» ромфант про героиню Амину, очнувшуюся в чужом теле Мастера без памяти, среди спутников, желающих её убить, в мире с необычной системой магии и классов. Обе книги дилогии бесплатны, а мир — часть научно-божественной диктатуры с постоянными интригами и переворотами.", "tags": ["ромфант", "психологический триллер", "дарк", "бесплатная дилогия"], "links": ["https://litnet.com/ru/book/zlodeika-chuzhogo-mira-b366874"], "date": "2026-01-31", "review": "Я к вам опять с Екатериной Беловой, но на этот раз с её дилогией «Злодейка чужого мира».\n\n📖 Обе книги дилогии бесплатны.\n\nОх какой же вкуснейший восхитительный ромфант-неформат. За мир, систему магии, систему классов, вообще за общество научно-божественной ботанически-анималистической диктатуры, за вот эти внутренние интриги, постоянные перевороты отношений к героям, открывающиеся обстоятельства, которые ставят всё с ног на голову я готова аплодировать стоя.\nКак я понимаю, это первая история Екатерины, и поэтому она настолько неформатная и в то же время настолько запоминающаяся и ни на что не похожая. Я вообще замечаю, что первые книги авторов с тех времён, когда мы ещё непуганы обвинениями во всём на свете, либо очень наивны, либо вот так вот восхитительно непохожи ни на что.\n\nПросто читайте, здесь есть небольшой порог входа, но непонятное становится понятным, а вся история – это как большой психологически-фэнтезийный триллер, за которым ты следишь, открыв рот. Очень, очень круто.\n\nГероиня, Амина, просыпается в каком-то диком месте, спелёнутая какой-то травой, ничего не понимая. Рядом с ней – трое: молчаливый Слуга и двое подчинённых – номер Два и номер Шесть.\nЭто кажется какой-то антиутопией, но всё куда интереснее, ярче, стекольнее и необычнее.\nОказывается, что она попала в тело Ясмины, Мастера, который должен провести свою группу по местности, полной последствий биологических экспериментов. И всё бы ничего, если бы Амина-Ясмина помнила всё. А она помнит только какие-то картинки, и то, что она жестокая и беспринципная.\nИ все трое её спутников хотят её убить.\n\nКонечно, у меня остались вопросы – многое об истории мира пришлось понимать из контекста, например, история богов и как вообще сложился такой удивительный мир. Но это не портит историю, наоборот, заставляет и дальше о ней думать.\n\nКороче, прям рекомендую, не пожалеете, если любите “тяжёлый люкс” в ромфанте)\n\nАвтору мои благодарности! Уже второй раз)\n\n#авторчитаетирекомендует@kotovafantasy"}, {"source": "kotova", "title": "«Увидеть лицо»", "book_author": "Мария Барышева", "summary": "Психологический триллер с элементами фантастики и любовной линии, состоящий из 4 частей — по словам автора рекомендации, первая глава кажется скучноватой, но история захватывает и заставляет мозг активно работать. Издана только на Самиздате, но, по мнению рекомендующей, заслуживает полноценного издания.", "tags": ["психологический триллер", "фантастика", "недооценённая книга", "только на Самиздате"], "links": ["https://samlib.ru/comment/k/kotowa_i_w/recommend?PAGE=1", "https://samlib.ru/b/baryshewa_m_a/son1.shtml"], "date": "2026-01-22", "review": "#авторчитаетирекомендует\nДрузья, я тут поняла, что ни разу вам не кидала ветку моих личных рекомендаций на Самиздате, а ведь там куча классных книг, которых можно найти по названию и автору. Я сейчас ветку пролистала, и прям половину захотелось перечитать не откладывая. https://samlib.ru/comment/k/kotowa_i_w/recommend?PAGE=1 Вот эта ветка. Только не уроните Самиздат внезапным наплывом)) И расскажите, какие книги тоже читали и можете рекомендовать.\n\nИ благодаря этому вспомнила еще об одной книге, которую я бы очень хотела видеть в \"Королевской библиотеке\" (несмотря на то, что она закрыта). Это даже не фентези, я бы сказала, что это фантастика, любовь, психологический триллер, игры сознания и вотэтоповороты. Я была в приятном шоке, когда ее прочитала, и считаю, что издательства просто пропустили даже не жемчужину - бриллиант.\nТам нужно перетерпеть первую главу, она кажется странной и скучноватой, но потом, поверьте, вы ее перечитаете с совсем другими ощущениями.\n\n\"Увидеть лицо\" Мария Барышева. Есть только на Самиздате Даже не знаю, как обозначить, чтобы не отпугнуть. Это не слащавая история, но оторваться невозможно. Всего 4 части, но читается влет. Это не цикл, больше все же одна книга в четырех частях.\nНе бойтесь слова \"триллер\")\nКнига для тех, кто обожает, чтобы мозги работали, когда читаешь. Хотя, наверное, отдохнуть с ней тоже можно) Очень рекомендую. Сама вспомнила, и как разгребусь со всеми обязательствами, что на себя взяла, дочитаю Анну Каренину, и возьмусь освежить в памяти ее.\nhttps://samlib.ru/b/baryshewa_m_a/son1.shtml\n\nВозможно, кто-то из издательств, кто ищет классные миксы триллера, замешанного на фантастике, обратит внимание и найдет автора, чем теория шести рукопожатий не шутит, а?\n\nА еще поняла, что если б Мошков подключил монетизацию, на СИ я бы тоже снова пошла, столько там воспоминаний, с ума сойти."}, {"source": "kotova", "title": "Подборка: 5 незаслуженно забытых старых циклов", "book_author": "", "summary": "Подборка классики фэнтези и фантастики, незаслуженно забытой сейчас: «Ромашки для королевы» и «Мир в подарок» Оксаны Демченко — уникальные системы магии (особенно в «Плате за мир») и пронизывающий все книги «код добра» несмотря на тяжёлые моменты; «Имя богини» («Каэтанна») Виктории Угрюмовой — начинается со странных снов современницы, а заканчивается войной, потерями и обновлением мира; «Трое из Леса» Юрия Никитина — юмор, жесть и приключения (автор признаётся в лёгком оммаже циклу в собственных книгах); «Рубин Карашэхра» Елены Бычковой и Натальи Турчаниновой — ангелы и демоны, любовь сквозь века, интриги и битвы; «Синяя птица» Елены Самойловой — славянские мотивы, путешествие и любовь через противостояние.", "tags": ["подборка", "классика фэнтези", "ретроспектива"], "links": ["https://www.litres.ru/book/oksana-demchenko/romashki-dlya-korolevy-293662", "https://www.litres.ru/book/oksana-demchenko/mir-v-podarok-185202", "https://www.litres.ru/book/uriy-nikitin/troe-iz-lesa-119670", "https://www.litres.ru/book/elena-bychkova/rubin-karashehra-sbornik-25275327", "https://www.litres.ru/book/elena-samoylova/sinyaya-ptica-126416"], "date": "2026-01-17", "review": "5 роскошных старых циклов, про которые почти все забыли.\nА они великолепны!\n\nЯ напишу свои, а вы напишите свои. Но именно которые забыты! Те, которые на слуху, и так все знают. Поэтому тут нет Волкодава, Панкеевой, Сыромятниковой и так далее.\n\nМне всегда обидно, когда большая, великолепная история уходит в забытье просто потому, что автору некогда или не хочется заниматься продвижением. Или автор перестал писать, у него другое дело жизни, и цикл забывают, хотя он актуален и сейчас.\n\n💔Сразу два цикла одного автора. Оксана Демченко. «Ромашки для королевы» и «Мир в подарок». Великолепные, яркие, необычные истории. Уникальные системы магии (особенно в «Плате за мир»), “код добра”, который пронизывает все книги, хотя достаточно в них и стекла, и тяжёлых моментов, но всё равно душа напитывается добром и уютом. Если вдруг кто-то не читал, начните с «Ромашек». Не все книги Оксаны мне заходят, но эти – просто классные, и у меня есть масса недоумения, почему ни ЭКСМО, ни АСТ не переиздает их сейчас, Альфа рухнула уже давно и права уж точно давно кончились. Найти в бумаге можно на Авито, думаю, и возможно есть остатки на маркетплейсах.\n\n💔«Имя богини» Виктория Угрюмова. Она же «Каэтанна». Начинается со странных снов нашей современницы, а заканчивается войной, любовью, потерями и радостями, обновлениями мира, миром с привкусом слез и счастья, глобальными проблемами и решениями. Очень-очень рекомендую, прекрасная серия. Виктория из Украины, поэтому на Литрес её, к сожалению, нет, а бумажные книги ищутся только на авито и в букинистике. Но это, имхо, явление и в ромфанте, и в фэнтези – в том числе потому, что ты не выделишь чистый жанр. И оно очень настоящее. Авторы в то время ещё не были вынуждены быть бережнее к читателю)))\n\n💔«Трое из Леса» Юрий Никитин. Я бы не сказала, что он забыт, скорее, подзабыт, но все первые книги, включая Передышку в Барбусе (прочитано сто раз)), я читала с огромным удовольствием. Столько там и юмора, и жести, и приключений. А рыжий Олег удивительно смахивает на ещё одного рыжего мизантропа)) (Это не значит, что я его слизала, это значит, что я ещё в нулевых годах любила этот типаж). Хотя мой герой, конечно, Мрак. А ещё у меня в КК есть переложение (не копирование, измененное и дополненное)) одной из легенд, которая есть в «Троих», и кто читал обе книги, её увидят. Уж извините, не смогла удержаться, мне приятно видеть в своих книгах этакий точечный оммаж авторам, которых я любила.\n\n💔Елена Бычкова, Наталья Турчанинова. Рубин Карашэхра. Трилогия. Авторы известны больше по соавторству с Алексеем Пеховым, и поэтому книги без Алексея подзабыты. А «Рубин» тем временем каждый раз при перечитывании производит на меня ошеломляющее впечатление. Ангелы и демоны, любовь сквозь времена, интриги и битвы – короче, дух захватывает, реально.\n\n💔Елена Самойлова «Синяя птица». Трилогия. Ох, тут есть место всему – и отдалённым славянским мотивам, и путешествию, и любви пусть не от ненависти, но от противостояния, и образам, которые запоминаются через года, и сложным решениям, и юмору, и грусти, и счастью. Очень рекомендую.\n\nЖду от вас старых забытых/подзабытых циклов или книг, которые вы с удовольствием перечитываете и рекомендовали бы сейчас.\n\nПожалуйста, ещё раз прошу, не надо писать тех, кто и так на слуху.\n\nДадим новую жизнь тем, кто незаслуженно забыт.\n\n#авторчитаетирекомендует@kotovafantasy"}, {"source": "kotova", "title": "Подборка: Топ-5 (6-8) книг 2025 года по версии Ирины Котовой", "book_author": "", "summary": "Годовой топ автора канала с краткими комментариями по каждой книге: «Где распускается Алоцвет» Софьи Ролдугиной — фолк, жуть, драйв, юмор, «огненный мужик и крутой сыщик»; «Громов» Карины Дёминой — бывший браток из 90-х умирает от рака и оказывается в теле мальчика из приюта в альтернативной России начала XX века; «И жили они долго и счастливо» Алёны Селютиной — эклектика современности и славянских мотивов, путь героев от ненависти к любви; «Красные луны Квертинда» Нины Малкиной — эпическое дарковое фэнтези о взрослении дикарки Юны Горст; «Призраки Марта» Татьяны Солодковой — «дарк пронзительный, яркий, драматичный», о чести, долге и справедливости; «Менеджер Нагибко, вы робот?» Юлии Жуковой и Елизаветы Шумской — офисный процедурал в теле робота на далёкой планете; вне основного топа — «Тётушка против» Таты Алатовой (тётушка-старая дева расстраивает свадьбу племянницы) и «Семь снежинок на ладони» Светланы Нарватовой («прекрасная юморная и зимняя история»).", "tags": ["подборка", "итоги года", "топ книг"], "links": ["https://t.me/foxes_of_randall", "https://t.me/i_jili_oni", "https://t.me/kvertind", "https://t.me/solodkova_tatyana_author", "https://t.me/yulia_zhukova_worlds", "https://t.me/elizashumskaya", "https://t.me/tata_alatova"], "date": "2026-01-03", "review": "Ну что, дорогие читатели? Пришло время мне с вами, а вам со мной делиться Топом-5 книг за 2025 год!\n\n📚Пишите в комментариях ваши Топ-5, обязательно название книги и автора, будем читать)))\n\nМой топ-5 (который, как обычно, превратился в топ-6+)):\n\n1️⃣«Где распускается Алоцвет» Софьи Ролдугиной Фолк, жуть, драйв, юмор, огненный мужик и крутой сыщик. Прочитала взахлёб, и как всегда у Софьи – оригинально и необычно. Мой отзыв на Алоцвет тут. Книга Софьи в моём личном топе года – это уже добрая традиция))\n\n2️⃣Как и книга Карины Дёминой. Её «Громов». Обалденная история про то, как ныне почти приличный бизнесмен, а в 90х – браток со всеми сопутствующими, умирает от рака в своей палате. И, ещё не умерев, оказывается в сознании пацана из приюта, в альтернативной России начала 20 века. С магией, кланами, волнениями низов, революционерами и заговорами. Абсолютно влюбилась в эту историю за невероятную проработку материала, за историчность, за детали. Ну и за сюжет, конечно. Серия ещё не закончена, но я готова ждать, сколько нужно, это великолепный труд. Моё как всегда почтение Карине. Мой отзыв тут.\n\n3️⃣«И жили они долго и счастливо» Алёны Селютиной. У Алёны появилась наконец-то группа вк Селютина Алёна и все-все-все, там мало народу, считаю, это нужно исправлять и поклонникам присоединяться) Ну, про эту дилогию не слышал, наверное, только ленивый, и не читал тоже. Считаю её явлением, превосходной эклектикой современности, сказочных славянских мотивов, глубокой психологии и пути героев от ненависти до любви. Мой отзыв здесь и моё уважение Алёне Селютиной.\n\n4️⃣«Красные луны Квертинда» Нины Малкиной. Плотное, полновесное, эпическое, романтическое и дарковое фэнтези, в котором мы наблюдаем за героями с серой моралью, за взрослением дикарки Юны Горст, на которую сваливается неожиданная правда о прошлом, и о любви, которая меняет всё. Эта серия – уже явление в современном русскоязычном фэнтези, и я, как и все читатели, с нетерпением жду, когда она будет дописана. Нина – моя подруга, но я не включаю в топы своих подруг из любви к ним. Только из восхищения их книгами) Мой отзыв здесь.\n\n5️⃣«Призраки Марта» Татьяны Солодковой. Ох как это было хорошо! Это дарк, но дарк пронзительный, яркий, драматичный, и с правильными установками. Это и честь, и долг, и верность, и стремление выжить, и стремление к справедливости. Прекрасный главный герой, которого я полюбила. Мой отзыв здесь. \n\n6️⃣Ну и «Менеджер Нагибко, вы робот?» от Юлии Жуковой и Елизаветы Шумской. Всё, что я обожаю – безумная эклектика, в которую нельзя не влюбиться. Это космофантастика, будущее, в которую встроен обалденный, ироничный, смешной офисный процедурал, встроен интересно, и в нем все работники офисов узнают бардак, который творится почти в каждом офисе))\nГероиня, Ася, в наше время очень хочет похудеть. И идет в клинику на экспериментальный метод. А очухивается на складе в далеком будущем на другой планете… в теле робота. Как же ей дальше жить, спросите вы? Вот и Ася задалась этим вопросом. А для начала решила наладить работу склада… Мой отзыв здесь.\n\nИ на сладкое (я обещала 6? я вас обманула))) не могу не вспомнить моих любимых:\n\n7️⃣Тата Алатова «Тётушка против» – идеальное захватывающее чтение про практичную, педантичную, суховатую тётушку-старую деву, которая решила расстроить свадьбу своей племянницы с повесой-графом. Что из этого вышло – читайте, не оторваться. Мой отзыв тут.\n\n8️⃣«Семь снежинок на ладони» Светланы Нарватовой. Прекрасная юморная и зимняя история, которую нужно и обязательно читать сейчас. Мой отзыв.\n\nНа самом деле, мне очень сложно было выбрать, потому что было много хороших книг. И мои отзывы на них вы можете прочитать по тегу #авторчитаетирекомендует@kotovafantasy\n\nА это мой прошлогодний топ.\n\nЖду ваших топов, друзья!"}, {"source": "kotova", "title": "«Ведьмин чай» и «Ведьма для героя»", "book_author": "Юлия Ляпина", "summary": "Две уютные и добрые истории про ведьм — в первой ведьма-выпускница Агата помогает старому другу-аристократу и меняет свою жизнь, во второй молодую ведьму, изгнанную односельчанами, приглашают штатной целительницей в отряд королевской гвардии. Автор отмечает сочетание приключений с размеренной бытовушкой и медленной романтикой.", "tags": ["ромфант", "лёгкое чтение", "ведьмы", "две книги одного автора"], "links": ["https://litnet.com/ru/book/vedmin-chai-b421770", "https://litnet.com/ru/book/vedma-dlya-geroya-b404957"], "date": "2026-01-02", "review": "Ну что, просыпаемся?? Я поделюсь тем, с чего я начала Новый год, а вы под моим следующим постом поделитесь, пожалуйста, тем, что вы прочитали или читаете, нравится вам или нет.\n\nПрочитала на Новый год 2 милые и приятные истории Юлии Ляпиной «Ведьмин чай» и «Ведьма для героя».\n\nЭто смесь приключений с бытовушкой и неспешно развивающейся любовной линией.\n\nВ первой (Ведьмин чай) – старые друзья, люблю этот троп, но, внимание, есть пара дарковых моментов, мне было неожиданно их встретить в истории бытовушно-доброй, поэтому должна предупредить.\nМне очень понравилось, я с ней отдохнула, несмотря на некоторые вопросы.\n \n📖 Итак, усердная ведьма-выпускница Агата Верба обустроила свою ведьмину лавку. И живёт себе-поживает в гармонии и радости, только иногда подлечивает или помогает другу по магической академии, аристократу Криспину.\nОднажды он снова просит о помощи – и это меняет всю её жизнь.\n\nИ вторая книга (Ведьма для героя) – тоже приятная, размеренная и добрая.\n\n📖 Дом юной ведьмы по навету сжигают сельчане, она вынуждена бежать, и в соседнем городе натыкается на отряд королевской гвардии, командиру которой нужна лечебная помощь. И этот отряд предлагает героине стать их штатной ведьмой. Прямо хорошо, интересно, читается быстро.\n\nРекомендую для отдыха и приятно проведенного времени!\n\nЧитала я на Литнет, но есть и на:\n📚 ЛР 🤩 ПМ 🤩 АТ1 🤩 АТ2\n\n#авторчитаетирекомендует@kotovafantasy"}, {"source": "kotova", "title": "«Отбор. Помощница кронпринца» (дилогия)", "book_author": "Дарья Верескова", "summary": "Ромфант про оборотней-кошачьих, где героиню Мио несправедливо ославили после провального сватовства, и она строит новую жизнь подпольным магом-ритуалистом, пока во дворце готовится отбор невест для кронпринца. Автор хвалит сложные интриги, волевую героиню и умение автора держать читателя в напряжении до самого конца.", "tags": ["ромфант", "оборотни", "интриги", "дилогия"], "links": ["https://litnet.com/ru/book/otbor-pomoshchnica-kronprinca-b524153", "https://litgorod.ru/books/view/57340"], "date": "2025-12-27", "review": "А почему это Котова зачастила с рекомендательными постами, спросите вы?\nА потому, что вконтакте под вчерашней рекомендацией мне горячо посоветовали дилогию Дарьи Вересковой «Отбор. Помощница кронпринца». И я решила в неё заглянуть одним глазком.\n\nЭто было ошибкой, потому что вчера легла в 3 и сегодня дочитывала уже во время утренней прогулки. Хорошо, что дочитала и могу со спокойной душой идти писать свою книгу)\n\nИтак, у нас есть мир, в котором живут оборотни – кошачьи (есть и псовые, но про них мало). Есть страна, в которой аристократы и правящее семейство – оборотни. У мужчин-оборотней есть Время Зова – время, когда они особенно чутко настроены найти свою избранницу и, мягко говоря, размножиться с ней. Много-много раз)\nНо если вы подумали, что это какая-то эротика, то вот вообще нет. Горячих сцен там 2-3 на всю дилогию (но очень достойных, к слову сказать).\n\nЭто лишь присказка. А сам сюжет начинается с того, что леди Миолина Валаре поддаётся страстному давлению своего жениха и уступает ему до свадьбы. Их застаёт матушка жениха и… вместо того, чтобы прикрыть “позор” и жениться, Мио ославляют по всему королевству.\nКак обесчещенная, от которой отвернулись друзья и поклонники, она строит свою жизнь, работая подпольным ритуалистом (магом). Но в связи с тем, что у кронпринца начинается Время Зова и это идеальный момент для поиска будущей королевы, во дворец набирают дополнительный штат на время отбора невест.\nМио опозорена, её зверь не пробуждён, и она не может в отборе участвовать. Но она может строить свою судьбу и этого не упустит.\n\nСложносплетенная история с интригами (вы помните, что я их люблю?)), подставами, большой-большой любовью и страстью, оригинальным сеттингом. Очень впечатляющая волевая героиня, хотя поначалу вела себя как любая наивная доверчивая влюбленная девушка. Множество персонажей – привлекательных и раздражающих, но запоминающихся безусловно. Очень классная история, и количество библиотек это только подтверждает. Ну и плюс автору до конца удаётся держать нас в напряжении – будут ли всё-таки герои вместе или нет, а если будут, то как, Ватсон?\n\nЧитайте, безусловно рекомендую. Есть подозрение, что автор планировала ещё книги по миру, потому что, например, линия с братом героя будто подвисла, но пока их нет, если появятся, буду читать. Если читали другие книги у Дарьи Вересковой, пишите, какие понравились больше, обязательно загляну.\n\n📖 Я читала на Литнет, но есть и на Литгороде.\n\nГруппу автора вконтакте, к сожалению, не нашла. (Дорогие авторы, если у вас есть группы, обязательно вписывайте их в блок “обо мне” на своих страницах на электронных порталах))\n\n#авторчитаетирекомендует@kotovafantasy"}, {"source": "kotova", "title": "«Поместье для брошенной жены» / «Хозяйка драконьего замка» / «Развод по-драконьи»", "book_author": "Екатерина Белова", "summary": "Серия книг про жестокий иерархичный драконий мир с сильными разумными героинями и виртуозно закрученными многоуровневыми интригами. Автор отмечает, что несмотря на жёсткость мира, подробности не тошнотворны, а ставки растут от «пережить развод» до «отменить конец света».", "tags": ["ромфант", "драконы", "интриги", "дарк-элементы"], "links": ["https://litnet.com/ru/belova-ekaterina-u8284480", "https://litgorod.ru/profile/216712/books", "https://www.chitai-gorod.ru/r/qGump", "https://book24.ru/r/ocDXA"], "date": "2025-12-26", "review": "Попалась мне целая серия книг Екатерины Беловой про жестокий и очень иеархичный драконий мир.\n\nИ, честно говоря, я бы прошла мимо названий «Поместье для брошенной жены» и «Развод по-драконьи», (потому что разводы и брошенные жёны уже намозолили глаза, и среди тонн абсолютно однотипных историй вообще не ожидаешь встретить сокровище) если бы её книги горячо не порекомендовали в одной из групп фразой “там такое, такое!”\n\nКороче, очень рекомендую.\n\nНачинайте с «Поместья для брошенной жены» или с «Хозяйки драконьего замка».\n\nЧто мне однозначно понравилось так, что читала взахлёб?\n\n💔Очень сильные, взрослые, разумные героини – и при этом не одинаковые.\n\n💔Интриги! Интриги! Интриги! Вот тут мои аплодисменты, потому что так вывернуть цепь интриг, так сложить всю последовательность – что, кто и зачем делал, так удивлять надо уметь. Это высокое мастерство рассказчика. Я честно говорю, еле сейчас заставляю себя отложить книгу Екатерины и сесть наконец-то за свою. Обожаю многоуровневые интриги. Обожаю авторов, которые умеют их филигранно закрутить. Ну, вы поняли))\n\n💔Мир действительно жесток, крайне иерархичен, в нём есть право силы и право сильной магии, и автор придерживается этого без уловок. Но без тошнотворных подробностей, так что такие неженки, как я, могут читать спокойно.\n\n💔Повышение ставок. Сначала героине надо всего лишь пережить развод, а в конце – отменить (условно) конец света. Это не даёт скучать.\n\nИ напряжение, которое поддерживается и растёт, прям прекрасное.\nНа фоне всего этого есть, конечно, душераздирающе-страстные любовные линии, и они классные, но мне так понравились интриги, что любовь даже как-то на второе место отступила.\n\nКороче, обязательно читайте. Я прямо хорошо прокатилась на эмоциональных горках, зарядилась, счастливая и довольная, и пережила эту неделю.\n\nСпасибо Екатерине за книги!\n\nЧитала я книги на Литнет, но они есть и на Литгороде, также вижу, что есть одна книга – «Развод по-драконьи» – в бумаге в ЧГ и B24. Я её читала давно, оказывается, стеклищще аж ух.\n\nИ в аудио на литрес тоже есть.\n\n#авторчитаетирекомендует@kotovafantasy"}, {"source": "kotova", "title": "«Тэсса на краю земли» (переиздание)", "book_author": "Тата Алатова", "summary": "Анонс нового необычного оформления переиздания книги — автор канала является постоянной поклонницей Таты Алатовой и её рекомендации размещены на обороте книги. Считает автора и её стиль одной из жемчужин современного ромфанта и фэнтези.", "tags": ["ромфант", "фэнтези", "переиздание", "анонс"], "links": ["https://t.me/kotovafantasy/3349", "https://www.chitai-gorod.ru/r/dWVMV", "https://book24.ru/r/SbuXn", "https://www.ozon.ru/product/zemlya-tessy-alatova-tata-3169279273"], "date": "2025-12-15", "review": "Друзья, все знают (а кто не знает, узнает сейчас)), как я люблю Тату Алатову. И вот у неё выходит «Тэсса на краю земли» в новом оформлении! Очень необычном, непривычном, привлекающем внимание и имхо очень отражающем необычность самой книги.\n\nДве книги под сокращёнными названиями «Земля Тэссы» и «Шторм Холли» уже вышли, ждём третью про Фрэнка! А на обратной стороне книг – мои рекомендации.\n\nСобственно, кто не читал Тату – читайте, я её поклонница (админ активно присоединяется к рекомендациям)! У меня есть много рецензий на её книги, вот тут я писала про Тэссу. Считаю её и её стиль одной из жемчужин современного ромфанта/фэнтези.\n\nКупить бумажные книги можно здесь:\n\n    📚ЧГ 📚B24 🛍ОЗОН 🛍WB\n\n          А электронку – здесь:\n\n                  🤩 АТ 📚 ЛР\n\n#авторчитаетирекомендует@kotovafantasy"}, {"source": "kotova", "title": "«Слепая курица, или Отыскать принца»", "book_author": "Каблукова Екатерина", "summary": "Третья книга серии «Леди-беглянки» (читается независимо) в стиле викторианского/эдвардианского романа — плохо видящая аристократка-сирота Одри вынуждена бежать от нежеланного жениха-викария и встречает того, кто предлагает ей стать хозяйкой таинственного особняка. Автор хвалит точное попадание в стиль и знание эпохи.", "tags": ["исторический роман", "ромфант", "викторианская эпоха", "лёгкое чтение"], "links": ["https://www.litres.ru/book/ekaterina-kablukova/slepaya-kurica-ili-otyskat-princa-72638533"], "date": "2025-11-09", "review": "#авторчитаетирекомендует\n\nКому нужно милое чтение на вечер? Рекомендую \"Слепая курица, или Отыскать принца\" от Каблуковой Екатерины.\n\nКаблукову нужно читать всем, кто любит а) викторианские и эдвардианские романы, б) лошадей. Честно, думаю, что если бы она решилась писать что-то эдвардианское под псевдонимом Catherine Cable, через пару лет знатоки бы уверяли, что родилась она в 18каком-то там году. По стилю и знанию эпохи очень-очень совпадает с теми, кто действительно творил в то время. Разве что сцены ухаживания и близости посмелее)\n\nЭто третья книга из серии \"Леди-беглянки\", и я, прочитав ее, захотела прочитать и первые две, хотя их можно читать абсолютно независимо.\nОдри, сирота-аристократка, воспитывается у своей тетки. Родители девушки погибли после восстания против Узурпатора, и Одри выполняет роль и экономки, и няньки, и при этом ее называют приживалкой. Она плохо видит, но тетя запрещает ей носить очки - считает, что это ее уродует, и оттого у Одри совсем нет друзей.\nИ вот, как во многих подобных ситуациях, тетя решает сбыть племянницу с рук, и женихом ее желает стать местный викарий. Отвратительный тип, который под показной благочестивостью скрывает порочное сердце.\nОдри не остается ничего другого, кроме как бежать. И на этом пути она встречает того, кто предлагает ей помощь. Предлагает ей стать хозяйкой живого особняка, хранящего свои тайны. Но и у Одри есть тайна - и если окружающие о ней узнают, ей не поздоровится.\n\nИдеально почитать вечерком, под чаек, отдохнуть, перезагрузиться. Насколько я знаю, книга есть только на Литрес, я лично ее покупала там. Ссылка вот"}, {"source": "kotova", "title": "«Имперец» (шеститомник)", "book_author": "Михаил Романов и Владимир Кощеев", "summary": "Бояръ-аниме про русского спецназовца, переродившегося в альтернативной Российской империи с магией и десятью стихиями — герой Александр Мирный поступает в Императорский университет и оказывается втянут в одно приключение за другим. Автор отмечает масштабные батальные сцены и имперскую тематику, хотя герою, по её мнению, не хватает уязвимости в начале истории.", "tags": ["бояръ-аниме", "альтернативная история", "боевое фэнтези", "магия"], "links": ["https://author.today/work/294620", "https://www.chitai-gorod.ru/r/NnCls", "https://book24.ru/r/FuovJ"], "date": "2025-11-05", "review": "#авторчитаетирекомендует \n\nКазалось бы, я с приходом на АТ куда чаще стала читать мужчин-авторов, и все равно отношусь к ним с неким предубеждением. Да-да, это как мужчины-читатели с недоверием относятся к книгам, написанным женщинами. Этакий книжный шовинизм наоборот. \nТем приятнее мне, когда я нахожу классные истории. Такой стал шеститомник «Имперец» https://author.today/work/294620 Михаила Романова и Владимира Кощеева . Не без оговорок (о них ниже), но мастерство авторов ухватило меня и протащило по тексту, и я с огромным удовольствием прочитала весь цикл. \n\nИтак, Александр Мирный, 18-летний простолюдин, сирота, чьи родители погибли на службе Государю, прибывает на учебу в Императорский Московский Университет. Александр не так прост – восемнадцать лет назад он, русский офицер, спецназовец, погиб в горах Афганистана, и переродился младенцем в альтернативном мире. Современном мире Российской империи с авто/мобильниками, с Романовыми во главе, в мире, где не было Второй Мировой Войны, в мире, где есть магия – маги при обучении последовательно открывают разные стихии, которых всего десять, и десятая – считается мифической и недосягаемой. \n\nИ вот сразу на входе в Университет Александр, внешне этакий русский богатырь, ввязывается в неприятности. Собственно, этим меня и покорили авторы, несмотря на мое периодическое бурчание – ты не успеваешь опомниться от одного приключения, как уже начинается другое, и ты, не в силах остановиться, потому что тебе ОЧЕНЬ надо знать, что же там дальше. \n\nМне очень понравилась идея истории. Во-первых, в конце отдельных томов авторы писали посвящения нашим бойцам, выполнявшим задания и погибшим. Это трогает. Во-вторых, цикл называется Имперец – и вот это имперство и служба Родине там идет красной нитью. Герой – сын страны и ее верный воин до конца. Название, имхо, очень удачное, красивое. Жаль, что не я его придумала) отличное. \n\nИстория, пусть и крутится вокруг одного героя, многофокальная. Авторы то и дело показывают нам происходящее глазами кого-то из окружения героя, второстепенных персонажей (очень колоритных) и даже самого Государя-Императора. А я такое страсть как люблю, люблю, когда много точек наблюдения для читателя. Классно сделаны боевки, хотя, конечно, сомнения меня терзают, что опытный спецназовец, которые учатся не трындеть и действовать тихо с первой тренировки, будет то и дело бросаться присказками типа «Я иду искать». Но если перестать бухтеть, то чисто кинематографически это сделано здорово – придает драйва и красочности сценам. \n\nГерой покоряет четкими принципами и верностью, хотя его склонность к насилию могла бы быть на мой деликатный взгляд и поменьше. Вот знаете танк? Наш Александр Мирный – танк с магическими способностями. \nЯ как поклонница военных сцен и сцен эпично-масштабных, читала их с чувством глубокого удовлетворения – это абсолютно моя эстетика, авторы молодцы, мои апплодисменты. \n\nДля женщин сразу скажу – читайте обязательно, история универсальная. Да, там нет романтических драм, но есть очень хорошая история любви главного героя, за которой интересно наблюдать. А еще авторы расстарались и сделали там не одну любовную историю, а с десяток, не меньше, и то, как окружение Мирного находит себе невест, читается в лучших традициях ромфанта. То есть авторы ухитрились пройти по грани – с одной стороны это чисто мужская история с крутым героем, боями, войной, преодолением и возвышением героя, с другой – жизненности и любви там достаточно для нас, женщин-читателей. \n\nОчень понравилось, что авторы не стали растягивать цикл на 20+ томов (кто бы говорил, да?), потому чт

о на этой почве можно было бы писать и писать. Но нет, баланс соблюден, и от чтения я не устала. И язык мне понравился – не упрощенный, как сейчас принято, образный, с использованием известных сейчас мемов, но без упрощения и глума, очень органично вписанных в альтернативную реальность.⬇️⬇️⬇️\n\n⬆️⬆️⬆️Что касается того, отчего я периодически воздевала глаза к небу: изначально я не понимала, зачем мне читать про героя, почему я должна ему сопереживать, ибо авторы не дали ему ни глобальной цели, с которой он бы изначально предстал перед нашими глазами, ни какой-то внятной уязвимости. Динамика и интерес держатся только на том, что герой постоянно во что-то ввязывается, плюс авторы очень хорошо жонглируют моментами конфликтов-любви-обучения-философии-дружеских попоек – и так по кругу, и читатель не успевает устать от монотонности. Уязвимость у Александра появляется только книге к четвертой, но не мешает ему крушить всех направо и налево, и это слегка снижает накал драмы – ты не веришь, что с ним может что-то случится. А глобальная цель как «служение отечеству» тоже формируется по ходу дела, а по сути история состоит из кратковременных, коротких целей и арок. Это не портит историю, ни в коем случае, но если бы добавили уязвимость и глобальную цель пораньше, драму можно было бы выкрутить поярче. \n\nНо тут же оговорюсь – мне, когда я обсуждала книгу с приятелями – боярщиками, объяснили, что суть жанра бояръ-аниме и содержится в том, что герой у нас без уязвимости, страха и упрека идет по жизни, справляясь с проблемами, которые нарастают до почти глобального трындеца. \n\nЕще вопрос – в том, как к герою относится государство. И вопрос, скорее, философский и на подумать. Александр крайне силен, он словом и делом, подвигами и риском для жизни доказал верность стране, но методов воздействия на него у государства, если вдруг он крышечкой поедет и повернет свои орудия против страны, нет. Потенциально он опасен и этого не могут не понимать – сила, которую нельзя остановить, даже лояльная – это угроза. И только дружба с наследником и декларируемая верность не является гарантией того, что этот человек однажды не уйдет на темную сторону. (Все мы из недавней истории знаем, как самые верные воины страны могут обратить против нее свое оружие). Это не значит, что в тексте есть какие-то на это наметки, я говорю о том, как по факту его сила выглядит с точки зрения государственной безопасности, потому что защищает он Империю по доброй воле и своим убеждениям. А если эти убеждения вдруг переменятся? Что будет делать страна, если у него нет слабых мест и уязвимостей? \nЭто скорее мысль на подумать, чем претензия, честное слово. \n\nИ еще от прошлого героя-спецназовца только его опыт и образ мыслей, но непонятно, что было с ним с перерождения в малыша и до 18 лет, там слепое пятно. Подозреваю, что оставлено оно авторами нарочно. Кутит герой тоже как молоденький, как-то я, выросши в военной среде, припоминаю, что с возрастом все-таки степенности прибавляется. Но не буду тут экстраполировать свой опыт на всех. Иначе бы истории не случилось) \n\nРезюмируя – мне очень зашло. Для нежных натур предупреждение – есть местами кровавенькое, но без подробностей, без даркушности. Подраться и поуничтожать врагов герой любит самыми разными способами. \nИногда прямо пробивало до стеснения в груди от этакой имперской гордости – особенно в сценах на войне, и еще в конце, где герой вспоминает о том, как пошел на задание вместо новобранцев. Прямо проняло. Очень хорошо сделано. \n\nПока гуглила, увидела, что у авторов первый том «Имперца» висит в бумаге в предзаказе. Поздравляю, история заслуживает того, чтобы ее напечатали. Отличных продаж! \nЧитай-город  \nБук24  \nОЗОН  \nВайлдберрис"}, {"source": "kotova", "title": "«Громов» (5+ книг)", "book_author": "Карина Демина", "summary": "Тёмное фэнтези об альтернативной Российской империи 1950-х без большевистского переворота — умирающий в нашем мире бывший «браток» Савелий ощущает себя в теле болезненного сироты Савки, бастарда рода охотников на потусторонних тварей. Автор особо отмечает историческую достоверность и живых, уязвимых героев, несмотря на нелюбовь к жанру дарка в целом.", "tags": ["тёмное фэнтези", "альтернативная история", "магический реализм", "взрослое чтение"], "links": ["https://author.today/work/366993", "https://www.litres.ru/book/karina-demina/gromov-hozyain-teney-71758354", "https://litnet.com/ru/book/gromov-xozyain-tenei-b487668"], "date": "2025-10-14", "review": "#авторчитаетирекомендует\nНе устаю признаваться в любви Карине Деминой. Да, я ее фанатка и не стесняюсь этого) \n\nПрочитала, нет, простите, всосала в себя за неделю «Громова» (написано 5 книг, 6я в процессе) \n\n АТ\nЛитрес\nЛитнет\n\nИ оторвалась от истории, чтобы дождаться окончания цикла. \nНе могу разбавлять удовольствие. \n\nСразу хочу сказать девушкам – это не ромфант. Вообще. Если после этого вы решили, что читать не надо, я скажу – не будьте мною, обязательно читайте! Более того, это темное фэнтези, которое, как вы знаете, я не люблю, не читаю и всяко разно после него болею. Поэтому за «Громова» я долго не бралась, хотя параллельно читаю выкладку \"Ведьмы. Ру\". Потому что моя любовь к Деминой (мне у нее не зашло буквально единицы дарковых книг) боролись с нелюбовью к жанру. Но любовь победила. \nИ как же я этому рада! \n\nЦельное, масштабное, сложное повествование об альтернативной Российской Империи примерно 50 годов нашего века, в которой не было большевистского переворота, остались старые рода, у каждого из которых есть своя магия, а Романовы обладают ангельской силой. \n\nГлавный герой, Савелий Громов, в нашем современном мире умирает. У него онкология. У героя – весьма бурное и темное прошлое, он был «братком», есть на руках кровь невинных, и жизнь его вроде и удалась, а вроде и нет. И он в периоды забытья ощущает себя в теле Савки Громова, юного сироты, который слабенький, болезненный и маленький и которого гнобят другие дети из детского дома. \n\nОх как раскручивает Карина эту историю! От частного к общему, от личных тайн Савки к проблемам империи. Мы находимся в постоянном напряжении: выздоровеет ли Савелий-в-нашем-мире, что будет с Савкой в том. А самое главное, что маленький Савка, в котором присутствует и взрослый Савелий, - бастард рода Громовых, охотников на всяких тварей, которые пробиваются в этот мир через полыньи. И Мора, богиня смерти, ведущая свою игру со Светозарным, светлой ангельской силой, имеет на героя большие планы. \n\nСавка взрослеет, на него объявлена охота, он обзаводится друзьями и врагами, наставниками и домочадцами. Савка находит свои корни – но и это не конец. Он становится важным элементом в политической игре – и привлекает интерес революционеров. \n\nСавка – не ангел, но он и не беспредельщик. Темнота и дарк тут, как ни странно, заключаются в реалистичности мира, который описывает Карина. В его натуралистичности, я бы сказала, но без отвратительности. Я при всей своей тонкой душевной организации, лишь пару раз тяжело пережила некие эпизоды, связанные с детьми, но они, ттт, упомянуты вскользь. Хотя мне хватило, но не настолько, чтобы остановиться. \nИ это я вам и тысячной доли всего не рассказала. \n\nНо то, что меня покорило, кроме насыщенного сюжета – это то, с какой тщательностью проработан исторический материал. Я как учебник по истории России начала 20 века прочитала, но очень живой и образный. Захватывающий. Внимание к деталям в одежде, культуре, сословным различиям и поведению, речи, к совершенно разным слоям быта – от аристократичного до самого бедного, рабочего класса. Эпиграфы – вырезки из старых газет и речей политических деятелей, реальных и вымышленных. Примечания Карины к понятиям, словам и процессам. Короче, это просто превосходно, я бы хотела иметь такой уровень исторической образованности. \n\nИ еще. Я на курсах всегда говорю – чтобы сопереживать, у него должна быть глобальная, жизненно важная цель, и должна быть уязвимость, он не должен быть бессмертен и всемогущ. И вот у Карины этой ошибки нет – ее герои живые, уязвимые, а кроме того, что цель есть – для начала выжить, - цель по мере повествования становится многослойной, ступенчатой, пока не приводит героя к задаче выживания государства или мира. \n\nМое почтение. Я видела, что Карина на вопрос, будет ли Громов в бумаге, отвечала, что нет, это неформат для издательства, и, пожалуй, соглашусь – он специфичен, жестковат и очень историчен. Да и новые правила его не пропустят. Но жаль, потому что он заслуживает бумаги, и я верю, что скоро роскомнадзор попустит, и наши издатели начнут брать в печать и такие вещи. \nОбязательно читайте!"}, {"source": "kotova", "title": "«Тётушка против»", "book_author": "Тата Алатова", "summary": "Комедийный исторический ромфант о практичной чопорной тётушке Маргарет, которая берётся расстроить помолвку своей влюбчивой племянницы с охотящимся за наследством графом-банкротом. Автор отмечает мрачноватые семейные тайны, старый замок и добрый «английский» юмор в сочетании с несколькими эффектными поворотами сюжета.", "tags": ["ромфант", "юмор", "исторический роман", "независимая книга"], "links": ["https://t.me/tata_alatova", "https://author.today/reader/418168/3869884"], "date": "2025-09-07", "review": "#авторчитаетирекомендует\n\"Тетушка против\" Таты Алатовой  https://author.today/reader/418168/3869884 Боже, ну что это за прелесть прекрасная! Я глубоко убеждена, что через пару-тройку лет Тата Алатова станет супертопом российского ромфанта, так нестандартно и превосходно она пишет!\n\nПруденс Маргарет Робинсон, она же тетушка Маргарет - особа крайне практичная, чопорная, решительная и приземленная. В наличии у нее лишь чувство собственного достоинства, умение решить все на свете вопросы и забота о племяннице, сироте, которая хоть и является мещанкой, как и сама Маргарет, но неисчислимо богата.\nИ вот на родную, но очень ветренную и влюбчивую племянницу нацеливается блестящий кавалер - граф Флери, который может дать этому прекрасному цветку титул. Племянница влюблена, граф пылает, что может быть прекраснее?\nНо тетушка Маргарет знает, что граф беден как церковная мышь и охотится за наследством, а на племянницу ему плевать. Тетушка Маргарет берется расстроить этот брак со свойственной ей практичностью.\n\nАбсолютно прекрасная вещь. Здесь есть и мрачные, жутковатые семейные тайны. И колоритные родственнички. И старый замок, который держится чудесным составом, изготовленным предком графа. И заставляющие стыть в жилах кровь события. \n \nИ все это приправлено добрым \"английским\" юмором, неповторимым колоритом старой доброй аристократии, зарождающейся у нас на глазах любовью, которая, конечно же, все препоны преодолеет. А еще в книге есть по крайней мере три \"вотэтоповорота\", которые меня цепанули крючком и потащили по сюжету дальше. Это уж не говоря о том, что книга начинается с вотэтоповорота) \n \nМне очень нравится, что тетушка - старая дева - создание не исключительных достоинств. В ней есть педантичность, определенное равнодушие, мстительность, некая безжалостность. Она из тех женщин, которые \"соль земли\", и это прекрасно. Необычная героиня, необычный герой, нестандартное начало, необычный сюжет. Как всегда у Таты Алатовой. С чем я нас всех и поздравляю) \n \nА я бы еще почитала и о герцоге с его цветочницей, и о начальнике полиции, который стал свидетелем - щедро рассыпаны в истории намеки на других интересных персонажей, и это придает ей дополнительной глубины."}, {"source": "kotova", "title": "«Бедовый» (серия, 10+ книг)", "book_author": "Дмитрий Билик", "summary": "Мужское юмористическое городское фэнтези о неудачливом курьере Матвее, который получает магический дар «рубежника» и беса-помощника после спасения старушки, действие происходит в современной России с параллельной властью старых магических родов. Автор отмечает залихватский мужской юмор, динамику и человечность героя, которому многое даётся нелегко.", "tags": ["городское фэнтези", "юмор", "боёвка", "мужская проза", "длинная серия"], "links": ["https://t.me/bilik_d", "https://author.today/work/334699", "https://www.chitai-gorod.ru/r/czoKL"], "date": "2025-09-04", "review": "#авторчитаетирекомендует\n\nНу что, кому хочется залихватского мужского юмора, приключений и сеттинга современной России? Для читательниц – автор обещает в будущих томах любовь, но я туда еще не дошла)\n\nДавненько я не советовала вам мужского фентези, а тем временем на АТ я нашла несколько весьма достойных вещей. Так что наравне с «Горчаковым» Валерия Пылаева и «Чехова» Гоблина и Каина (знаю, что и то, и другое многие читатели прочитали по моей наводке), хочу порекомендовать вам «Бедового» от Дмитрия Билика https://author.today/work/334699\n\nЮмор, динамика и добрый герой – три кита, которые меня очень порадовали. И хороший крепкий сеттинг на основе современной России – с князями, колдунами или «рубежниками» из старых родов, которые поделили страну и существуют параллельно с официальной властью.\n\nГлавный герой - Матвей Зорин, неудачливый парень, который работает курьером. Из всех достоинств на начало книги у него только жизнелюбие, хорошо подвешенный язык и чувство юмора. Юмора, как вы уже поняли, в этой книге будет очень много, и как тонкого, так и грубоватого мужицкого «гаражного» про бухло и прочие радости. Можно сказать, дисклеймер, кого-то эта залихватскость повеселит, кого-то оттолкнет. \n\nГерой с шуткой-прибауткой идет по жизни, и иногда думаешь – ну ты бессмертный, что ли? Но я и в реальной жизни знаю таких людей, которые заткнуться вовремя не умеют и иногда дошучиваются))\n\nНаш невезучий товарищ доставляет заказ не в то время и не в то место. И выходит оттуда с волшебным даром рубежника и бесом-помощником по имени Гриша. Кстати, значительная часть «мужицких» шуток связана именно с ним).\n\nЧто мне понравилось? Если невезучесть героя отступает, то все остальное вовсе не дается ему легко. Он не нагибатор, он может ошибиться, налажать, он очень человечный. Его преследует враг, мощнейший рубежник – это первая линия опасности. Любой может героя победить и забрать себе его силу – это второй. А еще от своего неравнодушия Матвей постоянно вписывается за слабых и тех, кому нужна помощь, и это подкупает. И вы вообще не сможете в этой истории заскучать, разные задачи идут внахлест, ты даже передохнуть не успеваешь, как герой влезает еще во что-то. Поэтому книга читается влет. \n\nПричем история не поверхностная, есть там и жутковатые, и неприятные моменты, поэтому она кажется не игровой, а очень реалистичной.\n\nСочетание привычного и нормального с волшебным, тайные двери, за которым находятся магические рынки, леса, в которых живут черти и лешие, внутренняя логичная структура законов делают мир живым и интересным. И с каждой книгой (а их уже написано 10, 11 пишется, и 12я обещает быть последней (что-то напоминает это, да?))) мир расширяется, а испытания для главного героя становятся все сложнее. Так что рекомендую – а если читали, напишите, как вам, понравилось или нет.\n\nАннотация:\n\nХорошими делами точно нельзя прославиться. Вот взять, к примеру, меня. Хотел помочь умирающей старушке, а она взяла и наградила меня хистом. Теперь я вижу всякую нечисть, в квартире живет бес, а остальные называют рубежником. И еще одна деталь - кто-то очень хочет меня убить. Хотя с моим-то везением разве могло быть по-другому?\n\nА еще сегодня у Дмитрия Билика, автора «Бедового» день рождения. Я первые две книги серии прочитала уж месяц как, недописанная рецензия у меня лежала, укоризненно посверкивая буковками, так что сегодня хороший повод ее наконец-то доделать и выложить.\n\nА еще вы можете знать Дмитрия Билика как автора издательства «МИФ» - там у него выходит «Имперский сыщик». https://www.chitai-gorod.ru/r/czoKL?erid=2W5zFHqSAye Я еще не читала, но обязательно примкну, по первым страницам история обещает быть интересной.\n\nХорошего вам чтения!"}, {"source": "kotova", "title": "«Я стану твоим врагом»", "book_author": "Ольга Погожева", "summary": "Жёсткий взрослый ромфант о вражде и любви — воительница, потерявшая мужа от руки вражеского генерала, вынуждена по воле правителей связать свою судьбу с его убийцей после окончания войны. Автор называет книгу однотомником без «ванильности», сочетающим боевые сцены, дворцовые интриги и сильные эмоции.", "tags": ["ромфант", "дарк", "дворцовые интриги", "взрослое чтение"], "links": ["https://www.litres.ru/book/olga-pogozheva/ya-stanu-tvoim-vragom-71660131"], "date": "2025-08-23", "review": "#авторчитаетирекомендует\nЕще к тому, что почитать на выходных. Книга, которую я когда-нибудь надеюсь увидеть в \"Королевской библиотеке\".\n\"Я стану твоим врагом\" Ольги Погожевой\nЭто одна из историй еще со старого Самиздата, которые не забываются.\n\nОчень сильная вещь. Противостояние двух личностей, ненависть, политика, любовь. Это и ромфант, и боевка, и дворцовые интриги, без искусственности и балагана. Это однотомник, есть продолжение, но про других героев.\n\nГерой и героиня - враги в буквальном смысле слова. Оба бьются во вражеских армиях. Один - генерал, другая - воительница, жена командующего, которого любит всем сердцем, с которым у них прекрасная семья и ребенок. И мужа убивает вражеский генерал.\nВойна заканчивается, правители мирятся. Но примирение тех, кто поклялся мстить друг другу, невозможно. Однако воля правителей соединяет их судьбы.\nИ нет, там не будет ванили и покорности. Это жесткая, взрослая, нереально стекольная история, в которой вы как на американских горках эмоционально прокатитесь.\nОчень, очень рекомендую.\nСейчас книгу можно прочитать на Литрес \n\nТам же есть и аудио \n\nАннотация:\nЭта история начинается там, где обычно заканчиваются все остальные. \n \nВойна между двумя государствами окончена, но судьбы тех, кто побывал на полях сражений, навсегда изуродованы болью и ненавистью. Возможно ли рождение из самой настоящей ненависти самой искренней любви? \n \nОт перемирия на бумаге к перемирию в собственном сердце, о том, можно ли простить врага, о кровной мести и, конечно, о любви.\n\nДрузья, пост не проплаченный! Я не рекомендую книги, которые я не читала и которые мне не понравились. Регистрация на ерид автоматически даётся Литресом, если пользуешься его партнерскими ссылками. \n\nРеклама. ООО ЛИТРЕС, ИНН 7719571260, erid: 2VfnxyNkZrY"}, {"source": "kotova", "title": "«Менеджер Нагибко, вы робот?»", "book_author": "Юлия Жукова, Елизавета Шумская", "summary": "Космофантастика и корпоративная сатира про современницу Асю, очнувшуюся в теле робота-болванки на далёкой планете и вынужденную решать проблемы на складе гигантской корпорации, а также кризис-менеджера Александра, разбирающегося в диверсиях компании. Автор отмечает необычное сочетание киберпанка, офисного процедурала и ненавязчивого юмора.", "tags": ["космофантастика", "юмор", "сатира", "дуэт авторов"], "links": ["http://author.today/work/428161", "https://t.me/yulia_zhukova_worlds", "https://t.me/elizashumskaya"], "date": "2025-06-29", "review": "«Менеджер Нагибко, вы робот?»\n\nАбсолютно восхитительная история получается у Юлии Жуковой и Елизаветы Шумской. Я знала, что не надо читать до окончания, теперь каждый день заглядываю за продолжением)\n\nНо есть в этом и плюс – потом я перечитаю всё целиком, как было с «Эльфийским быком» Карины Деминой. Два удовольствия вместо одного!\n\nИтак, наша героиня-современница Ася, направившись в клинику пластической хирургии, после наркоза приходит в себя в далеком будущем. В теле робота. И не человекообразного-андроида, а такой вполне себе болваночки, работающей на далёкой планете на складе гигантской корпорации.\n\nВторой герой – Александр – кризисный менеджер. Нанят собственником компании, который её искренне любит и не понимает, в чём проблема, почему в ней в последнее время всё идёт не так.\n\nТак вот, повторюсь, это восхитительно. Части от обоих героев – прекрасны.\n\nВо-первых, я никогда не думала, что история о жизни складских роботах будет такой увлекательной.\n\nВо-вторых, это восхитительная небалаганистая сатира на бюрократические и управленческие проблемы крупных корпораций от директоров до самых мелких сошек. Видно, что писали люди, которые в этом разбираются.\n\nВ-третьих, это самая настоящая космическая фантастика, то есть очень круто проработаны и технологии будущего, и история покорения космоса, и так далее.\n\nВ-четвёртых, у героини реально ОЧЕНЬ большая проблема, которую она решает на манер квеста – и следить за этим очень интересно.\n\nИ у героя задача нетривиальная.\n\nЯ, читая эту книгу, узнала больше про узкие места компаний, чем за всю свою жизнь. Обожаю истории, в которых ты ещё и расширяешь свои горизонты.\n\nА ещё вся история пропитана ненавязчивым юмором, ты на неё подсаживаешься и хочется читать всё больше и дальше. Первая книга уже дописана, сейчас пишется вторая, но если честно, я надеюсь как минимум на трилогию, потому что дуэт у авторов получился очень удачным.\n\nЯ очень жду встречи героев, разоблачения Аси, жду, удастся ли ей вновь стать человеком и раскроет ли Саша тайну, связанную с диверсиями и саботажем работы в компании. И, конечно, хочу побольше узнать об окружающем мире, который нам открывают потихоньку.\n\nАвторы молодцы – взяли неизбитую, плотно никем не отработанную тему: киберпанк, процедурал и бюрократический роман, – и написали нечто действительно свежее и достойное, что будет интересно и мужчинам и женщинам. Я редко получаю удовольствие от историй без любовной линии с первых страниц, но тут герои ещё даже не встретились, а я уже в восторге.\n\nОднозначно рекомендую всем. И кто читает параллельно со мной по ходу выкладки – скажите же, история крутая?)\n\n📖 Аннотация:\n\nВы думали, что плохой день — это когда всё валится из рук? Нет, плохой день это когда у вас и рук-то нет! Впрочем как и всего остального тела. Я пришла в себя на складе корпорации ЭкзоТех и поняла, что я — робот. Теперь у меня две задачи: вернуть себе человеческое тело и навести наконец-то на этом складе порядок!\n\n#авторчитаетирекомендует@kotovafantasy"}, {"source": "kotova", "title": "«Ньюлин» (трилогия: «Тэсса на краю земли», «Холли внутри шторма», «Фрэнк на вершине горы»)", "book_author": "Тата Алатова", "summary": "Экстремально нестандартная трилогия про городок изгоев Нью-Ньюлин, где «чудовища», лишние в большом мире, находят своё место — с деликатно и органично прописанной полиаморией и завораживающей атмосферой обрыва над морем. Автор особо отмечает, что каждая книга серии словно «расправляет» героев, помогая им залечить раны и найти баланс.", "tags": ["ромфант", "фэнтези", "полиамория", "нестандартное", "трилогия"], "links": ["https://www.chitai-gorod.ru/r/trPwc", "https://book24.ru/r/lgtXb", "https://author.today/work/series/31980", "https://www.litres.ru/book/tata-alatova/tessa-na-krau-zemli-70798606"], "date": "2025-06-27", "review": "Мой прекрасный сегодняшний вечер.\n\nУ нас наконец-то голубое небо, не дождит и не ветрено. Дети у бабушки, вечер умиротворения. И идеально в этот вечер легло сегодняшнее чтение.\n\nВся трилогия Таты Алатовой про Ньюлин – экстремально неформатна, свежа и великолепна. Сейчас дочитываю «Фрэнка на вершине горы» – ждала подходящего настроения, и хочу всем сказать – читайте Тату, покупайте её книги в бумаге, она одна из немногих авторов, которая не пишет стандарт и формат, в ней очень много освежающей новизны и непривычности.\n\nЯ очень рада, что на обороте второй книги серии «Холли внутри шторма» есть моя рекомендация.\n\nВсе герои Таты в этой серии с каждым томом трилогии будто расправляются, залечивают раны, находят своё место и свой баланс. Вообще весь Ньюлин, эта деревня «чудовищ» напоминает мне сад камней, где пирамидки из камней находятся в удивительном балансе, но тронь один – и полетят все.\n\n⬇️⬇️⬇️\n#авторчитаетирекомендует@kotovafantasy\n\n⬇️⬇️⬇️\n\nИ главный герой здесь – городок Нью-Ньюлин, где те, кто привыкли быть лишними и пугающими в большом мире, становятся нужными и важными в этом маленьком мире.\n\nА ещё здесь полиамория написана так органично и деликатно, без формульной физиологичной пошлости, что читать – одно удовольствие. Вот уж тут воистину то, что я люблю в сценах секса (хороших) – когда секс является способом общения людей, просто на другом языке, но таком же понятном, как если бы они говорили ртом.\n\nИ сама атмосфера солнца над обрывом над синим-синим морем, городка, в который могут попасть только те, кого он захочет принять, морского монстра, живущего под городком, Тэссы, слишком неукротимой, чтобы быть одной, и слишком выжженной, чтобы любить – и всё же и любящей, и любимой – она завораживает.\nКак и ощущение будничного невероятного, привычки к экстремальному, в которой живут жители городка.\n\nПрекрасная история.\n\nИ хочу напомнить, что в бумаге первая книга трилогии уже вышла, есть в ЧГ и Book24,а вторая находится в предзаказе.\n\nОчень надеюсь, что в России найдется достаточно поклонников этой истории, чтобы раскупить тираж.\n\nСсылки на предзаказ второй книги «Холли внутри шторма» в ЧГ и Book24.\n\nНу и для тех, кто читает в электронке, книги на AT и litnet.\n\nНа Литрес есть аудио первой части.\n\n#авторчитаетирекомендует@kotovafantasy"}, {"source": "kotova", "title": "«Три орешка для Тыковки»", "book_author": "Светлана Нарватова", "summary": "Тёплая уютная история на один вечер — сбежавшая от навязанного брака девушка-травница живёт в лесу под видом вдовы, пока однажды не находит под кустом едва живое тело незнакомца и не решает его выходить. Автор отмечает фирменный юмор Светланы Нарватовой и доброе, светлое послевкусие книги.", "tags": ["ромфант", "лёгкое чтение", "фэнтези", "уютная история"], "links": ["https://t.me/upssss_books", "https://author.today/work/303517", "https://litnet.com/ru/book/tri-oreshka-dlya-tykovki-b460584"], "date": "2025-06-20", "review": "Прелесть прелестная и добрая как раз вам к выходным – «Три орешка для Тыковки» Светланы Нарватовой.\n\n📲 Ссылки:\n• Author.Today\n• Litnet\n• Литрес\n\nОдна из историй на один вечер, которые этот самый вечер могут очень скрасить и оставить теплое и доброе послевкусие.\nА там ещё и фирменный юмор Светланы, который заставляет постоянно улыбаться.\n\nГородская девушка, у которой внезапно погибают родители-маги, оказывается на попечении дяди. И дядя этот вдруг сговаривает её за жениха куда старше неё, которого она в жизни не видела. И подозревает героиня, что всё это для того, чтобы получить доступ к наследству.\nПоэтому и решает бежать. И путем нехитрых махинаций преставляется вдовой и устраивается травницей в забытом Боге месте среди глухого леса, где ее точно не могут найти.\nИ вот однажды по пути из городка к своей лесной избушки она находит под кустом едва живое тело, кое в приступе человеколюбия решает полечить.\nКто это и что из этого получится, как раз и узнаете в «Трёх орешках»)))\n\nОтличная светлая история, за которую Светлане большое спасибо. Если кто читал, поделитесь тоже впечатлениями, чтобы другие читатели могли решить, читать или нет. Хотя, имхо, если вы любите книги-плюшки, то это как раз для вас.\n\n📖 Аннотация:\nЧего только ни найдёт в своём лесу ведьма, которая работает травницей! Травы, коренья, ягоды, грибы, орешки, остывающее тело… Ан нет, тело ещё не остыло. Подберём. Сложим. Залатаем. Вылечим. Рачительной хозяйке всё в доме сгодится. А если не сгодится, отнесём обратно. Что значит, оно требует другого отношения?\n\n#авторчитаетирекомендует@kotovafantasy"}, {"source": "kotova", "title": "«Призраки Марта» (цикл из 5 книг)", "book_author": "Татьяна Солодкова", "summary": "Тёмный магический цикл о Мартине Викандере, потерявшем семью и сестру-близнеца после жестокой расправы короля над его родом тёмных магов — теперь он мстит, ищет сестру и защищает людей от нечисти, скрывая своё прошлое. Автор особо хвалит выверенную динамику повествования и главного героя с сильным чувством чести и верности.", "tags": ["тёмное фэнтези", "магия", "месть", "цикл", "взрослое чтение"], "links": ["http://author.today/work/173194", "https://litnet.com/ru/book/prizraki-marta-b480102", "https://www.litres.ru/book/tatyana-solodkova/prizraki-marta-66390766/"], "date": "2025-06-15", "review": "Татьяна Солодкова «Призраки Марта».\n\nЧитала на Author.Today, \nно есть на Литнет\nи ЛитРес вместе с аудио.\n\nЯ знаю и люблю Татьяну Солодкову ещё с «Руин веры». Она относится к тем писателям, которые пишут по-взрослому, реалистично, поэтому и герои у неё поступают адекватно своему возрасту, и в книгах достаточно стеклища и драмы, как в реальной жизни. Но заканчивается всё хорошо. \n\n«Призраки Марта» открывает цикл из 5 книг, все из которых я прочитала с удовольствием и полным погружением.\n\nМартин Викандер – человек, в детстве потерявший всё. Его семью, семью потомственных аристократов, тёмных магов, убивают по приказу короля, потому что они отказались подчиниться и носить в ухе «контролирующую» серьгу, которая при нападении темного на какого-либо человека вызывает у мага жутчайшую боль и может убить.\n\nМартин, которого тогда звали Вик, потерял не только родителей, но и сестру-близняшку Викторию. И сейчас, когда он вырос в приюте, когда выучился на темного мага и получил обязательную серьгу в ухо, у него несколько целей. \nОтомстить тому, кто погубил семью. \nНайти сестру. \nНе попасться. \nИ параллельно заниматься своими прямыми обязанностями – защищать людей от нежити и нечисти.\n\nОчень хорошо сделанная история, в которой есть место и горечи, и светлым моментам, и настоящей дружбе, и ненависти, и любви, и безумию. И здесь абсолютно мой главный герой – человек, который знает, что такое честь и достоинство, верен в дружбе и любви, умеет совершать поступки и отвечать за них и прикрывает тех, кого любит или тех, кто слабее него и попал под раздачу. Человек пытливый и светлый, несмотря на тёмный дар.\n\nОстальные книги не менее захватывающи, но первая – прямо моя любовь. Все книги можно читать отдельно, в них мелькают знакомые персонажи и локации, но в целом они независимы. Вторая книга «Чёрный север» продолжает историю Мартина, но её тоже можно читать отдельно.\n\nА ещё меня очень покоряет динамика повествования – нет затянутости, но и нет ощущения, что автор пытается каждую проду ошеломить читателя каким-нибудь финтом, только чтобы он читал дальше. Главы выверенные, нагнетание к кульминации прекрасное, в тексте нет суетливости.\n\nСпасибо огромное Татьяне за удовольствие.\n\nИ традиционно, если вы читали её книги – прошу поделиться впечатлениями, этим вы поможете другим читателям понять, их ли это книга.\n\n#авторчитаетирекомендует@kotovafantasy"}, {"source": "kotova", "title": "«Школа Лысой горы» (дилогия)", "book_author": "Валентина Елисеева", "summary": "Неспешное фэнтези про учительницу Василису, которая, спасаясь от семейной драмы, устраивается на работу в необычную деревенскую школу и начинает замечать странные видения — трёхглавых драконов, говорящие огоньки — и подозревает у себя наследственную шизофрению. Автор хвалит эклектичное сочетание волшебной школы с бюрократическими буднями и славянско-сказочные мотивы.", "tags": ["фэнтези", "магическая школа", "славянские мотивы", "дилогия"], "links": ["https://litnet.com/ru/book/shkola-lysoi-gory-moi-prekrasnyi-direktor-b160666"], "date": "2025-05-15", "review": "С каким огромным удовольствием я прочитала (не до конца, потому что финал сейчас пишется, а драма к развязке уже нагнетена) дилогию «Школа Лысой горы» Валентины Елисеевой! \n\nЭто идеальная история для любителей неспешности. Тут, собственно, до встречи главных героев чуть ли не треть книги проходит.\n\nВокруг героини, пережившей драму, начинают клубками собираться тайны, и чтобы разгадать их, героиня едет в деревеньку Лысая гора – туда, куда ведет одна из зацепок, найденных ею.\n\nВалентина Елисеева использует в этой дилогии мою любимую эклектику. Здесь тебе и столкновение задач волшебной школы с совершенно обычной нашей образовательной бюрократией, и работа с обычными людьми, пострадавшими от потустороннего, и славянско-сказочные мотивы, и чудный провинциальный дух, и оригинальные математические загадки сюда же.\nА ещё здесь очень любопытная история, связанная с главным героем, которая переворачивает всё с ног на голову, и до конца второй книги заставляет читателя ломать голову – что сильнее, любовь или смерть?\n\nИ Валентина обошлась без противостояния и конфликтов, их конфликт – внешний, а оба героя – хорошие люди, живут не на разрыв, но вынуждены меняться под воздействием обстоятельств. Редко кому удается написать нормальное, спокойное зарождение чувств интересно, и тут тот самый случай.\n\nОчень хорошо чередуются рабочие будни с буднями университетскими (уже во 2 книге), расследования и уроки, юмор, любовь и драма. Хорошая история, от которой я получила настоящее удовольствие.\nУ Валентины я уже читала и «Кризисный центр “Монстр„» и «Идеальная невеста некроманта» – всё очень понравилось. Рекомендую.\n\n📖 Аннотация:\nЕсли в вашей жизни происходит слишком много странностей – это к переменам.\n\nСемейные тайны приводят Василису в деревню с ведьминским названием Лысая Гора. Здесь она устраивается на работу в школу, в которой учатся удивительные дети под присмотром очень (не)обычного директора. И коллеги и ученики посматривают на неё настороженно, но хуже всего, что Василисе начинает мерещиться что-то не то! Странные шепотки по углам, силуэты летящих трёхглавых драконов, говорящие огоньки и прочие галлюцинации вынуждают её подозревать пробуждение наследственной шизофрении...\n\nВсячески скрывая неподходящий учителю диагноз, Василиса всё сильнее погружается в сказочный мир и всё больше сомневается, что тот – плод её больной фантазии!\n\nКем же на самом деле является её прекрасный директор?!\n#авторчитаетирекомендует@kotovafantasy"}, {"source": "kotova", "title": "«Академия \"Чаросвет\"» (дилогия)", "book_author": "Ольга Ярошинская", "summary": "Фэнтези про мир, разделённый на Сумерки, живущие благодаря зеркальному свету великих домов, и Ночь, откуда приходят смертельно опасные чудовища — сирота-подавальщица Мэдерли после случайной встречи с магами-чарами оказывается в Академии, и её судьба переплетается с судьбой мира. Автор отмечает удачное сочетание юмора и тёмных нот и большое количество проработанных судеб на два тома.", "tags": ["фэнтези", "магическая академия", "дилогия", "приключения"], "links": ["https://www.litres.ru/series/akademiya-charosvet-847654", "https://litnet.com/ru/book/akademiya-charosvet-ten-b483797", "https://www.chitai-gorod.ru/r/jpfPv"], "date": "2025-05-08", "review": "С огромным удовольствием рекомендую «Академию “Чаросвет„» Ольги Ярошинской. Это дилогия, которую я прочитала влёт, так она хороша.\n\nЯ вообще люблю Ольгины академки – тут я хвалила от души «Академию Хаоса», а теперь вот добралась до «Чароцвета».\n\nУ Ольги в её крупных работах есть уникальная способность миксовать юмор и тёмные ноты, включать много героев, у каждого из которых есть своё место в истории.\n\nИ задумка истории уникальная – есть мир, в котором существует 6 великих домов, над которыми есть свет и которые с помощью системы зеркал обеспечивают дневной свет в Сумерках – зоне, где своего света нет, и которые выживают только из-за зеркального света.\nВыживают в буквальном смысле – за пределами Сумерек находится Ночь, земли, над которыми всегда царит тьма, и из которых приходят разные смертельно опасные чудища.\n\nМэдерли – сирота, чья мать была убита чудовищами в тот день, когда над их городком погас свет от зеркала. Она спаслась чудом и сейчас работает в Сумерках в трактире подавальщицей.\nНо однажды в трактир вваливаются маги-чары, которым захотелось позабавиться. \nЧто из этого вышло и как Мэдерли оказалась в Академии, и как её судьба связана с судьбой мира, узнаете дальше в книге)\n\nЭто правда очень хорошо. Ещё и потому, что герой тут, конечно, не без дури, но при этом нормален и спокоен. И родители у него прекрасные. Ну и плюс я никак не ожидала (хотя могла бы после Академии Хаоса), что на двухтомник развернётся столько судеб и приключений.\n\nКак вы поняли, очень рекомендую.\n\nКупить книгу:\n• на ЛитРес\n• на Litnet\n• в ЧГ\n\n#авторчитаетирекомендует@kotovafantasy #ОльгаЯрошинская"}, {"source": "kotova", "title": "«Операция \"Волчье сердце\"», «Артефактика: от теории к практике», «Роли леди Рейвен», «Испытания госпожи Трейт»", "book_author": "Дарья Снежная, Любовь Ремезова", "summary": "Подборка перечитанных книг дуэта авторов: детектив с оборотнем-капитаном стражи и колючей эксперткой-криминалисткой; тёплая история любви артефактора и его подмастерья; горячий детектив про первую женщину-криминалиста, ставшую любовницей герцога; и история учёной, добивающейся права предотвратить магическую катастрофу. Автор отмечает тёплый язык, отсутствие шаблонности и надеется на продолжение сотрудничества авторов.", "tags": ["фэнтези", "детектив", "ромфант", "подборка одного дуэта авторов"], "links": ["https://litnet.com/ru/darya-snezhnaya-u5431"], "date": "2025-05-05", "review": "Я регулярно прошу у вас поделиться со мной чем-то интересным, и вот в прошлый раз мне напомнили про «Операцию “Волчье сердце„» Дарьи Снежной и Любови Ремезовой.\nС каким же удовольствием я перечитала! И «Волчье сердце», и «Артефактику» (там тоже Макс и тоже моя любовь), и «Роли леди Рейвен», и «Испытания госпожи Трейт».\nЕсли вы ещё не читали – обязательно читайте. Можно начать, как я, с «Волчьего сердца», а можно с первой книги цикла – «Артефактики».\nОчень сильно надеюсь, что авторы вернутся к написанию книг, ибо у них получился прекрасный дуэт.\n\n• «Операция “Волчье сердце„» – про капитана стражи – волка-оборотня и госпожу эксперта-криминалиста, холодную стерву и самую невыносимую на свете женщину.\n• «Артефактика: от теории к практике» про мастера-артефактора Макса и его девушку-подмастерье. Очень теплая, классная история любви.\nА ещё там прекрасный мир, тёплый язык авторов и в 1 книге – противостояние, а во 2 – неспешное развитие. Читать обе очень интересно!\n• «Роли леди Рейвен» – дочь опального виконта, по совместительству маг-криминалист, первая женщина-криминалист в истории, становится любовницей герцога и расследует дело о маньяке, пробираясь через шовинизм и предубеждения. Горячая эротика и классный сюжет.\n• «Испытания госпожи Трейт» – маг-учёная пытается добиться у крупного промышленника права исследовать магический агрегат, так как впереди по её исследованиям маячит катастрофа. Однако ей не верят, выгоняют из института, где она работает, и открывают на неё охоту.\n\nКрайне рекомендую! У меня душа отдыхала, пока я перечитывала, это так классно и здорово написано, никакой поверхностности, никакой шаблонности. Красота просто)\n\n#авторчитаетирекомендует@kotovafantasy"}, {"source": "kotova", "title": "«Мой (с)нежный барс»", "book_author": "Екатерина Каблукова", "summary": "Динамичное современное горфэ про полукровку Джинджер Гарт, которая неожиданно наследует от отца спортивную команду оборотней по игре в грайд и должна вытянуть её из кризиса, попутно разбираясь со сводным братом-душеприказчиком. Автор называет это «спортивной бытовушкой» с хорошей детективной линией и романтикой от ненависти до любви.", "tags": ["горфэ", "оборотни", "спортивная тематика", "ромфант"], "links": ["https://t.me/kablukovabooks", "https://www.litres.ru/book/ekaterina-kablukova/moy-s-nezhnyy-bars-71928598"], "date": "2025-04-27", "review": "С огромным удовольствием прочитала новую историю от Екатерины Каблуковой – «Мой (с)нежный барс».\n\nЛюблю такие динамичные, современные вещи в жанре горфентези. Мир узнаваем, но в старой Европе живут оборотни, а на территории США – фейри. Но не это главное, главное – сюжет)\n\nПолукровка – Джинджер Гарт, когда-то сбежавшая от деспотичного отца, внезапно получает от него в наследство команду по игре в грайд – когда оборотни играют на поле с мячом в полутрансформации. И теперь ей нужно вытянуть команду из дыры, в которой она оказалась, и решить старый конфликт со сводным (не кровным) братом, который в детстве доставил ей немало неприятностей, и которого отец, похоже, любил больше неё, хотя он был и не родным сыном.\n\nЭто такая спортивная бытовушка с хорошей детективной линией, романтикой от ненависти до любви, интересным сеттингом. Надеюсь почитать истории и про других членов команды «Барсы», потому что книгу проглотила за вечер, и этот вечер она мне очень скрасила. Безусловно рекомендую!\n\n📖 Аннотация:\nГрайд – мужская игра оборотней, в которой нет места слабым женщинам, тем более полукровкам. Но что делать, если вдруг на голову в виде наследства сваливается команда игроков в грайд? Еще и с душеприказчиком в лице ненавистного сводного брата, который так и жаждет прибрать “Барсов” к своим рукам! \n \nКонечно, можно бросить все и сбежать… Но лучше принять вызов, создать непобедимую команду и получить приз, а вместе с ним и любовь!\n\n#авторчитаетирекомендует@kotovafantasy"}, {"source": "kotova", "title": "«Семь снежинок на ладони»", "book_author": "Светлана Нарватова", "summary": "Фэнтези 18+ про Эмилию, которая ради спасения семьи от разорения выходит замуж за герцога с недоброй репутацией — тринадцатой женой, три из двенадцати предыдущих погибли не своей смертью. Автор хвалит ситуативный юмор, ироничных героев и глубокие вопросы, которые решаются активными действиями персонажей, а не пущены на самотёк.", "tags": ["фэнтези", "ромфант", "юмор", "18+"], "links": ["https://t.me/upssss_books", "https://author.today/work/318420", "https://www.litres.ru/book/svetlana-narvatova/sem-snezhinok-na-ladoni-71435353/"], "date": "2025-04-21", "review": "Прочитала абсолютно классную, роскошную, прелестную историю – «Семь снежинок на ладони» Светланы Нарватовой. \n\nКнига на:\n• АТ\n• litnet\n• ЛитРес\n\nЭто было глубоко, весело, фэнтезино, с тайной на тайне, с неспешным, но забавным развитием отношений, с классной локацией-замком и классными героями.\nЗнающая, что ей нужно героиня, необычный, нестандартный даже герой. Вот прямо от души рекомендую.\nКнига длинная – можно наслаждаться долго, и автор не скупится на то, чтобы удивлять читателя.\n\nИтак, наша героиня узнаёт семейную тайну и из-за этого ей нужно срочно выйти замуж. А папенька героини очень удачно (или неудачно) прогорает в делах, и единственным способом поправить их становится замужество дочери с правой рукой короля, герцогом Эльдбергом. Он прекрасен, умён, великолепен. Вот только она будет 13й по счёту женой. Говорят, его брак проклят – ведь из 12 прошлых жен 3 погибли не своей смертью, а с остальными он развёлся из-за неспособности подарить ему наследника.\nВпрочем, Эмилию Берген это не пугает, а даже радует. Ведь через полгода она может получить желанную свободу. Если доживёт, конечно.\n\nЭто прекрасно сделанная книга, прочтением которой наслаждаешься. Юмор здесь ситуативный, но местами я смеялась в голос. Плюс оба героя по-своему ироничны, и читать их мысленные монологи – одно удовольствие.\n\nЯ многое люблю у Светы Нарватовой, но юмор её еще с «Зачёта по тварезнанию» ценю особенно.\n\nИмейте в виду, что это 18+, поэтому там есть пикантные моменты.\n\nИ эта история очень хорошо заканчивается. Она такая добрая, она очень правильная, такое умиротворение приносит душе, что очень рекомендую ее всем, кому хочется хорошего настроения. И при этом она неглупая, глубокая, поднимает множество важных вопросов – и, что важно, они решаются активным вмешательством героев. Обязательно читайте!\n\n📖 Аннотация:\nЕсли дела идут хуже некуда, не теряйте оптимизма. Есть! Есть куда! Можно стать тринадцатой женой нэрр-герцога. И если мне повезёт, то через полгода он со мною разведётся. А если не повезёт, то меня это уже не будет волновать. А? Как вам такая формулировка? Вот! Если поискать, то во всём можно найти что-то хорошее. Да, иногда искать приходится долго. Например, если каждый первый хочет тебя использовать, а каждый второй грозится убить. Но семь снежинок просто так на ладошку не падают! Это говорю вам я, Эмилия Берген. А я всегда говорю правду!\n\n#авторчитаетирекомендует@kotovafantasy #СветланаНарватова"}, {"source": "kotova", "title": "«И жили они долго и счастливо» / «О детях кощеевых»", "book_author": "Алёна Селютина", "summary": "Современная сказка про бессмертного педантичного Кощея и смертную Василису, которые в прошлом были жертвами чужих желаний, а сейчас, кажется, живут долго и счастливо — но так ли это на самом деле. Автор называет книгу «безусловным открытием 2024–2025 года», отмечая взрослый подход героев к решению проблем и органично вписанную славянскую сказочность в наш мир.", "tags": ["фэнтези", "славянские мотивы", "драма", "дилогия"], "links": ["https://t.me/i_jili_oni", "https://author.today/work/162356", "https://www.litres.ru/book/alena-selutina/i-zhili-oni-dolgo-i-schastlivo-70650436/", "https://www.chitai-gorod.ru/product/i-zhili-oni-dolgo-i-schastlivo-3007244"], "date": "2025-04-12", "review": "«И жили они долго и счастливо» Алёны Селютиной я прочитала ещё в первых числах января, как и вторую часть (её можно читать независимо от первой) – «О детях кощеевых». Но отзыв смогла написать только сейчас, среди вынужденного перерыва в делах.\n\nЕсли кратко, то безусловно рекомендую. Вы столько мне её рекомендовали, и когда я приникла, я прямо возрадовалась.\n\nАлёна Селютина взяла сказочный троп, очень спорную и при этом знакомую пару – Василису и Кощея, современность, магический мир, действующий скрытно одновременно с нашим, современным, параллельные миры, такие как Навь, и приправила это драмой и противостоянием в прошлом и здоровыми отношениями сейчас.\nИ вышло великолепно.\nКощей – бессмертный, сухой, педантичный, слегка аутистичный, которому впервые открывается что такое любовь.\nВасилиса – смертная, ставшая щепкой в водовороте чужих желаний.\nНо это было в прошлом (а мы наблюдаем поочередно за прошлым и настоящим), а сейчас они живут долго и счастливо. Но так ли это?\n\nСтеклища тут насыпано достаточно, как и славных, тёплых моментов, драма, напряжение – всё это Алёне удалось великолепно. И при этом наблюдать, как герои решают возникающие проблемы, как они решают их по-взрослому – это очень круто.\n\nПрямо если не читали ещё, читайте обязательно.\n\nВторая часть понравилась так же, хотя я не очень люблю читать про детей героев, ибо часто это высосано из пальца. Но нет, всё те же психологические проблемы в сказочном и жутковатом антураже, герои, к которым прикипаешь, и сказочная славянщина, органично вписавшаяся в наш мир.\n\nКнига есть и в бумаге, вышла она в МИФе, и, думаю, МИФ прям не пожалел, что взял её. Это безусловное открытие 2024-2025 года.\n\nКнига:\n• на АТ\n• на litres\n• и бумажная в ЧГ\n\n#авторчитаетирекомендует@kotovafantasy #АленаСелютина"}, {"source": "kotova", "title": "«Красные луны Квертинда»", "book_author": "Нина Малкина", "summary": "Многожанровая фэнтези-«матрёшка» на стержне ромфанта — первые три книги тёмный янг-адалт о взрослении, следующие политическое и романтическое фэнтези, а финальные обещают эпик и игры правителей. Автор отмечает, что вся история движима любовью как силой, меняющей судьбу героини.", "tags": ["фэнтези", "ромфант", "тёмный янг-адалт", "многотомная серия"], "links": ["https://t.me/kvertind"], "date": "2025-02-18", "review": "Когда я начинаю говорить о Нине Малкиной и её «Красных лунах Квертинда», мне очень трудно подобрать слова, потому что рассказать хочется сразу об очень многом.\n\nНапример, о том, что это фентези-матрёшка, построенная на крепких столпах ромфанта (именно любовь является силой, двинувшей сюжет в непредсказуемом направлении), но при этом первые 3 книги – это тёмный янг адалт, история взросления, следующие 2 (4 и 5) – это политическое и романтическое фентези, а 6 и, возможно, 7 книги обещают нам эпик и игры правителей.\n\nТо есть Квертинд – это многожанровое фентези, включающее в себя академку, эпик, приключения, тёмное фентези, и стоящее на крепких сваях ромфанта, потому что всё, что там происходит, делается ради любви, и она становится движущей силой сюжета. Но, помимо ромфанта, всё это – это история роста героини. От глупой, наивной, взрывной, неправильной, раздражающей девицы и через тернии не скажу к кому.\n\nПродолжение рецензии ищите в комментариях.\n\n#НинаМалкина #КрасныеЛуныКвертинда\n#авторчитаетирекомендует"}, {"source": "kotova", "title": "Подборка: Топ-5 (+бонус) лучших книг 2024 года по версии Ирины Котовой", "book_author": "", "summary": "Годовой топ автора канала с комментариями: «История о краже» Екатерины Гичко — тетралогия с «оттаивающим ледышкой» героем и противостоянием кланов оборотней; «Встречная-поперечная» Антонины Циль и Анны Вронацкой — учительница неожиданно наследует проклятое поместье в альтернативной Российской империи; «Эльфийский бык» Карины Дёминой — фирменная эклектика юмора, дарка, ромфанта и абсурда; «Люся, которая всех бесила» Таты Алатовой — «совершенно невыносимая» редактор новостного портала и история вражды-к-любви; «Забери меня отсюда» Софьи Ролдугиной — одинокая героиня зовёт волшебство из обыденной жизни маленького городка; и особняком — недописанная «Ведущая на свет» Веры Волховец про девушку-ангела, спасающую демона милосердием, которую автор всё ещё надеется увидеть завершённой.", "tags": ["подборка", "итоги года", "топ книг"], "links": ["https://litnet.com/ru/book/istoriya-o-krazhe-lgunya-tom-1-b177002", "https://litnet.com/ru/book/vstrechnaya-poperechnaya-b450964", "https://author.today/work/327877", "https://litnet.com/ru/book/lyusya-kotoraya-vseh-besila-b420315", "https://i-gram.ru/b/kwmwm-zaberi-menya-otsyuda/", "https://www.litres.ru/book/vera-volhovec-32048000/veduschaya-na-svet-67631483/"], "date": "2025-01-04", "review": "Мой топ-5 (+ бонус) лучших книг 2024 года в обложках.\n\n#авторчитаетирекомендует@kotovafantasy\n\nС большим удовольствием пишу этот пост, потому что обожаю делиться лучшими книгами)\nИтак, давайте меняться! Я вам – свой топ-5 книг за 2024 год, а вы мне – свой!\n\nМои лучшие книги – не по рангу, порядок не имеет значения.\n\n1) «История о краже»  Екатерины Гичко – тетралогия, которая захватила мое сердце. Динамичная, яркая, захватывающая, с множеством героев, злодеями, классными линиями, героем и героиней, которые проходят свой путь. Герой – оттаивающая ледышка, которая учится любить, героиня – свободолюбивая и самодостаточная, сильная и яркая. Огромный цельный мир, страна с разными, очень характерными кланами оборотней, их сотрудничество и противостояние, истории семей от прадедов до внуков. И все обалденно харизматичные! Очень надеюсь, что мы издадим ее в «Королевской библиотеке».\n\n2) «Встречная-поперечная» Антонины Циль и Анны Вронацкой – изумительная история на базе альтернативной РИ (Российской империи) про то, как учительница внезапно становится наследницей поместья в глубинке. И, как выясняется, проклятья, связанного с поместьем. Чудесная система магии, очень интересная интрига, однозначно буду перечитывать. Тоже с удовольствием издала бы в КБ, если выживет в 25 году.\n\n3) «Эльфийский бык» Карины Дёминой – трилогия в стиле фирменной Дёминской эклектики. Я восхищаюсь Кариной как профи и творческим человеком и почти все её книги перечитываю. Дёмина обладает уникальным даром миксовать в одной истории совершенно разные жанры так, чтобы это выглядело цельно и гармонично.\nЭльфийский бык – это юмор, дарк,  ромфант, приключения, эпик, альтернативная РИ с нотками абсурда – и всё читается просто взахлёб. Главное не относиться на серьезных щщах и принять правила игры.\nОбязательно буду перечитывать.\n\n4) Тата Алатова. Я просто не знаю, что взять сюда – «Тессу на краю света» или «Люсю, которая всех бесила». Они обе прекрасны, но, остановлюсь на Люсе (ибо по Тессе Тата пишет третью историю– о Френке, которая пойдёт в топ 2025 года)))\nТак вот – Люся будет вас бесить. Но это какой-то восторг, я уже успела и прочитать, и перечитать. Совершенно невыносимая редактор новостного портала в российской глубинке. Волшебная РИ с интернетом, бандитами и свободой для женщин. Маги, а, точнее, люди, наделенные способностями, пошедшими от славянских божеств и волшебных существ. Это настолько ярко, эклектично и круто! А ещё меня очень задевает история любви - от ненависти, вынужденные напарники. Мужик там тоже отличный просто)) Чем-то напоминает мне Люка, но потяжелее. И ещё она есть в бумаге, хотя я надеюсь увидеть её с другой обложкой, нынешняя больше похожа на слр. \n\n5) Если я читаю Соню Ролдугину, её книга автоматически попадает в топ года. В этом году это «Забери меня отсюда». Соне удивительно удается прописывать тягу к волшебному из обыденности, тот самый зов, который толкает героя на его путь. И вот живёт наша героиня одна в доме, работает в библиотеке, гуляет по провинциальному городку – и однажды кричит в воды реки «Забери меня отсюда». Отсюда и начинаются её приключения.\nЧуть жутковато, очень волшебно. О дружбе и взаимовыручке, о том, как важно даже древнему могущественному существу чувствовать рядом тепло, о тьме и том, что эту тьму может победить. А ещё очень здорово показана жизнь маленького городка. В электронке только на i-gram, аудио на ЛитРесе, в бумаге на ОЗОН от Руграм.\n\n6) И была ещё одна книга, которую я ставлю шестой в топ-5, потому что не могу о ней не рассказать. Я не писала по ней отзыв, но она произвела на меня очень глубокое впечатление. Это «Ведущая на свет» Веры Волховец. Проблема в том, что история не дописана, есть только первая книга, а вторая в заморозке. \n\nАвтор обещает к ней вернуться, а я терпеливо жду.\nЭто история о девушке-ангеле, которая спасает от вечных мук демона, проявляя к нему милосердие. И это приводит – к потрясению миров Изумительная история, и я очень жду, что автор тоже соберет себя после жизненных перипетий и закончит её. Сейчас Вера пишет эротику/СЛР под псевдонимом Джина Шей, но я не теряю надежду\n\nЖду вашего топа-5 лучших книг 2024 года!\n\n#авторчитаетирекомендует@kotovafantasy"}, {"source": "kotova", "title": "«Железо и Серебро» (вторая книга мира «Осенней жатвы»)", "book_author": "Мария Гуцол", "summary": "Атмосферная, мрачновато-светлая история про фейри и людей, про Границу и Ту сторону, про долг и любовь — судмедэксперт полицейского морга Анна Греймур сталкивается со странной погибшей нечеловеческого вида и получает пугающие пророческие видения. Автор особо отмечает восхитительных женских персонажей и чуткую проработку узнаваемого мира.", "tags": ["тёмное фэнтези", "фейри", "детектив", "атмосферное"], "links": ["https://t.me/amarie_gutsol", "https://t.me/k_slovu_rugram", "https://rugram-shop.ru/books/details/547049/"], "date": "2024-11-14", "review": "Друзья, у Марии Гуцол наконец-то выходит долгожданная «Железо и Серебро» – вторая бумажная книга по миру «Осенней жатвы».\nЭто изумительные, атмосферные, мрачноватые и при этом светлые книги про фейри и людей, про Границу и Ту сторону, про долг и любовь, и про смыслы, которые объединяют и смертных, и почти бессмертных.\n\nВ книгах Марии Гуцол абсолютно восхитительные женские персонажи (мужчины тоже, но женщины!). Уникальный, узнаваемый мир. И то самое ощущение, когда открываешь книгу – и ныряешь в другой мир, так он хорошо и чутко прописан.\n\nСейчас ещё можно купить книгу в телеграм-канале К Слову за 890 рублей. Как это сделать?\nЗаходите в канал.\nПереходите в бот (ссылка на бот в каждом сообщении канала, там же ссылка на техподдержку, если что не получается).\nВ боте нажимаете на «начать покупки» (кнопка снизу), следуете логике бота и выбираете раздел «Предзаказ», а в нём – Гуцол. М. Если нет кнопки «начать покупки» – пишите в техподдержку!\n\nКнига есть и на Руграм-шоп (сейчас там цена после авторизации – 1400 руб), будет на ОЗОН с Вайлдберрис, но К Слову всегда самый дешёвый.\n\n#авторчитаетирекомендует\n\nА вот обложка и аннотация:\n\nАнне Греймур нет дела до пугающих сказок о фейри. Она работает в полицейском морге Байля и каждый день имеет дело с вещами гораздо более страшными. Но однажды к ней на секционный стол попадает странная женщина, совсем не похожая на человека, и в сны Анны приходят пророчества о смерти, а в явь — видения крови на руках убийц. В темноте прячутся кошмары, вода озера становится красной от крови и путаются под ногами тропы Другой стороны. Правда ее обманчива, правосудие жестоко и горчит на вкус вино мертвых.\n\n#авторчитаетирекомендует"}, {"source": "kotova", "title": "«История о краже» (четырёхтомник)", "book_author": "Екатерина Гичко", "summary": "Эпическое фэнтези о пропавших из городской сокровищницы артефактах — расследование ведёт суровый Ранхаш Вотый Немилосердный, а главная подозреваемая Майяри вынуждена выйти из укрытия, и их пути неизбежно пересекаются. Автор пережила настоящий «книжный запой», отмечая яркий сложный мир оборотней и достоверно вплетённую линию романтики.", "tags": ["эпическое фэнтези", "детектив", "оборотни", "тетралогия"], "links": ["https://litnet.com/ru/book/istoriya-o-krazhe-lgunya-tom-1-b177002", "https://t.me/gichkoekaterina"], "date": "2024-11-01", "review": "Знаете, почему тут три дня не появлялись отчеты о том, что я пишу?\nПотому что у меня тут вдруг образовалась серия походов к стоматологу, а после стоматолога я всегда страдаю и ничего делать не могу, только жалеть себя и читать.\n\nИ вот все эти дни я читала четырёхтомник «История о краже» Екатерины Гичко и я в каком-то невозможном восторге.\n\nЯ вынырнула вчера в 3:30, я читала утром, днём и вечером, я давненько не испытывала такого всепоглощающего книжного запоя. И такого сильного книжного похмелья, как сейчас – клянусь, я едва удерживаюсь, чтобы не припасть к ещё двум томам по этому же сеттингу, но 11 лет спустя после основных событий. И не делаю я этого только потому, что дракон Миль-Авентис уже завис у меня за окном и смотрит на меня с глубочайшим упрёком. Возможно, если я сейчас не сяду писать, он меня сожрёт (или это будет моя совесть).\n\nПоэтому сейчас я сажусь за дракона и бью себя по рукам каждый раз, когда дрожащие пальцы будут заставлять меня перейти на страницу Екатерины Гичко.\n\nЯ поэтому и стараюсь не читать длинные яркие циклы, пока я сама пишу, оставляю их на лето (а сколько там того лета, да?)), потому что, если цикл действительно великолепен, то я забываю обо всём, и ничто не способно оторвать меня от книги.\n\nА начала я читать «Историю о краже» просто потому, что мы решали, что печатать в серию «Королевская библиотека» раньше – и все же решили, что сначала будет однотомник «Тяжесть слова» (он полегче, больше в ромфант, и речь в нём идет о далеких потомках героев «Платы за мир», с которыми мы там обязательно встретимся), а затем будет прекрасная «История о краже» в 4 или 5 томах (зависит от того, влезет ли последний огромный том в одну книгу или нет)).\n\nЧем же меня так вкрашила «История о краже»?\nТам все, как я люблю: динамика, сложносоставный сюжет, множество проблем родом из далекого и не такого далекого прошлого, огромное количество ярких, незабываемых героев, которые между собой сложно взаимодействуют, у каждого из них есть своя история, очень крутой злодей, сильная и одновременно в чем-то наивная героиня с бесконечным стремлением к свободе, отмороженный герой, который постепенно тает (да-да))).\nОгромный мир со сложным политическим устройством и взаимодействием, герои разных оттенков белизны, серости и черноты.\nБольшое разнообразие кланов оборотней, умное, обоснуйное, со своими особенностями, с четким пониманием того, чем это отличается от человеческого общества.\n\nЭто великолепная работа автора, сложнейшая, которая, при всём этом, читается абсолютно влёт, и в которой ромфант линия вплетена очень достоверно и ярко, но не перешибает собой остальные интереснейшие события. Повторюсь, читается влет, абсолютное погружение, я как через портал в другой мир попала.\n\n📖 Итак, из городской сокровищницы города Санариш пропадают некие артефакты. Главный хранитель убит, а преступница уже год как скрывается.\nНо за расследование берётся Ранхаш Вотый, прозванный Немилосердным. А Майяри, которую и подозревают в убийстве, зачем-то выходит из своего укрытия.\nИ, конечно же, они не могут не встретиться – ведь Вотый всегда находит дорогу к тому, к кому хочет. А уж следом начинает закручиваться такой снежный ком истории, что читателю остается только крутиться вместе с ним и ошарашенно хлопать глазами.\n\nОбязательно читайте! И ждем в бумаге после «Тяжести слова»!\n\n#авторчитаетирекомендует #королевскаябиблиотека_ИК #ЕкатеринаГичко"}, {"source": "kotova", "title": "«Звездокрыл» (серия «З.А.В.Р.»)", "book_author": "Маргарита Блинова", "summary": "Уютное сказочное фэнтези про академию для адептов, обучающихся взаимодействию с драконами, пришедшими в мир вместе со своей повелительницей — героиня Риана сбегает из дома, чтобы поступить в эту академию. Автор отмечает динамичный сюжет с постоянными поворотами и рекомендует книгу для любого возраста, включая подростков.", "tags": ["фэнтези", "драконы", "магическая академия", "ромфант", "для широкой аудитории"], "links": ["https://book24.ru/r/kzMxn", "https://www.chitai-gorod.ru/r/QsCTv", "https://www.litres.ru/book/margarita-blinova/fakultet-zvezdokrylov-kniga-1-68900055/"], "date": "2024-09-08", "review": "#авторчитаетирекомендует\n \nПризнаюсь, когда я увидела обложку «Звездокрыла» – первой книги новой серии Маргариты Блиновой «З.А.В.Р», я решила, что Рита подалась в детские писатели. И бралась я за «Звездокрыла» с настороженностью, почему-то думая, что всё будет очень наивно, просто и скучно, и что я такие книги переросла. \nНо я ошибалась.\n \nЗдесь очаровательный мир, который хочется рассматривать и пробовать на вкус. Это уютная сказочная вещь, то, что стопроцентно поднимет вам настроение.\n \nВо-первых, вы смело можете дать эту книгу подросткам лет с 14 – там есть пару откровенных шуточек, но в целом она действительно довольно невинна. Но не наивна! \nВо-вторых, мне в мои почти 42 она была интересна. Я прочитала взахлёб, а это редко бывает. Так что книгу, несмотря на то, что в начале присутствует такой флёр янг адалта, это, безусловно, ромфант, и её можно рекомендовать для всех возрастов, что я с удовольствием и делаю. Она мне понравилась и я буду читать серию дальше.\n \n«Звездокрыл» повествует о мире, в который пришли драконы вместе с их повелительницей. Пришли и остались, а повелительница рраз и основала академию «ЗАВР» для обучения адептов, которым и предстоит взаимодействовать с этими самыми драконами. А наша героиня, Риана, в юном возрасте была так поражена явлением драконов, что исполнила свою мечту – сбежала из дома и поступила в эту академию.\n \nМне очень-очень понравилась динамика книги. Ты только привыкаешь к одному течению событий, как бац, происходит поворот, и вот мы с героиней уже привыкаем к другому. Из-за этой динамики и книга читается влёт.\n \nМне понравилось, что героине ничего не даётся просто так, плюс у неё нормальный характер, она в меру разумна, в меру осторожна, в меру смела, но способна на решительные поступки.\n \nИ герой понравился – хороший парень. С тайной, как и полагается. И злодей там есть. В тени. И студенческие будни описаны отлично.\n \nНо больше всего мне понравилась система драконов и сами драконы.\n\nРите удалось создать привлекательный мир, в котором угадываются вайбы «Как приручить дракона» и «Драконьей саги». Он уютный и теплый, драконы – умиляют, и есть неуловимый флер чего-то доброго типа «В мире животных» с Дроздовым или «О всех созданиях, больших и малых».\n \nКак я уже сказала, я обязательно буду читать дальше, как только выйдет вся серия, потому что люблю заглатывать все одним махом. Насколько я помню, в серии будет 5 книг, они выходят очень бодренько, и сейчас уже в продаже вторая книга серии «Ядожал». От слов «Яд» и «Жало», а не так, как все читают)))\n\nСпасибо Рите за книгу, ждём выхода новых!\n \nКупить бумагу можно:\nНа Бук24 \nВ Читай-городе\nА электронку почитать на ЛитРес.\n\n#МаргаритаБлинова #АкадемияЗавр\n\nА вот обложки З.А.В.Р.а\n\n#МаргаритаБлинова #АкадемияЗавр"}, {"source": "kotova", "title": "«Ментор чёрного паука» (серия)", "book_author": "Нина Малкина", "summary": "Тёмное фэнтези и роман взросления — история строится на любви, меняющей людей, судьбы и политику государства, но в первую очередь показывает пропасть, в которую может упасть сильная, но неограненная юная героиня с всепрощающим покровителем. Автор предупреждает о дарковых моментах, но называет книгу «очень, очень хорошей».", "tags": ["тёмное фэнтези", "роман взросления", "ромфант", "серия"], "links": ["https://author.today/work/series/8027"], "date": "2024-08-08", "review": "Я только что дочитала четвёртую книгу из серии «Ментор черного паука» Нины Малкиной и крайне, бесконечно довольна. И, конечно, сразу прошу вас, если вы читали, делиться своими впечатлениями под постом, чтобы другие читатели могли понять, их это история или не их.\n(Хотя я реально рекомендую читать всем!)\n\nЯ делала отзыв на первую книгу серии, а сейчас у меня впереди пятая, и затем я сделаю ещё одну рецензию, потому что мыслей очень много (их я, пользуясь знакомством с Ниной, многословно наговариваю ей по ходу чтения, надеюсь, она не жаждет уже, чтобы я замолчала)).\n\nЕсли вы ещё не читали – обязательно читайте. Но имейте в виду, что это не ромфант чистой воды. Да, история строится на истории любви, которая меняет и людей, и судьбы, и историю государства, и политику, и многое-многое другое, но прежде всего «Ментор» – это роман взросления. Очень круто сделанный роман, с показом пропасти, в которую может упасть юная дева, будучи с одной стороны сильной и дерзкой, а с другой – неограненной, одинаково относящейся и к добру и ко злу, и при этом имеющей сильнейшего покровителя, который прощает ей все проступки. В таких случаях учить и заставлять взрослеть, прекращать играть и заигрываться заставляет сама жизнь.\n\nПредупреждаю, что это – тёмное фентези, здесь есть дарковые моменты, которые могут быть неприятны тонким натурам. В некоторых таких моментах мне было тяжеловато, но всё нивелируется полнотой истории.\n\nЭто правда очень, очень хорошо. Но больше ни слова, а то я всё напишу здесь, и ничего не останется на общий отзыв после 5 книги.\nНасколько я знаю, 5 книга почти закончена, там осталось полторы главы + будет ещё 6, которую я буду спокойно ждать.\n\nНина Малкина – очень тщательный автор с хорошим языком, так что безусловно рекомендую.\n\n#авторчитаетирекомендует #НинаМалкина\n\nОбложка 4 книги\n\n#авторчитаетирекомендует #НинаМалкина"}, {"source": "kotova", "title": "«Чехов» (серия)", "book_author": "Гоблин, Каин", "summary": "Ламповое имперское фэнтези на основе альтернативной России — молодой княжич-некромант Павел Чехов заканчивает лицей и начинает адвокатскую практику в Петрограде, попутно помогая простому люду и наживая как славу, так и опасности. Автор особо отмечает непривычно доброго и достойного героя для мужской прозы и расслабляющий, неспешный темп повествования.", "tags": ["имперское фэнтези", "некромантия", "лёгкое чтение", "длинная серия"], "links": ["https://author.today/work/280000", "https://t.me/logovo_books"], "date": "2024-07-28", "review": "Я продолжаю примыкать к имперскому фентези на основе альтернативной Российской империи и с удовольствием рекомендую вам серию «Чехов» от авторов Гоблин и Каин.\n\nЯ прочитала первую книгу со свистом и уже читаю вторую. И, как обычно, прошу читателей, если вы уже читали – тоже поделиться впечатлениями в комментариях.\n\nГлавный герой – молодой княжич Павел Чехов, который заканчивает лицей и начинает практику адвоката в Петрограде. У него есть конфликт с отцом, властная и помогающая бабушка, друзья и недруги – всё, как положено. Необычно то, что он начинает помогать простому люду, и это создаёт ему как славу, так и опасности.\nА ещё он некромант, как и его бабушка, а некроманты очень редки, их побаиваются. Оттого у героя проблемы с девушками.\n\nЯ сейчас немного распишусь в собственной предвзятости, но я не ожидала от авторов-мужчин, а тем более от авторов-мужчин с подобными брутальными псевдонимами)) такого по-хорошему лампового, атмосферного, расслабляющего бытового и производственного фентези. Темп истории неспешный, но книги читаются очень быстро – за пару часов, я как серию сериала посмотрела и спать) Так что если вам хочется чего-то для релакса – обязательно обратите внимание.\n\nПриятно поразил вайб добра, который есть в «Чехове». Это, видимо, тоже предубеждение, но обычно в книгах мужчин-авторов много залихватской лихости, серой морали, кровикишок, кучи баб, резких поворотов, эмоциональных горок и т.п. Я же увидела героя со своими принципами, достойного, великодушного. Это подкупает и при этом вовсе не делает историю скучной или серой.\n\nКак я уже сказала, история оказалась очень расслабляющей. У женщин-авторов есть понятие «бытовушка» – когда героиня получает в наследство поместье/лавку и приводит её в порядок, это очень релаксирующие книги, и вот когда Павел начал обустраиваться, я просто по-хорошему кайфовала.\n\nПлюс это, конечно, производственное фентези, и оно тоже сделано хорошо, отмечу правильный авторский подход – авторы постоянно подбрасывают герою то те, то иные загадки, почти все окружающие его герои, живые и мертвые, тоже имеют свои тайны, и поэтому герою всегда есть чем заняться)\n\nЧто касается языка – он приятный, хочется похвалить за стилизацию – очень хорошо выдержана мера между современным и условно позднеимперским. Все эти “намедни„, “проститутошная„, “извозчик„ и “Феофан Евлампиевич„ и создают ту самую имперскую атмосферу, хотя мир в истории – современный, с машинами, сетью, компьютерами и телефонами.\n\nСистема магии, в том числе у самого Павла, необычная – маги разных стихий берут силы из духов-помощников, которые в свою очередь качают их из окружающего мира. Что-то новенькое, и это классно.\n\nСейчас пишется 10 книга серии, авторы обещают ещё 1-2 книги. Намёки на будущие отношения есть, но очевидно, что до них ещё очень далеко. А ещё мне теперь хочется всех называть по имени-отчеству, как теперь от этого избавиться?))\n\nСпасибо авторам за прекрасную историю, дочитаю то, что выложено, обязательно сделаю рецензию по итогам.\n\n#авторчитаетирекомендует"}, {"source": "kotova", "title": "«Проклятый лес» (трилогия: «Проклятый лес», «Проклятый дар», «Проклятый трон»)", "book_author": "Ирина Зволинская", "summary": "Сложная многосюжетная альтернативно-историческая фэнтези-трилогия — маршал могущественной империи удочеряет девушку из рода изгнанных хранителей Леса, лишая её семьи и имени, чтобы использовать как пешку в политической партии, но не учитывает чувств. Автор называет трилогию загадочной, напряжённой и охватывающей и прошлое, и будущее мира.", "tags": ["фэнтези", "альтернативная история", "политические интриги", "трилогия"], "links": ["https://t.me/iyzvolinskaya", "https://t.me/k_slovu_rugram_bot"], "date": "2024-07-18", "review": "Друзья, я много раз рассказывала вам про шикарную, полную загадок, напряженности, опасности и любви трилогию Ирины Зволинской – «Проклятый лес».\n\nЯ бы очень хотела издать всю трилогию в рамках своей серии «Королевская библиотека» вместе с ЭКСМО, но издательство пока категорически против переизданий книг, которые уже вышли в других издательствах. А эта трилогия как раз сюда подходит – сложная, захватывающая, многосюжетная, охватывающая прошлое и будущее, с необычным миром – современным, магическим, этакая альтернативная Российская Империя, похожая и непохожая одновременно, в современном антураже.\n\nИ вот сейчас вся трилогия выпущена в Руграм, и её можно по очень приличной цене заказать на телеграм-канале К СЛОВУ Трилогия стоит 1790 руб, а на других сайтах одна книга стоит за 1000 руб. И если у вас уже есть «Проклятый лес», то «Проклятый дар» и «Проклятый трон» можно заказать по 500 руб!\nИщите в разделе «Предзаказ. Эксклюзив». Бот К СЛОВУ для заказа.\n\nАннотация:\nМаршал могущественной империи принимает странное решение – удочерить взрослую дочь изгнанников, хранителей Леса. Девушка дружна с его дочерью, умна и воспитана. Казалось бы, почему бы не помочь сиротке? \nТолько я не сирота. \nОн получил надо мной неограниченную власть. Лишил семьи и имени. \nГениальный стратег, он уготовил мне роль пешки в своей шахматной партии и учел всё. Кроме чувств. \nВедь когда в политику вмешается любовь, и разменная пешка может стать ферзём.\n\n#авторчитаетирекомендует\n\n500₽ Проклятый трон. Зволинская И. \n\n500₽ Проклятый дар. Зволинская И. \n\n1790₽ Комплект из 3-х книг \"Проклятый.\" Зволинская И.\n\nРаздел: ПРЕДЗАКАЗ. ЭКСКЛЮЗИВ"}, {"source": "kotova", "title": "«Император желает услышать \"да\"»", "book_author": "Анастасия Медведева", "summary": "Ромфант в альтернативно-фэнтезийно-азиатском стиле — принцесса под видом служанки едет во дворец жениха-императора искать пропавшего кузена и проверить слухи о готовящейся войне, но приём оказывается совсем не таким, как она ожидала. Автор хвалит стремительные повороты сюжета и сильную самодостаточную героиню, предупреждая о жестокости, свойственной азиатскому имперскому сеттингу.", "tags": ["ромфант", "азиатский сеттинг", "интриги", "независимая книга"], "links": ["https://litnet.com/ru/book/imperator-zhelaet-uslyshat-da-b350797", "https://www.litres.ru/book/anastasiya-medvedeva-31982081/imperator-zhelaet-uslyshat-da-70088503/", "https://www.chitai-gorod.ru/product/imperator-zhelaet-uslyshat-da-3018197"], "date": "2024-06-17", "review": "«Император желает услышать “да”» от Анастасии Медведевой – это не чистый ромфант, как могло бы показаться по названию. То есть мы наблюдаем не только за развитием отношений героя и героини.\n\n📲 Ссылки на электронку:\nLitnet\nLitres\n\n📔 И бумагу:\nЧитай-город\nОЗОН\n\nЭто ромфант в альтернативно-фентезийно-азиатском стиле, очень хорошо сделанный, и его большой плюс уже в том, что собственно романтическая линия там вплетена в приключения/интриги так, что дух захватывает.\n\nОтдаю должное Анастасии – она так круто качает читателя на сюжетных горках, так классно повышает градус, поворачивает сюжет, что книга напоминает прыжки по шестам – вверх, вниз, вправо, влево, и никогда не предугадаешь, откуда прилетит. Очень хорошо сделано, книга улетает залпом, идеальный темп – не раздражающий, не мелькающий, но без неторопливости и размеренности.\n\nИтак, молодая принцесса страны Цай едет, изображая служанку дочери герцога, во дворец к своему жениху, правителю страны Го. Едет, потому что пропал её двоюродный брат, наследник Цай, и потому, что есть все основания подозревать, что её жених, император страны Го, собирается воевать с её страной.\n\nЕё задача – найти наследника и проверить слухи. Но по приезду прием совсем не такой, какой она ожидала... и дальше события закручиваются с бешеной скоростью. Это правда сделано очень хорошо с сюжетной точки зрения, оторваться невозможно.\n\nЯ очень люблю сильных и самодостаточных героинь, а здесь героиня именно такая, и умная, и сильная, и самоотверженная, и при этом не мерисьюшная. А из героев мне полюбился Второй генерал императора, вот где хитрец с двойным, или даже тройным дном.\n\nОчень надеюсь, что когда-нибудь появится продолжение истории и про генералов императора. А эта книга закончена и читается отдельно.\n\nРекомендую даже тем, кто не любит азиатский сеттинг, потому что здесь нет мозговыламывающей стилизации, а вот атмосфера хороша.\n\nСразу хочу предупредить, что здесь есть отголоски присущей всем азиатским империям жестокости, они не уводят книгу в дарк, но кое-что мою нежную душу потрясло – например, убийство верных воинов императора или каким образом давили на герцогиню, подругу и сопровождающую героини, и нет, её и пальцем не тронули, но для меня это было очень тяжко. Заставило помнить, что главный герой – вовсе не добрый и не сердечный, как и о том, что мораль у людей другого менталитета и другой эпохи, даже приправленная фентези, может коробить и вызывать протест.\n\nЕщё раз – рекомендую.\nА ещё мне ужасно нравится стиль обложки, надеюсь узнать, кто рисовал. И если вы читали эту книгу Анастасии или вам понравились другие – делитесь в комментариях обязательно!\n\n#авторчитаетирекомендует #АнастасияМедведева\n\nНу и обложки с аннотацией.\n\nАннотация:\nМы обручены с момента моего рождения, но, кажется, мой жених даже не думает о свадьбе. А ещё, похоже, он планирует захватить мои земли и уничтожить весь мой род. Я уточняла, что мы даже не видели друг друга?.. \nЧтобы найти ответы на все вопросы и понять причины этой странной ненависти, я решила отправиться к нему - в суровую северную империю. Но инкогнито - в качестве служанки дочери своего союзника. У меня был отличный план! Но когда вообще эти планы работали?\n\n#авторчитаетирекомендует #АнастасияМедведева"}, {"source": "kotova", "title": "«Секс и ничего личного»", "book_author": "Яна Ясная", "summary": "Игривая и весёлая эротическая история в антураже магической академии с элементами расследования — целеустремлённая героиня с давней травмой встречает обеспеченного, но неглупого героя. Автор особо хвалит тёплое изображение семьи героя и поднятую тему манипуляций и выхода из зависимых отношений.", "tags": ["эротика", "ромфант", "магическая академия", "взрослое чтение"], "links": ["https://t.me/yana_yasnaya_fentezi", "https://litnet.com/book/seks-i-nichego-lichnogo-b460956"], "date": "2024-06-15", "review": "Яна Ясная – это всегда забавно, остро, весело, комфортно. Для меня Яна – автопокупаемый автор, потому что я всегда знаю, что найду у неё отличное чтение на вечер. А её эротика – эротика здорового человека, при этом абсолютно не скучная, игривая и равная.\n\nЯ очень ждала, когда будет дописан «Секс и ничего личного» и вот, дождалась, ура-ура. Книга, как все у Яны, сделала мой вечер)\n\nВо-первых, она начинается очень необычно, – у Яны фишка в необычных началах)))\nВо-вторых, героиня, этакая сделавшая себя сама девушка, очень стойкая, очень целеустремленная, и при этом несущая старую травму и тайны в прошлом. Всё как положено)\nВ-третьих, ах какой герой, который, пусть и родился с золотой ложкой во рту, но при этом не дурак и не мудак.\nВ-четвертых, антураж магической академии и расследование – так что эта книга не просто «как они встретили и полюбили друг друга», приправленное эротикой.\nВ-пятых, семья главного героя – это моя любовь, Яна всегда отлично и тепло прописывает семьи.\nА в-шестых, она поднимает и важную тему про манипуляции, зависимость и то, как важно иметь поддержку, чтобы выбраться из паутины лжи.\n\nОчень-очень рекомендую, люблю Яну Ясную со времен «Игр с огнём» и с нетерпением жду каждую её книгу.\nЕсли вы читали – обязательно напишите, это помогает другим читателям определиться, читать или нет.\n\n#авторчитаетирекомендует #янаясная\n\nАннотация: Мой жизненный путь складывался несколько причудливо. И это мягко говоря! Но умению добиваться поставленных целей он меня явно научил. Я добилась независимости, поступила туда, куда хотела. И неожиданно поняла, что, оказывается, когда ты взрослая, самостоятельная и опытная женщина двадцати с лишним лет, ты очень даже можешь позволить себе маленькие удовольствия...\n...ну, ладно, ладно, не такое уж и маленькое у Вивьена гросс Теккера удовольствие, вполне достойное! \nЕще бы причудливые фигуры жизненного пути перестали складываться в совершенно уж неприличные...\n\n#авторчитаетирекомендует #янаясная"}, {"source": "kotova", "title": "«Забери меня отсюда»", "book_author": "Софья Ролдугина", "summary": "Атмосферная история про одинокую библиотекаршу Тину, которая в отчаянии кричит с моста «Забери меня отсюда» — и река откликается, втягивая её в жутковатые и невероятные события вместе с древним, но почти подростковым существом Кённой. Автор отмечает филигранное, штрихами показанное пробуждение героини от депрессивного оцепенения к жизни.", "tags": ["фэнтези", "фейри", "мистика", "атмосферное", "независимая книга"], "links": ["https://t.me/foxes_of_randall", "https://i-gram.ru/b/kwmwm-zaberi-menya-otsyuda/", "https://www.ozon.ru/product/zaberi-menya-otsyuda-roldugina-sofya-1239842843/"], "date": "2024-06-14", "review": "«Забери меня отсюда» Софьи Ролдугиной – очень рекомендую всем любителям фейри, мрачных тайн, недоброго колдовства и при этом тропа про одинокого героя, который обретает свою стаю.\nЧитать можно только на i-gram без скачивания. Бумажная книга от Руграм.\n\nСамое тяжелое в книгах Софьи – не начать читать следующую сразу, как закончишь предыдущую)))\nЯ вот сейчас после «Забери» борюсь с этим, потому что большая очередь на чтение. Но если вдруг напал нечитец, к её книгам всегда можно вернуться, и ты всегда получишь то, что ожидаешь – полновесную, осязаемую, чувственну
